    function addCashEntry() {
        let dir = document.getElementById('cbDirection').value;
        let amt = parseFloat(document.getElementById('cbAmount').value) || 0;
        let cat = document.getElementById('cbCategory').value;
        let date = document.getElementById('cbDate').value;
        let party = document.getElementById('cbParty').value.trim();
        let linkedDoc = document.getElementById('cbLinkedDoc').value.trim();
        let projectIdRaw = document.getElementById('cbProjectTag').value;
        let projectId = projectIdRaw ? Number(projectIdRaw) : null;

        if(!amt || amt <= 0) { alert('Enter a valid amount.'); return; }
        if(!date) { alert('Select a date.'); return; }
        if(!party) { alert('Enter party / description.'); return; }

        let entries = getCashEntries();
        entries.push({ id: Date.now(), date, direction: dir, amount: amt, category: cat, party, linkedDoc, projectId, ts: new Date().toISOString() });
        saveCashEntries(entries);

        document.getElementById('cbAmount').value = '';
        document.getElementById('cbParty').value = '';
        clearInvoicePicker();
        document.getElementById('cbProjectTag').value = '';

        renderCashBook();
        showToast(`${dir === 'IN' ? '💚' : '🔴'} ₹${amt.toLocaleString('en-IN')} logged${linkedDoc ? ' · linked to ' + linkedDoc : ''}`, dir === 'IN' ? 'success' : 'info');
    }

    function deleteCashEntry(id) {
        if(!confirm('Delete this cash entry?')) return;
        let entries = getCashEntries().filter(e => e.id !== id);
        saveCashEntries(entries);
        renderCashBook();
        showToast('Entry deleted', 'error');
    }

    function renderCashBook() {
        let month = document.getElementById('cashBookMonth').value; // 'YYYY-MM'
        let all = getCashEntries();
        let entries = all.filter(e => e.date && e.date.startsWith(month)).sort((a,b) => a.date.localeCompare(b.date) || a.ts.localeCompare(b.ts));

        let totalIn = entries.filter(e => e.direction === 'IN').reduce((s,e) => s+e.amount, 0);
        let totalOut = entries.filter(e => e.direction === 'OUT').reduce((s,e) => s+e.amount, 0);
        let balance = totalIn - totalOut;

        document.getElementById('cashBookSummary').innerHTML = `
            <div class="cash-book-card cb-in"><div class="cb-label">Cash In</div><div class="cb-val" style="color:#27ae60;">₹${totalIn.toLocaleString('en-IN')}</div></div>
            <div class="cash-book-card cb-out"><div class="cb-label">Cash Out</div><div class="cb-val" style="color:#e74c3c;">₹${totalOut.toLocaleString('en-IN')}</div></div>
            <div class="cash-book-card cb-bal"><div class="cb-label">Cash in Hand</div><div class="cb-val" style="color:${balance>=0?'#2980b9':'#e74c3c'};">₹${Math.abs(balance).toLocaleString('en-IN')}${balance<0?' (deficit)':''}</div></div>`;

        if(entries.length === 0) {
            document.getElementById('cashBookBody').innerHTML = '<p style="color:#888; padding:20px; text-align:center;">No entries for this month. Add your first entry above.</p>';
            return;
        }

        let running = 0;
        let html = `<table class="analytics-table">
            <thead><tr>
                <th>Date</th><th>Direction</th><th>Category</th><th>Party / Description</th>
                <th style="text-align:right">Amount (₹)</th><th style="text-align:right">Balance (₹)</th>
                <th>Doc</th><th></th>
            </tr></thead><tbody>`;

        entries.forEach(e => {
            if(e.direction === 'IN') running += e.amount;
            else running -= e.amount;
            let isIn = e.direction === 'IN';
            let dtParts = e.date.split('-');
            let dtDisp = dtParts.length === 3 ? dtParts.reverse().join('/') : e.date;
            html += `<tr style="background:${isIn?'#f0fff4':'#fff5f5'}">
                <td>${dtDisp}</td>
                <td><span style="background:${isIn?'#27ae60':'#e74c3c'};color:#fff;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:bold;">${isIn?'IN':'OUT'}</span></td>
                <td style="font-size:12px;">${e.category}</td>
                <td style="font-size:13px;">${e.party}</td>
                <td style="text-align:right;font-weight:bold;color:${isIn?'#27ae60':'#e74c3c'};">${isIn?'+':'-'}₹${e.amount.toLocaleString('en-IN')}</td>
                <td style="text-align:right;font-weight:bold;color:${running>=0?'#2980b9':'#e74c3c'};">₹${Math.abs(running).toLocaleString('en-IN')}</td>
                <td style="font-size:11px;color:#8e44ad;">${e.linkedDoc||''}</td>
                <td><button onclick="deleteCashEntry(${e.id})" style="background:#ffebee;color:#e74c3c;border:none;padding:3px 7px;border-radius:3px;cursor:pointer;font-size:11px;font-weight:bold;width:auto;margin:0;">✕</button></td>
            </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('cashBookBody').innerHTML = html;
    }

    // ============================================================
    // F24-F27: SITE MANAGER
    // Sites stored in localStorage as 'kenSites' → array of site objects
    // Each site: { id, alias, name, client, location, contractValue, startDate,
    //              status, quoRef, notes, linkedDocs:[], expenses:[], timeline:[] }
    // linkedDocs: [{ type, docNo, docId, amount, date }]
    // expenses: [{ id, date, category, party, amount, notes }]  ← from cash book entries tagged to site
    // timeline: [{ id, date, note }]
    // ============================================================

    function getSites() {
        try { return JSON.parse(localStorage.getItem('kenSites') || '[]'); } catch(e) { return []; }
    }
    // Sites cloud sync: unlike the other collections, the backend's saveSite
    // action is per-entry (and correctly handles JSON-stringifying the
    // timeline field, which generic bulk-sync does not) while the local
    // saveSites() always receives the FULL current array, including after a
    // deletion. So syncing here means: push every current site individually,
    // AND tell the cloud to delete any site that was present in the last
    // local snapshot but is missing now. _lastSyncedSiteIds tracks that.
    let _lastSyncedSiteIds = null;
    function saveSites(sites) {
        try { localStorage.setItem('kenSites', JSON.stringify(sites)); } catch(e) { alert('Storage error.'); }
        queueSitesCloudSync(sites);
    }

    function queueSitesCloudSync(sites) {
        if (WEB_APP_URL === "PASTE_YOUR_WEB_APP_URL_HERE") return;
        clearTimeout(_syncTimers['sites']);
        _syncTimers['sites'] = setTimeout(() => runSitesCloudSync(sites), SYNC_DEBOUNCE_MS);
    }

    function runSitesCloudSync(sites) {
        if (_syncInFlight['sites']) return;
        _syncInFlight['sites'] = true;
        updateSyncIndicator('syncing');

        let currentIds = new Set(sites.map(s => String(s.id)));
        let removedIds = _lastSyncedSiteIds ? [..._lastSyncedSiteIds].filter(id => !currentIds.has(id)) : [];

        let calls = sites.map(site => fetch(WEB_APP_URL, {
            method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action: 'saveSite', data: site })
        }));
        removedIds.forEach(id => calls.push(fetch(WEB_APP_URL, {
            method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action: 'deleteSite', id })
        })));

        Promise.all(calls)
            .then(() => {
                _syncInFlight['sites'] = false;
                _lastSyncedSiteIds = currentIds;
                _syncFailedQueue.delete('sites');
                updateSyncIndicator('synced');
            })
            .catch(() => {
                _syncInFlight['sites'] = false;
                _syncFailedQueue.add('sites');
                updateSyncIndicator('error');
            });
    }
    // retryFailedSyncs() (defined earlier) explicitly checks for 'sites' in
    // _syncFailedQueue and calls runSitesCloudSync directly, since this
    // collection doesn't go through the generic SYNC_COLLECTION_MAP path.

    function openSiteManager() {
        document.getElementById('siteManagerModal').style.display = 'flex';
        renderSiteManager();
    }
    function closeSiteManager() { document.getElementById('siteManagerModal').style.display = 'none'; }

    function toggleNewSiteForm() {
        let f = document.getElementById('newSiteForm');
        f.style.display = f.style.display === 'none' ? 'block' : 'none';
        if(f.style.display === 'block') {
            document.getElementById('nsStartDate').value = new Date().toISOString().slice(0,10);
        }
    }

    function createSite() {
        let alias = document.getElementById('nsAlias').value.trim();
        let name = document.getElementById('nsName').value.trim();
        let client = document.getElementById('nsClient').value.trim();
        if(!alias) { alert('Site alias is required (e.g. Site 1).'); return; }
        if(!name) { alert('Full site name is required.'); return; }
        if(!client) { alert('Customer name is required.'); return; }

        let sites = getSites();
        let newSite = {
            id: Date.now(),
            alias: alias,
            name: name,
            client: client,
            location: document.getElementById('nsLocation').value.trim(),
            contractValue: parseFloat(document.getElementById('nsContractValue').value) || 0,
            startDate: document.getElementById('nsStartDate').value,
            status: document.getElementById('nsStatus').value,
            quoRef: document.getElementById('nsQuoRef').value.trim(),
            notes: document.getElementById('nsNotes').value.trim(),
            linkedDocs: [],
            expenses: [],
            timeline: []
        };

        // Auto-add first timeline entry
        if(newSite.startDate) {
            newSite.timeline.push({ id: Date.now()+1, date: newSite.startDate, note: 'Site created / work started.' });
        }

        sites.push(newSite);
        saveSites(sites);

        // Clear form
        ['nsAlias','nsName','nsClient','nsLocation','nsContractValue','nsQuoRef','nsNotes'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('nsStatus').value = 'Active';
        toggleNewSiteForm();
        renderSiteManager();
        showToast(`🏗️ Site "${newSite.alias}" created`, 'success');
    }

    function deleteSite(id) {
        let pwd = prompt('Enter master password to delete this site:');
        if(pwd !== MASTER_PASSWORD) { alert('Access denied.'); return; }
        if(!confirm('Permanently delete this site and all its data?')) return;
        saveSites(getSites().filter(s => s.id !== id));
        renderSiteManager();
        showToast('Site deleted', 'error');
    }

    function updateSiteStatus(id, status) {
        let sites = getSites();
        let s = sites.find(s => s.id === id);
        if(s) { s.status = status; saveSites(sites); renderSiteManager(); showToast(`Status updated to ${status}`, 'info'); }
    }

    // ----------------------------------------------------------------
    // i6: PROJECTS UI — list + add form for a site's sub-projects
    // ----------------------------------------------------------------
    function renderProjectsForSite(siteId) {
        let projects = getProjects().filter(p => p.siteId === siteId);
        let cashEntries = getCashEntries();

        let projectRows = projects.map(p => {
            // Expenses tagged to this specific project — matched by the
            // structured projectId field (NOT fuzzy text matching like the
            // Site-level expense tab uses), so "Parapet Wall" and "Compound
            // Wall" on the same site never bleed into each other.
            let projectExpenses = cashEntries.filter(e => e.projectId === p.id);
            let totalExpense = projectExpenses.reduce((s, e) => s + (e.direction === 'OUT' ? e.amount : 0), 0);
            let allocatedRevenue = p.allocatedRevenue || 0;
            let pnl = allocatedRevenue - totalExpense;
            let statusColor = p.status === 'Completed' ? '#27ae60' : (p.status === 'On Hold' ? '#e67e22' : '#3498db');

            return `<div style="background:#f9f9f9; border-left:4px solid ${statusColor}; border-radius:4px; padding:12px; margin-bottom:10px;">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <b style="font-size:14px; color:#2c3e50;">${p.name}</b>
                        <span style="background:${statusColor}; color:#fff; font-size:10px; padding:2px 7px; border-radius:8px; margin-left:6px;">${p.status}</span>
                        ${p.startDate ? `<div style="font-size:11px; color:#888; margin-top:2px;">Started ${formatDateDisplay(p.startDate)}</div>` : ''}
                    </div>
                    <button class="action-btn btn-del" onclick="deleteProject(${p.id})" title="Delete project">✕</button>
                </div>
                <div style="display:flex; gap:16px; margin-top:8px; font-size:12px;">
                    <div>Expenses: <b style="color:#e74c3c;">₹${totalExpense.toLocaleString('en-IN')}</b> <span style="color:#aaa;">(${projectExpenses.length} entries)</span></div>
                    <div>
                        Allocated Revenue:
                        <input type="number" value="${allocatedRevenue}" onchange="updateProjectRevenue(${p.id}, this.value)" style="width:90px; padding:2px 6px; margin:0; display:inline-block; font-size:12px; border:1px solid #ccc; border-radius:3px;">
                    </div>
                    <div>P&L: <b style="color:${pnl >= 0 ? '#27ae60' : '#e74c3c'};">₹${pnl.toLocaleString('en-IN')}</b></div>
                </div>
                ${p.notes ? `<div style="font-size:11px; color:#888; margin-top:6px; font-style:italic;">${p.notes}</div>` : ''}
            </div>`;
        }).join('') || '<p style="color:#aaa; font-size:12px;">No projects yet for this site. Add one below — e.g. "Parapet Wall" and "Compound Wall" as separate projects on the same site.</p>';

        return `
            <div style="font-size:12px; color:#7f8c8d; margin-bottom:10px;">
                Track expenses separately for distinct jobs on this site. P&L is rough — allocated revenue is entered manually since invoices stay site-level, not split per-project.
            </div>
            ${projectRows}
            <div style="margin-top:14px; padding-top:12px; border-top:2px solid #eee;">
                <div style="display:flex; gap:8px;">
                    <input type="text" id="newProjName-${siteId}" placeholder="Project name (e.g. Parapet Wall)" style="flex:1.5; background:#fff; color:#333; border:1px solid #ccc; padding:7px 10px; border-radius:4px; margin:0; font-size:13px;">
                    <select id="newProjStatus-${siteId}" style="background:#fff; color:#333; border:1px solid #ccc; padding:7px; border-radius:4px; margin:0; font-size:13px; width:auto;">
                        <option value="Active">Active</option>
                        <option value="On Hold">On Hold</option>
                        <option value="Completed">Completed</option>
                    </select>
                    <button onclick="addProject(${siteId})" style="background:#1a3c5e; color:#fff; border:none; padding:7px 14px; border-radius:4px; cursor:pointer; font-size:13px; font-weight:bold; width:auto; margin:0;">+ Add Project</button>
                </div>
            </div>
        `;
    }

    function addProject(siteId) {
        let nameEl = document.getElementById('newProjName-' + siteId);
        let statusEl = document.getElementById('newProjStatus-' + siteId);
        let name = nameEl.value.trim();
        if (!name) { alert('Enter a project name.'); return; }

        let projects = getProjects();
        projects.push({
            id: Date.now(), siteId, name, status: statusEl.value,
            startDate: new Date().toISOString().slice(0,10), allocatedRevenue: 0,
            notes: '', createdAt: new Date().toISOString()
        });
        saveProjects(projects);
        nameEl.value = '';
        renderSiteManager();
        showToast(`✅ Project "${name}" added`, 'success');
    }

    function deleteProject(projectId) {
        if (!confirm('Delete this project? Expenses already tagged to it will keep their tag but no longer show under any project (they stay in Cash Book either way).')) return;
        let projects = getProjects().filter(p => p.id !== projectId);
        saveProjects(projects);
        renderSiteManager();
        showToast('Project deleted', 'info');
    }

    function updateProjectRevenue(projectId, value) {
        let projects = getProjects();
        let p = projects.find(p => p.id === projectId);
        if (!p) return;
        p.allocatedRevenue = parseFloat(value) || 0;
        saveProjects(projects);
        renderSiteManager();
    }

    function renderSiteManager() {
        if (syncPendingNotice('siteListBody')) return;
        let filter = document.getElementById('siteStatusFilter').value;
        let search = document.getElementById('siteSearch').value.toLowerCase();
        let sites = getSites().filter(s => {
            let matchStatus = filter === 'ALL' || s.status === filter;
            let matchSearch = !search || (s.alias+s.name+s.client+s.location).toLowerCase().includes(search);
            return matchStatus && matchSearch;
        });

        let body = document.getElementById('siteListBody');
        if(sites.length === 0) {
            body.innerHTML = '<p style="color:#888; text-align:center; padding:30px;">No sites found. Create your first site above.</p>';
            return;
        }

        body.innerHTML = sites.map(site => renderSiteCard(site)).join('');
    }

    function renderSiteCard(site) {
        let statusClass = { Active:'site-status-active', Hold:'site-status-hold', Done:'site-status-done' }[site.status] || '';
        let statusEmoji = { Active:'🟢', Hold:'🟠', Done:'✅' }[site.status] || '';

        // Compute metrics from savedDocs
        let siteDocs = savedDocs.filter(d => d.clientName === site.client && !d.docNo.includes('VOID'));
        // Also include any manually linked docs
        let linkedIds = (site.linkedDocs || []).map(l => l.docNo);
        let allSiteDocs = [...siteDocs.filter(d => linkedIds.includes(d.docNo) || d.clientName === site.client)];

        let totalBilled = allSiteDocs.filter(d => ['INV','SAL'].includes(d.type)).reduce((s,d) => s+(d.total||0), 0);
        let totalReceived = allSiteDocs.filter(d => d.type === 'ADV').reduce((s,d) => s+(d.total||0), 0);
        let balance = totalBilled - totalReceived;

        // Blocks dispatched from INV/SAL carts
        let blocksDispatched = {};
        allSiteDocs.filter(d => ['INV','SAL'].includes(d.type)).forEach(d => {
            (d.cart||[]).forEach(item => {
                if(item.p.includes('Block')) {
                    blocksDispatched[item.p] = (blocksDispatched[item.p] || 0) + (item.q || 0);
                }
            });
        });
        let totalBlocks = Object.values(blocksDispatched).reduce((s,v)=>s+v, 0);

        // Site expenses from cash book tagged to this site
        let cashEntries = getCashEntries().filter(e => e.linkedDoc && (e.linkedDoc.toLowerCase().includes(site.alias.toLowerCase()) || e.linkedDoc.toLowerCase().includes(site.name.toLowerCase())));
        let totalSiteExpense = cashEntries.filter(e => e.direction === 'OUT').reduce((s,e) => s+e.amount, 0);

        // Contract progress %
        let contractVal = site.contractValue || 0;
        let progressPct = contractVal > 0 ? Math.min(100, Math.round((totalBilled/contractVal)*100)) : 0;

        let invChips = allSiteDocs.filter(d => ['INV','SAL','ADV','QUO'].includes(d.type)).slice(0,8).map(d =>
            `<span class="site-doc-chip" onclick="loadDocAndClose(${d.id})" title="${d.docNo}">
                <span style="background:${typeColor(d.type)};color:#fff;padding:1px 6px;border-radius:8px;font-size:10px;">${d.type}</span>
                ${d.docNo.split('/').slice(-1)[0]}
                <span style="color:#888;">₹${(d.total||0).toLocaleString('en-IN')}</span>
            </span>`
        ).join('');

        let timelineHTML = (site.timeline || []).slice().reverse().slice(0,5).map(t =>
            `<div class="site-note-entry" style="position:relative;">
                <button onclick="deleteTimelineNote(${site.id}, ${t.id})" class="action-btn btn-del" style="position:absolute; top:6px; right:6px; padding:2px 6px; font-size:10px;" title="Delete this entry">✕</button>
                ${t.note}
                ${t.photoUrl ? `<div style="margin-top:6px;"><a href="${t.photoUrl}" target="_blank"><img src="${t.photoThumbUrl || t.photoUrl}" style="max-width:120px; max-height:120px; border-radius:4px; border:1px solid #ddd; object-fit:cover;" alt="Timeline photo" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';"><span style="display:none; font-size:11px; color:#888;">📷 Photo (tap to view — preview unavailable)</span></a></div>` : ''}
                <div class="site-note-date">${t.date ? formatDateDisplay(t.date) : ''}</div>
            </div>`
        ).join('') || '<p style="color:#aaa;font-size:12px;">No timeline entries yet.</p>';

        let expenseHTML = cashEntries.length > 0 ? cashEntries.slice(-5).reverse().map(e =>
            `<div class="site-expense-row">
                <div>
                    <div>${e.party}</div>
                    <div class="site-expense-category">${e.category} · ${e.date ? formatDateDisplay(e.date) : ''}</div>
                </div>
                <div style="font-weight:bold;color:#e74c3c;">₹${e.amount.toLocaleString('en-IN')}</div>
            </div>`
        ).join('') : '<p style="color:#aaa;font-size:12px;">No expenses found. Tag Cash Book entries with "${site.alias}" or "${site.name}" in the Linked Doc field.</p>';

        let contractLine = contractVal > 0 ? `
            <div style="margin-top:10px;">
                <div style="display:flex;justify-content:space-between;font-size:12px;color:#555;margin-bottom:3px;">
                    <span>Contract Progress</span><span>${progressPct}% (₹${totalBilled.toLocaleString('en-IN')} billed of ₹${contractVal.toLocaleString('en-IN')})</span>
                </div>
                <div class="site-stock-bar"><div class="site-stock-fill" style="width:${progressPct}%;background:${progressPct>=100?'#27ae60':'#3498db'};"></div></div>
            </div>` : '';

        return `<div class="site-card" id="sitecard-${site.id}">
            <div class="site-card-header" onclick="toggleSiteCard(${site.id})">
                <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0;">
                    <span class="site-alias-badge">${site.alias}</span>
                    <span style="font-weight:bold;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${site.name}</span>
                    <span style="font-size:13px;color:#bdc3c7;margin-left:4px;">· ${site.client}</span>
                </div>
                <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
                    <span class="site-status-badge ${statusClass}">${statusEmoji} ${site.status}</span>
                    <span style="font-size:18px;color:#bdc3c7;" id="sitecarrow-${site.id}">▼</span>
                </div>
            </div>
            <div class="site-card-body" id="sitebody-${site.id}">
                <div class="site-metric-row">
                    <div class="site-metric"><div class="sm-label">Billed</div><div class="sm-val">₹${(totalBilled/1000).toFixed(1)}K</div><div class="sm-sub">${allSiteDocs.filter(d=>['INV','SAL'].includes(d.type)).length} invoices</div></div>
                    <div class="site-metric" style="border-color:#27ae60;"><div class="sm-label">Received</div><div class="sm-val" style="color:#27ae60;">₹${(totalReceived/1000).toFixed(1)}K</div><div class="sm-sub">${allSiteDocs.filter(d=>d.type==='ADV').length} advances</div></div>
                    <div class="site-metric" style="border-color:${balance>0?'#e74c3c':'#27ae60'};"><div class="sm-label">Balance Due</div><div class="sm-val" style="color:${balance>0?'#e74c3c':'#27ae60'};">₹${(Math.abs(balance)/1000).toFixed(1)}K</div><div class="sm-sub">${balance<=0?'Paid up':''}</div></div>
                    <div class="site-metric" style="border-color:#8e44ad;"><div class="sm-label">Blocks Sent</div><div class="sm-val">${totalBlocks.toLocaleString('en-IN')}</div><div class="sm-sub">Nos dispatched</div></div>
                    <div class="site-metric" style="border-color:#e74c3c;"><div class="sm-label">Site Expense</div><div class="sm-val" style="color:#e74c3c;">₹${(totalSiteExpense/1000).toFixed(1)}K</div><div class="sm-sub">Cash outflow</div></div>
                </div>
                ${contractLine}

                <div class="site-tabs" style="margin-top:12px;">
                    <button class="site-tab-btn active" onclick="switchSiteTab(${site.id},'docs',this)">📄 Documents</button>
                    <button class="site-tab-btn" onclick="switchSiteTab(${site.id},'expenses',this)">💸 Expenses</button>
                    <button class="site-tab-btn" onclick="switchSiteTab(${site.id},'projects',this)">🏷️ Projects</button>
                    <button class="site-tab-btn" onclick="switchSiteTab(${site.id},'stock',this)">📦 Stock</button>
                    <button class="site-tab-btn" onclick="switchSiteTab(${site.id},'timeline',this)">📅 Timeline</button>
                    <button class="site-tab-btn" onclick="switchSiteTab(${site.id},'settings',this)">⚙️ Settings</button>
                </div>

                <div class="site-tab-content active" id="sitetab-${site.id}-docs">
                    <div style="font-size:12px;color:#7f8c8d;margin-bottom:6px;">All documents for <b>${site.client}</b> · Click any chip to load</div>
                    <div>${invChips || '<p style="color:#aaa;font-size:12px;">No documents found for this client.</p>'}</div>
                </div>

                <div class="site-tab-content" id="sitetab-${site.id}-expenses">
                    <div style="font-size:12px;color:#7f8c8d;margin-bottom:8px;">Cash outflows tagged to this site in Cash Book. Tag entries with "<b>${site.alias}</b>" or "<b>${site.name}</b>" in the Linked Doc field.</div>
                    ${expenseHTML}
                    ${cashEntries.length > 5 ? `<div style="font-size:12px;color:#3498db;margin-top:6px;">+ ${cashEntries.length-5} more entries — open Cash Book to see all</div>` : ''}
                    <div style="margin-top:10px; padding-top:8px; border-top:1px solid #eee; font-size:13px; color:#555;">
                        Total Site Expense: <b style="color:#e74c3c;">₹${totalSiteExpense.toLocaleString('en-IN')}</b>
                        &nbsp;|&nbsp; Margin: <b style="color:${(totalBilled-totalSiteExpense)>0?'#27ae60':'#e74c3c'};">₹${(totalBilled-totalSiteExpense).toLocaleString('en-IN')}</b>
                    </div>
                </div>

                <!-- i6: PROJECTS — sub-units under this Site (e.g. "Parapet
                     Wall" and "Compound Wall" both on the same site). Scope
                     confirmed: invoices/stock stay Site-level; Projects only
                     split EXPENSES (via projectId tagged on Cash Book
                     entries) and use a manually-entered allocated revenue
                     figure for a rough P&L, since there's no automatic way
                     to know a project's revenue share when billing is
                     site-wide. -->
                <div class="site-tab-content" id="sitetab-${site.id}-projects">
                    ${renderProjectsForSite(site.id)}
                </div>

                <div class="site-tab-content" id="sitetab-${site.id}-stock">
                    <div style="font-size:12px;color:#7f8c8d;margin-bottom:8px;">Blocks dispatched to site across all invoices (historical total)</div>
                    ${Object.keys(blocksDispatched).length > 0 ?
                        Object.entries(blocksDispatched).map(([prod, qty]) => `
                            <div style="padding:8px 0; border-bottom:1px solid #f0f0f0;">
                                <div style="display:flex;justify-content:space-between;font-size:13px;">
                                    <span>${prod}</span>
                                    <b>${qty.toLocaleString('en-IN')} Nos</b>
                                </div>
                                <div style="font-size:11px;color:#aaa;">${(qty * (prod.includes('4 Inch')?9:prod.includes('6 Inch')?13.5:prod.includes('8 Inch')?18:20)/1000).toFixed(2)} T</div>
                            </div>`).join('')
                        : '<p style="color:#aaa;font-size:12px;">No blocks dispatched yet. Raise a Tax Invoice or Sales Invoice for this client to see stock here.</p>'
                    }
                    <div style="margin-top:10px;padding-top:8px;border-top:1px solid #eee;font-size:13px;color:#555;">Total Dispatched: <b>${totalBlocks.toLocaleString('en-IN')} Nos</b></div>

                    <!-- Improvement #4: reconciles the historical dispatch total
                         above (from invoice carts — never decreases) against what
                         the Stock Manager actually shows as REMAINING at this
                         location right now (decreases as it's used, increases on
                         transfers/returns). Only shows if this site name matches
                         a known Stock Manager location — i.e. once you've sent
                         stock here via a Transfer. -->
                    ${getStockLocations().includes(site.name) ? (() => {
                        let liveItems = getStockItems().filter(i => getStockQty(i.name, site.name) > 0);
                        return `<div style="margin-top:16px;padding-top:12px;border-top:2px solid #eee;">
                            <div style="font-size:12px;color:#7f8c8d;margin-bottom:8px;">📦 Live Stock Remaining at this Site (from Stock Manager transfers)</div>
                            ${liveItems.length > 0 ? liveItems.map(i => {
                                let qty = getStockQty(i.name, site.name);
                                return `<div style="display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid #f8f8f8;">
                                    <span>${i.name}</span><b style="color:#117864;">${qty}</b>
                                </div>`;
                            }).join('') : '<p style="color:#aaa;font-size:12px;">Nothing currently in Stock Manager for this site — all transferred stock has been used or transferred elsewhere.</p>'}
                        </div>`;
                    })() : `<div style="margin-top:16px;padding-top:12px;border-top:2px solid #eee;">
                        <p style="color:#aaa;font-size:12px;">No live Stock Manager data for "${site.name}" yet. Send stock here via Stock Manager → Transfer/Return to start tracking real remaining quantities at this site, separate from the historical dispatch total above.</p>
                    </div>`}

                    <!-- Tools/equipment currently at this site, live from the Stock
                         Manager's Tools tracker — matched by site name against each
                         tool's currentLocation. -->
                    <div style="margin-top:16px;padding-top:12px;border-top:2px solid #eee;">
                        <div style="font-size:12px;color:#7f8c8d;margin-bottom:8px;">🛠️ Tools / Equipment currently here</div>
                        ${getToolItems().filter(t => t.currentLocation === site.name).length > 0
                            ? getToolItems().filter(t => t.currentLocation === site.name).map(t =>
                                `<div style="padding:6px 0; border-bottom:1px solid #f8f8f8; font-size:13px;">🔧 ${t.name}</div>`
                              ).join('')
                            : '<p style="color:#aaa;font-size:12px;">No tools currently tracked at this site. Move tools here from the Stock Manager → Tools tab.</p>'
                        }
                    </div>
                </div>

                <div class="site-tab-content" id="sitetab-${site.id}-timeline">
                    <div style="margin-bottom:10px;">
                        <div style="display:flex;gap:8px;">
                            <input type="text" id="tiNote-${site.id}" placeholder="Add a timeline note (e.g. Lintel work done, Rain delay)..." style="flex:1;background:#fff;color:#333;border:1px solid #ccc;padding:7px 10px;border-radius:4px;margin:0;font-size:13px;">
                            <input type="date" id="tiDate-${site.id}" style="background:#fff;color:#333;border:1px solid #ccc;padding:7px 10px;border-radius:4px;margin:0;font-size:13px;width:auto;">
                            <button onclick="addTimelineNote(${site.id})" style="background:#e67e22;color:#fff;border:none;padding:7px 14px;border-radius:4px;cursor:pointer;font-size:13px;font-weight:bold;width:auto;margin:0;">Add</button>
                        </div>
                        <!-- i9: optional photo attachment — progress shots, delivery
                             proof, damage records. Compressed client-side before
                             upload (see compressImageFile). -->
                        <div style="margin-top:6px;">
                            <input type="file" id="tiPhoto-${site.id}" accept="image/*" capture="environment" style="font-size:11px; color:#888;">
                        </div>
                    </div>
                    ${timelineHTML}
                </div>


                <div class="site-tab-content" id="sitetab-${site.id}-settings">
                    <div class="site-form-grid" style="max-width:500px;">
                        <div>
                            <label>Status</label>
                            <select onchange="updateSiteStatus(${site.id}, this.value)" style="background:#fff;color:#333;border:1px solid #ccc;margin-top:4px;">
                                <option value="Active" ${site.status==='Active'?'selected':''}>🟢 Active</option>
                                <option value="Hold" ${site.status==='Hold'?'selected':''}>🟠 On Hold</option>
                                <option value="Done" ${site.status==='Done'?'selected':''}>✅ Completed</option>
                            </select>
                        </div>
                        <div style="display:flex;align-items:flex-end;">
                            <button class="btn-site-action btn-site-danger" onclick="deleteSite(${site.id})" style="width:auto;margin:4px 0 0 0;padding:9px 14px;">🗑️ Delete Site</button>
                        </div>
                    </div>
                    ${site.location ? `<div style="font-size:13px;color:#555;margin-top:10px;">📍 ${site.location}</div>` : ''}
                    ${site.quoRef ? `<div style="font-size:13px;color:#8e44ad;margin-top:6px;">📝 Quotation: ${site.quoRef}</div>` : ''}
                    ${site.notes ? `<div style="font-size:13px;color:#555;margin-top:6px;padding:8px;background:#fffbf0;border-radius:4px;">${site.notes}</div>` : ''}
                    ${site.startDate ? `<div style="font-size:12px;color:#aaa;margin-top:6px;">Started: ${formatDateDisplay(site.startDate)}</div>` : ''}
                </div>
            </div>
        </div>`;
    }

    function toggleSiteCard(id) {
        let body = document.getElementById('sitebody-' + id);
        let arrow = document.getElementById('sitecarrow-' + id);
        let isOpen = body.classList.contains('open');
        body.classList.toggle('open', !isOpen);
        if(arrow) arrow.innerText = isOpen ? '▼' : '▲';
    }

    function switchSiteTab(siteId, tabName, btn) {
        // Deactivate all tabs for this site
        let body = document.getElementById('sitebody-' + siteId);
        body.querySelectorAll('.site-tab-btn').forEach(b => b.classList.remove('active'));
        body.querySelectorAll('.site-tab-content').forEach(c => c.classList.remove('active'));
        // Activate selected
        btn.classList.add('active');
        let tabEl = document.getElementById(`sitetab-${siteId}-${tabName}`);
        if(tabEl) tabEl.classList.add('active');
    }

    function addTimelineNote(siteId) {
        let noteEl = document.getElementById('tiNote-' + siteId);
        let dateEl = document.getElementById('tiDate-' + siteId);
        let photoEl = document.getElementById('tiPhoto-' + siteId);
        let note = noteEl.value.trim();
        let date = dateEl.value || new Date().toISOString().slice(0,10);
        if(!note) { alert('Enter a note first.'); return; }
        let sites = getSites();
        let site = sites.find(s => s.id === siteId);
        if(!site) return;
        if(!site.timeline) site.timeline = [];

        let entry = { id: Date.now(), date, note };
        let photoFile = photoEl.files && photoEl.files[0];

        if (!photoFile) {
            // No photo — save immediately, same as before this feature existed.
            site.timeline.push(entry);
            saveSites(sites);
            noteEl.value = '';
            renderSiteManager();
            showToast('📅 Timeline note added', 'success');
            return;
        }

        // i9: photo attached — compress, upload, then save the note WITH the
        // resulting photo URL. If the upload fails for any reason (offline,
        // Drive error), the note still saves without the photo rather than
        // losing the note entirely — the note itself is more important than
        // the photo, and the person can always try re-attaching later.
        showToast('📷 Compressing & uploading photo…', 'info');
        compressImageFile(photoFile).then(base64 => {
            if (WEB_APP_URL === "PASTE_YOUR_WEB_APP_URL_HERE") {
                site.timeline.push(entry);
                saveSites(sites);
                noteEl.value = ''; photoEl.value = '';
                renderSiteManager();
                showToast('📅 Note added (photo upload needs Web App URL configured)', 'info');
                return;
            }
            fetch(WEB_APP_URL, {
                method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: 'uploadSitePhoto', data: { siteName: site.name, fileName: `site-${siteId}-${Date.now()}.jpg`, base64Image: base64 } })
            })
            .then(r => r.json())
            .then(res => {
                if (res.success) { entry.photoUrl = res.driveUrl; entry.photoThumbUrl = res.thumbUrl; entry.photoFileId = res.driveFileId; }
                else showToast('⚠️ Note saved, but photo upload failed: ' + (res.error || 'unknown error'), 'error');
                site.timeline.push(entry);
                saveSites(sites);
                noteEl.value = ''; photoEl.value = '';
                renderSiteManager();
                if (res.success) showToast('📅 Timeline note + photo added', 'success');
            })
            .catch(err => {
                // Network failure — still save the note without the photo,
                // consistent with "the note matters more than the photo".
                site.timeline.push(entry);
                saveSites(sites);
                noteEl.value = ''; photoEl.value = '';
                renderSiteManager();
                showToast('⚠️ Note saved, but photo upload failed (offline?): ' + err.message, 'error');
            });
        }).catch(err => {
            site.timeline.push(entry);
            saveSites(sites);
            noteEl.value = ''; photoEl.value = '';
            renderSiteManager();
            showToast('⚠️ Note saved, but photo could not be processed: ' + err.message, 'error');
        });
    }

    // i9: deletes a timeline entry — if it has an attached photo, also
    // tells the backend to trash the Drive file, so deleting a note doesn't
    // leave an orphaned photo sitting in Drive forever.
    function deleteTimelineNote(siteId, entryId) {
        if (!confirm('Delete this timeline entry?' )) return;
        let sites = getSites();
        let site = sites.find(s => s.id === siteId);
        if (!site || !site.timeline) return;
        let entry = site.timeline.find(t => t.id === entryId);
        site.timeline = site.timeline.filter(t => t.id !== entryId);
        saveSites(sites);
        renderSiteManager();
        showToast('Timeline entry deleted', 'info');

        if (entry && entry.photoFileId && WEB_APP_URL !== "PASTE_YOUR_WEB_APP_URL_HERE") {
            fetch(WEB_APP_URL, {
                method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: 'deleteSitePhoto', driveFileId: entry.photoFileId })
            }).catch(() => {}); // best-effort — the note is already gone either way, an orphaned Drive file is a minor cleanup issue, not worth blocking on
        }
    }

    function loadDocAndClose(docId) {
        loadDocument(docId);
        closeSiteManager();
    }

    // Initialize multi-advance table on page load
    resetAdvLinkTable();

    function numberToWords(n) {
        if (n < 0) n = 0; // Guard: negative values treated as zero
        if (n === 0) return 'Zero';
        let a = ['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
        let b = ['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
        let g = (num, suffix) => {
            let str = '';
            if (num > 99) { str += a[Math.floor(num / 100)] + ' Hundred '; num %= 100; }
            if (num > 19) { str += b[Math.floor(num / 10)]; if (num % 10 !== 0) str += ' ' + a[num % 10]; } 
            else if (num > 0) { str += a[num]; }
            if (str !== '') str += ' ' + suffix + ' ';
            return str;
        };
        let res = '';
        res += g(Math.floor(n / 10000000), 'Crore');
        res += g(Math.floor((n / 100000) % 100), 'Lakh');
        res += g(Math.floor((n / 1000) % 100), 'Thousand');
        res += g(n % 1000, '');
        return res.replace(/\s+/g, ' ').trim();
    }
</script>
