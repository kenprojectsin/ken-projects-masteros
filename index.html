    // Block weight lookup reused from the Pricing Engine's existing
    // weights config (4:6:8:9 ratio) so the two stay in sync automatically —
    // if block weights are ever corrected there, Stock costing follows.
    function getItemUnitWeightKg(itemName) {
        let size = getBlockSize(itemName); // existing helper, defined elsewhere
        if (size > 0) return pricingConfig.weights[size] || 0;
        if (itemName.toLowerCase().includes('mortar')) return 40; // fixed 40kg bag
        return 0; // non-block, non-mortar items have no weight-based transport share
    }

    // ----------------------------------------------------------------
    // LANDING COST CALCULATOR
    // One purchase trip can contain multiple items (different block sizes +
    // mortar) sharing one transport bill and one unloading bill.
    //   - transportCostPerKg = totalTransportCost / totalTonnageKg
    //   - each item's per-unit transport share = unitWeightKg * transportCostPerKg
    //   - unloading: mortar bags get a flat ₹5/bag deducted from the total
    //     first; the remainder is split evenly across total BLOCK quantity
    //     (all sizes combined, flat per-block, not weight-based)
    // Returns each line's computed landing cost — does not save anything.
    // ----------------------------------------------------------------
    const MORTAR_UNLOADING_FLAT = 5; // ₹ per mortar bag, fixed

    function calculateLandingCosts(lines, totalTransportCost, totalUnloadingCost) {
        // lines: [{ itemName, qty, baseCost }, ...]
        let totalWeightKg = 0;
        lines.forEach(l => { totalWeightKg += getItemUnitWeightKg(l.itemName) * l.qty; });
        let transportPerKg = totalWeightKg > 0 ? (totalTransportCost / totalWeightKg) : 0;

        let mortarBagCount = lines.filter(l => l.itemName.toLowerCase().includes('mortar'))
                                   .reduce((s, l) => s + l.qty, 0);
        let blockQtyTotal = lines.filter(l => getBlockSize(l.itemName) > 0)
                                  .reduce((s, l) => s + l.qty, 0);
        let unloadingAfterMortar = totalUnloadingCost - (mortarBagCount * MORTAR_UNLOADING_FLAT);
        let unloadingPerBlock = blockQtyTotal > 0 ? (unloadingAfterMortar / blockQtyTotal) : 0;

        return lines.map(l => {
            let unitWeight = getItemUnitWeightKg(l.itemName);
            let transportShare = unitWeight * transportPerKg;
            let isMortar = l.itemName.toLowerCase().includes('mortar');
            let isBlock = getBlockSize(l.itemName) > 0;
            let unloadingShare = isMortar ? MORTAR_UNLOADING_FLAT : (isBlock ? unloadingPerBlock : 0);
            let landingCost = l.baseCost + transportShare + unloadingShare;
            return {
                ...l,
                transportShare: Math.round(transportShare * 100) / 100,
                unloadingShare: Math.round(unloadingShare * 100) / 100,
                landingCost: Math.round(landingCost * 100) / 100
            };
        });
    }

    // ----------------------------------------------------------------
    // BATCH CREATION (a purchase, or a transfer creating a new batch
    // at the destination location with a re-based landing cost)
    // ----------------------------------------------------------------
    // Improvement #3: DRAFT / PENDING BATCHES
    // A lorry often arrives and gets counted before the weighbridge slip and
    // unloading bill are finalized. A draft batch lets that moment-of-arrival
    // count get logged immediately — it counts toward live stock right away
    // (the blocks are physically there and sellable) using a provisional
    // estimated cost, then gets finalized later with the real landing cost
    // once the bills are in hand. isDraft / estimatedCost distinguish a
    // draft from a normal finalized batch; finalizeDraftBatch() converts one
    // to the other without ever blocking it from being sold in the meantime.
    function createStockBatch({ itemName, location, qty, baseCost, transportCost, unloadingCost, landingCost, purchaseDate, sourceTransferId, isDraft, estimatedCost }) {
        addStockItem(itemName); // ensures it's in the catalog
        ensureStockLocation(location);
        let batches = getStockBatches();
        let batch = {
            id: 'SB' + Date.now() + Math.floor(Math.random()*1000),
            itemName, location,
            qtyOriginal: qty, qtyRemaining: qty,
            baseCost: baseCost || 0,
            transportCost: transportCost || 0,
            unloadingCost: unloadingCost || 0,
            landingCost: isDraft ? (estimatedCost || 0) : landingCost,
            purchaseDate: purchaseDate || new Date().toISOString().slice(0,10),
            createdAt: new Date().toISOString(),
            sourceTransferId: sourceTransferId || null,
            isDraft: !!isDraft
        };
        batches.push(batch);
        saveStockBatches(batches);
        logStockMovement({
            type: isDraft ? 'DRAFT_PURCHASE' : 'PURCHASE', itemName, location, qty,
            landingCost: batch.landingCost, batchId: batch.id,
            note: isDraft ? 'Logged as draft — bill pending finalization'
                : (sourceTransferId ? 'Created via stock return/transfer' : 'New purchase batch')
        });
        return batch;
    }

    // Converts a draft batch to a finalized one once the real bills are in
    // hand — replaces the provisional cost with the actual calculated
    // landing cost. Any units already SOLD from this batch while it was
    // still a draft used the provisional cost for their profit calculation;
    // those past sale records are intentionally left as-is (re-stating
    // historical profit after the fact would be confusing), but everything
    // sold AFTER finalization uses the corrected cost.
    function finalizeDraftBatch(batchId, { baseCost, transportCost, unloadingCost, landingCost }) {
        let batches = getStockBatches();
        let batch = batches.find(b => b.id === batchId);
        if (!batch || !batch.isDraft) return false;
        batch.baseCost = baseCost || 0;
        batch.transportCost = transportCost || 0;
        batch.unloadingCost = unloadingCost || 0;
        batch.landingCost = landingCost;
        batch.isDraft = false;
        saveStockBatches(batches);
        logStockMovement({
            type: 'DRAFT_FINALIZED', itemName: batch.itemName, location: batch.location, qty: batch.qtyOriginal,
            landingCost, batchId: batch.id,
            note: `Draft finalized — landing cost corrected to ₹${landingCost.toFixed(2)}/unit`
        });
        return true;
    }

    // ----------------------------------------------------------------
    // FIFO CONSUMPTION — used by both sales deduction and outgoing transfers.
    // Always drains the OLDEST batch at the given location first. Returns the
    // list of {batchId, qtyTaken, landingCost} consumed, so callers (sale
    // profit calc, transfer log) know exactly which batches were touched —
    // this is also how a single sale can show "200 from Batch 1 @ ₹20 profit,
    // 100 from Batch 2 @ ₹10 profit" when it spans batches.
    // Throws nothing on insufficient stock — just consumes what's available
    // and returns a shortfall amount, since Stock allows billing past zero
    // (the warning system was explicitly dropped in favor of the visual grid).
    // ----------------------------------------------------------------
    function consumeStockFIFO(itemName, location, qtyNeeded) {
        let batches = getStockBatches()
            .filter(b => b.itemName === itemName && b.location === location && b.qtyRemaining > 0)
            .sort((a, b) => new Date(a.purchaseDate) - new Date(b.purchaseDate) || new Date(a.createdAt) - new Date(b.createdAt));

        let consumed = [];
        let remaining = qtyNeeded;
        let allBatches = getStockBatches();

        for (let batch of batches) {
            if (remaining <= 0) break;
            let take = Math.min(batch.qtyRemaining, remaining);
            let liveBatch = allBatches.find(b => b.id === batch.id);
            liveBatch.qtyRemaining -= take;
            consumed.push({ batchId: batch.id, qtyTaken: take, landingCost: batch.landingCost });
            remaining -= take;
        }
        saveStockBatches(allBatches);
        return { consumed, shortfall: Math.max(0, remaining) };
    }

    // Current total stock for an item, optionally scoped to one location.
    function getStockQty(itemName, location = null) {
        return getStockBatches()
            .filter(b => b.itemName === itemName && (location === null || b.location === location))
            .reduce((s, b) => s + b.qtyRemaining, 0);
    }

    // Improvement #1: weighted-average landing cost — a quick "what's my
    // stock worth right now" number, separate from FIFO (which still governs
    // actual consumption order and exact realized profit per sale). Useful
    // for an at-a-glance valuation without thinking in batches.
    function getWeightedAvgCost(itemName, location = null) {
        let batches = getStockBatches()
            .filter(b => b.itemName === itemName && b.qtyRemaining > 0 && (location === null || b.location === location));
        let totalQty = batches.reduce((s, b) => s + b.qtyRemaining, 0);
        if (totalQty === 0) return 0;
        let totalValue = batches.reduce((s, b) => s + (b.qtyRemaining * b.landingCost), 0);
        return Math.round((totalValue / totalQty) * 100) / 100;
    }

    // ----------------------------------------------------------------
    // TRANSFERS — move quantity between locations. A transfer OUT simply
    // moves whole batches' worth of stock (FIFO) without changing landing
    // cost (no extra handling cost going out is assumed — only a RETURN trip
    // re-bases cost, per the spec: "if I bring it back... landing price will
    // increase due to loading, unloading and transport").
    // ----------------------------------------------------------------
    function transferStock(itemName, fromLocation, toLocation, qty, transferDate) {
        let { consumed, shortfall } = consumeStockFIFO(itemName, fromLocation, qty);
        consumed.forEach(c => {
            createStockBatch({
                itemName, location: toLocation, qty: c.qtyTaken,
                baseCost: 0, transportCost: 0, unloadingCost: 0,
                landingCost: c.landingCost, // cost carries over unchanged on a plain transfer
                purchaseDate: transferDate, sourceTransferId: 'transfer-' + Date.now()
            });
        });
        logStockMovement({
            type: 'TRANSFER_OUT', itemName, location: fromLocation, qty: qty - shortfall,
            note: `Sent to ${toLocation}` + (shortfall > 0 ? ` (⚠️ ${shortfall} short of stock)` : '')
        });
        return { moved: qty - shortfall, shortfall };
    }

    // RETURN — bringing unused stock back from a site, with an extra landing
    // cost increase for the return trip's loading/unloading/transport. This
    // creates a NEW batch at the destination rather than blending into an
    // existing one, since the per-unit cost is now different.
    function returnStockWithCostIncrease(itemName, fromLocation, toLocation, qty, extraCostPerUnit, returnDate) {
        let { consumed, shortfall } = consumeStockFIFO(itemName, fromLocation, qty);
        consumed.forEach(c => {
            createStockBatch({
                itemName, location: toLocation, qty: c.qtyTaken,
                baseCost: c.landingCost, // original cost becomes the new base
                transportCost: extraCostPerUnit, unloadingCost: 0,
                landingCost: Math.round((c.landingCost + extraCostPerUnit) * 100) / 100,
                purchaseDate: returnDate, sourceTransferId: 'return-' + Date.now()
            });
        });
        logStockMovement({
            type: 'TRANSFER_RETURN', itemName, location: fromLocation, qty: qty - shortfall,
            note: `Returned to ${toLocation} (+₹${extraCostPerUnit}/unit handling)` + (shortfall > 0 ? ` (⚠️ ${shortfall} short)` : '')
        });
        return { moved: qty - shortfall, shortfall };
    }

    // ----------------------------------------------------------------
    // SALE DEDUCTION — the "hybrid" flow: link an invoice, see which
    // quantity comes from which location/batch, confirm to adjust live
    // stock and record realized profit per batch slice.
    // ----------------------------------------------------------------
    function deductStockForSale(itemName, location, qty, sellPricePerUnit, docNo) {
        let { consumed, shortfall } = consumeStockFIFO(itemName, location, qty);
        let totalProfit = 0;
        consumed.forEach(c => {
            let profit = (sellPricePerUnit - c.landingCost) * c.qtyTaken;
            totalProfit += profit;
            logStockMovement({
                type: 'SALE', itemName, location, qty: c.qtyTaken,
                batchId: c.batchId, landingCost: c.landingCost, sellPrice: sellPricePerUnit,
                profit: Math.round(profit * 100) / 100, docNo,
                note: `Sold against ${docNo}`
            });
        });
        return { consumed, shortfall, totalProfit: Math.round(totalProfit * 100) / 100 };
    }

    function manualStockAdjustment(itemName, location, qtyDelta, reason) {
        if (qtyDelta > 0) {
            // Increasing stock with no batch cost info — treated as a zero-cost
            // correction (e.g. found miscounted stock). Flagged clearly in the
            // ledger so it's never mistaken for a real purchase.
            createStockBatch({
                itemName, location, qty: qtyDelta, baseCost: 0, transportCost: 0,
                unloadingCost: 0, landingCost: 0, purchaseDate: new Date().toISOString().slice(0,10)
            });
            logStockMovement({ type: 'ADJUSTMENT', itemName, location, qty: qtyDelta, note: reason || 'Manual increase' });
        } else if (qtyDelta < 0) {
            let { consumed, shortfall } = consumeStockFIFO(itemName, location, -qtyDelta);
            logStockMovement({ type: 'ADJUSTMENT', itemName, location, qty: qtyDelta, note: (reason || 'Manual decrease') + (shortfall > 0 ? ` (⚠️ ${shortfall} short)` : '') });
        }
    }

    // ============================================================
    // TOOLS / EQUIPMENT TRACKER — deliberately separate from sellable Stock.
    // No cost, no FIFO, no batches — just "this tool is currently at this
    // site", with a simple move history. Surfaced inside Site Manager too,
    // so opening a site shows which tools are currently there.
    // ============================================================
    function getToolItems() {
        try { return JSON.parse(localStorage.getItem('kenToolItems') || '[]'); } catch(e) { return []; }
    }
    function saveToolItems(tools) {
        try { localStorage.setItem('kenToolItems', JSON.stringify(tools)); } catch(e) {}
        queueCloudSync('toolItems');
    }
    function getToolMovements() {
        try { return JSON.parse(localStorage.getItem('kenToolMovements') || '[]'); } catch(e) { return []; }
    }
    function saveToolMovements(moves) {
        try { localStorage.setItem('kenToolMovements', JSON.stringify(moves)); } catch(e) {}
        queueCloudSync('toolMovements');
    }

    function addToolItem(name, initialLocation) {
        name = (name || '').trim();
        if (!name) return null;
        let tools = getToolItems();
        if (tools.some(t => t.name.toLowerCase() === name.toLowerCase())) return null;
        let tool = { id: 'TL' + Date.now(), name, currentLocation: initialLocation || 'Stockyard', lastMovedAt: new Date().toISOString() };
        tools.push(tool);
        saveToolItems(tools);
        let moves = getToolMovements();
        moves.push({ id: 'TM' + Date.now(), toolId: tool.id, toolName: name, toLocation: tool.currentLocation, ts: new Date().toISOString(), note: 'Added to tracker' });
        saveToolMovements(moves);
        return tool;
    }

    function moveToolItem(toolId, toLocation, movedBy) {
        let tools = getToolItems();
        let tool = tools.find(t => t.id === toolId);
        if (!tool) return;
        let fromLocation = tool.currentLocation;
        tool.currentLocation = toLocation;
        tool.lastMovedAt = new Date().toISOString();
        saveToolItems(tools);
        let moves = getToolMovements();
        moves.push({ id: 'TM' + Date.now(), toolId, toolName: tool.name, fromLocation, toLocation, movedBy: movedBy || '', ts: new Date().toISOString() });
        saveToolMovements(moves);
    }

    function deleteToolItem(toolId) {
        saveToolItems(getToolItems().filter(t => t.id !== toolId));
    }

    // ============================================================
    // STOCK MANAGER — UI
    // ============================================================
    function openStockManager() {
        document.getElementById('stockManagerModal').style.display = 'flex';
        populateAllLocationDropdowns();
        populateAllItemDropdowns();
        switchStockTab('grid');
        renderStockGrid();
        resetBatchForm();
        renderToolList();
    }
    function closeStockManager() { document.getElementById('stockManagerModal').style.display = 'none'; }

    function switchStockTab(tab) {
        ['Grid','Batch','Transfer','Link','Profit','History','Tools'].forEach(t => {
            document.getElementById('stockTabBtn' + t).classList.toggle('active', t.toLowerCase() === tab);
            document.getElementById('stockTab' + t).classList.toggle('active', t.toLowerCase() === tab);
        });
        if (tab === 'grid') renderStockGrid();
        if (tab === 'tools') renderToolList();
        if (tab === 'profit') renderStockProfitReport();
        if (tab === 'history') renderStockHistory();
    }

    function switchTransferSubTab(sub) {
        document.getElementById('transferSubBtnOut').classList.toggle('active', sub === 'out');
        document.getElementById('transferSubBtnReturn').classList.toggle('active', sub === 'return');
        document.getElementById('transferSubOut').style.display = sub === 'out' ? 'block' : 'none';
        document.getElementById('transferSubReturn').style.display = sub === 'return' ? 'block' : 'none';
    }

    // Fills every location <select> in the Stock Manager from the shared
    // locations list (Stockyard + any Site Manager sites + manually added).
    function populateAllLocationDropdowns() {
        let locs = getStockLocations();
        // Also pull in any Site Manager sites not yet in the stock locations list
        getSites().forEach(s => { if (s.name && !locs.includes(s.name)) locs.push(s.name); });
        saveStockLocations(locs);

        let selectIds = ['batchLocation', 'transferOutFrom', 'transferOutTo', 'transferRetFrom', 'transferRetTo', 'newToolLocation'];
        selectIds.forEach(id => {
            let el = document.getElementById(id);
            if (!el) return;
            let current = el.value;
            el.innerHTML = locs.map(l => `<option value="${l}">${l}</option>`).join('');
            if (locs.includes(current)) el.value = current;
        });

        let gridFilter = document.getElementById('stockGridLocationFilter');
        let currentGridVal = gridFilter.value;
        gridFilter.innerHTML = '<option value="ALL">All Locations</option>' + locs.map(l => `<option value="${l}">${l}</option>`).join('');
        if (currentGridVal) gridFilter.value = currentGridVal;
    }

    // Fills item <select>s from the Stock Items catalog
    function populateAllItemDropdowns() {
        let items = getStockItems();
        let selectIds = ['transferOutItem', 'transferRetItem'];
        selectIds.forEach(id => {
            let el = document.getElementById(id);
            if (!el) return;
            let current = el.value;
            el.innerHTML = items.map(i => `<option value="${i.name}">${i.name}</option>`).join('');
            if (items.some(i => i.name === current)) el.value = current;
        });
    }

    // Groups stock items by a guessed "brand/category" bucket purely for
    // display grouping in the grid — does NOT affect storage, which always
    // keeps brand+size as fully separate items per the earlier decision.
    // Falls back to "Other" for anything that doesn't match a known pattern.
    function guessItemGroup(name) {
        let n = name.toLowerCase();
        if (n.includes('meghalite')) return 'AAC Block — Meghalite';
        if (n.includes('birla')) return 'AAC Block — Birla';
        if (n.includes('mortar')) return 'Jointing Mortar';
        if (n.includes('block')) return 'AAC Block — Other';
        return 'Other Items';
    }

    // TAB 1: Quick visual quantity grid — replaces the per-cart stock warning
    // system entirely, per design decision. Grouped by brand/category, one row
    // per item, one column per location, so low/zero stock is an instant glance
    // rather than an interruption while billing.
    function renderStockGrid() {
        let locFilter = document.getElementById('stockGridLocationFilter').value;
        let items = getStockItems();
        let locs = locFilter === 'ALL' ? getStockLocations() : [locFilter];

        if (items.length === 0) {
            document.getElementById('stockGridBody').innerHTML = '<p style="color:#aaa;padding:20px;text-align:center;">No stock items yet — add your first batch in the "Add Batch" tab.</p>';
            return;
        }

        let groups = {};
        items.forEach(i => {
            let g = guessItemGroup(i.name);
            if (!groups[g]) groups[g] = [];
            groups[g].push(i);
        });

        let html = '';
        Object.keys(groups).sort().forEach(groupName => {
            html += `<div style="margin-bottom:18px;">
                <div style="font-size:13px; font-weight:bold; color:#117864; margin-bottom:6px; padding-bottom:4px; border-bottom:2px solid #d5f5e3;">${groupName}</div>
                <table class="doc-list-table"><thead><tr>
                    <th>Item</th>
                    ${locs.map(l => `<th style="text-align:center;">${l}</th>`).join('')}
                    <th style="text-align:center;">Total</th>
                    <th style="text-align:right;">Avg Cost</th>
                    <th style="text-align:right;">Stock Value</th>
                    <th style="text-align:center;">Threshold</th>
                </tr></thead><tbody>`;

            groups[groupName].forEach(item => {
                // Improvement #2: per-item threshold instead of one hardcoded
                // number for every item — falls back to 50 for items added
                // before this feature existed (no lowStockThreshold saved yet).
                let threshold = item.lowStockThreshold != null ? item.lowStockThreshold : 50;
                let total = 0;
                let cells = locs.map(loc => {
                    let qty = getStockQty(item.name, loc);
                    total += qty;
                    let color = qty === 0 ? '#e74c3c' : (qty < threshold ? '#e67e22' : '#27ae60');
                    return `<td style="text-align:center; font-weight:bold; color:${color};">${qty}</td>`;
                }).join('');

                // Improvement #1: weighted-average cost + total value, a quick
                // valuation view that sits alongside (not instead of) FIFO.
                let avgCost = getWeightedAvgCost(item.name, locFilter === 'ALL' ? null : locFilter);
                let stockValue = avgCost * total;

                html += `<tr>
                    <td>${item.name}</td>
                    ${cells}
                    <td style="text-align:center; font-weight:bold;">${total}</td>
                    <td style="text-align:right; color:#555;">${avgCost > 0 ? '₹' + avgCost.toFixed(2) : '—'}</td>
                    <td style="text-align:right; font-weight:bold; color:#117864;">${stockValue > 0 ? '₹' + stockValue.toLocaleString('en-IN', {maximumFractionDigits:0}) : '—'}</td>
                    <td style="text-align:center;">
                        <input type="number" value="${threshold}" onchange="setItemLowStockThreshold('${item.name.replace(/'/g,"\\'")}', this.value); renderStockGrid();" style="width:60px; padding:4px; font-size:11px; background:#f4f6f7; color:#333; border:1px solid #ccc; margin:0; text-align:center;">
                    </td>
                </tr>`;
            });

            html += `</tbody></table></div>`;
        });

        document.getElementById('stockGridBody').innerHTML = html;
    }

    // ----------------------------------------------------------------
    // TAB 2: ADD BATCH (priority flow)
    // ----------------------------------------------------------------
    let _batchLineCounter = 0;

    function resetBatchForm() {
        document.getElementById('batchPurchaseDate').valueAsDate = new Date();
        document.getElementById('batchLinesBody').innerHTML = '';
        document.getElementById('batchTotalTransport').value = '';
        document.getElementById('batchTotalUnloading').value = '';
        document.getElementById('landingCostPreview').innerHTML = '';
        document.getElementById('batchAttachPdf').value = '';
        document.getElementById('batchIsDraft').checked = false;
        toggleBatchDraftMode();
        _batchLineCounter = 0;
        addBatchLine();
        renderPendingDrafts();
    }

    function addBatchLine() {
        let lineId = 'bl' + (_batchLineCounter++);
        let tbody = document.getElementById('batchLinesBody');
        let row = document.createElement('div');
        row.className = 'item-mgr-row';
        row.style.gridTemplateColumns = '2fr 1fr 1fr auto';
        row.id = 'row_' + lineId;
        row.innerHTML = `
            <input type="text" id="line_name_${lineId}" placeholder="e.g. AAC Block 8 Inch (Meghalite)" list="stockItemSuggestions" oninput="previewLandingCosts()">
            <input type="number" id="line_qty_${lineId}" placeholder="Qty" oninput="previewLandingCosts()">
            <input type="number" id="line_cost_${lineId}" placeholder="₹/unit" oninput="previewLandingCosts()">
            <button class="btn-item-mgr-del" onclick="document.getElementById('row_${lineId}').remove(); previewLandingCosts();">✕</button>
        `;
        tbody.appendChild(row);
        ensureStockItemDatalist();
    }

    // Datalist of known stock items, for autocomplete convenience on the free-text name field
    function ensureStockItemDatalist() {
        let dl = document.getElementById('stockItemSuggestions');
        if (!dl) {
            dl = document.createElement('datalist');
            dl.id = 'stockItemSuggestions';
            document.body.appendChild(dl);
        }
        dl.innerHTML = getStockItems().map(i => `<option value="${i.name}">`).join('');
    }

    function collectBatchLines(isDraft = false) {
        let rows = [...document.querySelectorAll('#batchLinesBody .item-mgr-row')];
        return rows.map(row => {
            let id = row.id.replace('row_', '');
            let name = document.getElementById('line_name_' + id).value.trim();
            let qty = parseFloat(document.getElementById('line_qty_' + id).value) || 0;
            let baseCost = parseFloat(document.getElementById('line_cost_' + id).value) || 0;
            return { lineId: id, itemName: name, qty, baseCost };
        }).filter(l => l.itemName && l.qty > 0 && (isDraft || l.baseCost > 0));
    }

    // Live preview of calculated landing costs as the person fills the form —
    // lets them sanity-check the math (e.g. "does ₹100 base + transport really
    // land at ₹103?") before committing anything to stock.
    function previewLandingCosts() {
        if (document.getElementById('batchIsDraft').checked) return; // no preview needed in draft mode — cost isn't calculated yet
        let lines = collectBatchLines();
        let totalTransport = parseFloat(document.getElementById('batchTotalTransport').value) || 0;
        let totalUnloading = parseFloat(document.getElementById('batchTotalUnloading').value) || 0;
        let preview = document.getElementById('landingCostPreview');

        if (lines.length === 0) { preview.innerHTML = ''; return; }

        let results = calculateLandingCosts(lines, totalTransport, totalUnloading);
        let html = `<div style="background:#f4f6f7; border-radius:6px; padding:12px;">
            <div style="font-size:11px; font-weight:bold; color:#7f8c8d; text-transform:uppercase; margin-bottom:8px;">Calculated Landing Cost Preview</div>
            <table style="width:100%; font-size:12px; border-collapse:collapse;">
                <tr style="color:#7f8c8d; text-align:left;"><th>Item</th><th>Qty</th><th>Base</th><th>+Transport</th><th>+Unloading</th><th>= Landing</th></tr>
                ${results.map(r => `<tr style="border-top:1px solid #ddd;">
                    <td style="padding:4px 0;">${r.itemName}</td>
                    <td>${r.qty}</td>
                    <td>₹${r.baseCost.toFixed(2)}</td>
                    <td>+₹${r.transportShare.toFixed(2)}</td>
                    <td>+₹${r.unloadingShare.toFixed(2)}</td>
                    <td style="font-weight:bold; color:#117864;">₹${r.landingCost.toFixed(2)}</td>
                </tr>`).join('')}
            </table>
        </div>`;
        preview.innerHTML = html;
    }

    // Switches the Add Batch form between normal mode (full landing-cost
    // calculation, required) and draft mode (cost optional/estimated,
    // transport+unloading fields hidden since they're not known yet).
    function toggleBatchDraftMode() {
        let isDraft = document.getElementById('batchIsDraft').checked;
        document.getElementById('batchCostColHeader').innerText = isDraft ? 'Est. Cost (₹/unit, optional)' : 'Base Cost (₹/unit)';
        document.getElementById('batchCostDividerNormal').style.display = isDraft ? 'none' : 'block';
        document.getElementById('batchCostFieldsNormal').style.display = isDraft ? 'none' : 'flex';
        document.getElementById('landingCostPreview').innerHTML = '';
        document.getElementById('btnConfirmAddBatch').innerText = isDraft ? '📋 Log as Draft' : '✅ Confirm & Add Stock';
        document.getElementById('btnConfirmAddBatch').style.background = isDraft ? '#e67e22' : '#27ae60';
    }

    // Pending drafts list + finalize action — rendered whenever the Add
    // Batch tab is shown, so unfinished drafts stay visible as a reminder.
    function renderPendingDrafts() {
        let drafts = getStockBatches().filter(b => b.isDraft);
        let section = document.getElementById('pendingDraftsSection');
        let body = document.getElementById('pendingDraftsBody');
        if (drafts.length === 0) { section.style.display = 'none'; return; }
        section.style.display = 'block';

        body.innerHTML = drafts.map(b => `
            <div style="background:#fff8e1; border:1px solid #ffe082; border-radius:6px; padding:10px 12px; margin-bottom:8px;">
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:6px;">
                    <div style="font-size:13px;"><b>${b.itemName}</b> — ${b.qtyRemaining}/${b.qtyOriginal} remaining at ${b.location}<br>
                    <span style="font-size:11px; color:#888;">Logged ${formatDateDisplay(b.purchaseDate)} · Estimated cost ₹${b.landingCost.toFixed(2)}/unit</span></div>
                    <button class="action-btn" style="background:#e67e22; color:#fff;" onclick="openFinalizeDraftPrompt('${b.id}')">Finalize Bill</button>
                </div>
            </div>
        `).join('');
    }

    // Simple prompt-based finalize flow — re-uses the same landing-cost
    // calculator as a normal batch, just for a single already-existing item.
    function openFinalizeDraftPrompt(batchId) {
        let batch = getStockBatches().find(b => b.id === batchId);
        if (!batch) return;
        let baseCost = parseFloat(prompt(`Finalize "${batch.itemName}" (${batch.qtyOriginal} units)\n\nActual base cost per unit (₹):`, batch.landingCost || '')) || 0;
        if (baseCost <= 0) { alert('Finalization cancelled — base cost must be greater than 0.'); return; }
        let transportTotal = parseFloat(prompt('Total transport cost for this trip (₹) — leave 0 if this item was the only one on the lorry and you want to enter its share directly:', '0')) || 0;
        let unloadingTotal = parseFloat(prompt('Total unloading cost for this trip (₹):', '0')) || 0;

        let calc = calculateLandingCosts([{ itemName: batch.itemName, qty: batch.qtyOriginal, baseCost }], transportTotal, unloadingTotal);
        let finalCost = calc[0].landingCost;

        if (!confirm(`Finalized landing cost: ₹${finalCost.toFixed(2)}/unit (was estimated at ₹${batch.landingCost.toFixed(2)}/unit).\n\nConfirm finalization?`)) return;

        finalizeDraftBatch(batchId, {
            baseCost, transportCost: calc[0].transportShare, unloadingCost: calc[0].unloadingShare, landingCost: finalCost
        });
        showToast('✅ Draft finalized', 'success');
        renderPendingDrafts();
        renderStockGrid();
    }

    function confirmAddBatch() {
        let isDraft = document.getElementById('batchIsDraft').checked;
        let lines = collectBatchLines(isDraft);
        if (lines.length === 0) { alert('Add at least one line item with a name and quantity' + (isDraft ? '.' : ', and base cost.')); return; }
        let location = document.getElementById('batchLocation').value;
        let purchaseDate = document.getElementById('batchPurchaseDate').value;
        let pdfFile = document.getElementById('batchAttachPdf').files[0] || null;
        let createdBatchIds = [];

        if (isDraft) {
            // Draft: no transport/unloading split yet — each line's typed
            // cost (if any) is used as a provisional estimate, defaulting to
            // 0 if left blank entirely (still logs the quantity so it's
            // sellable immediately; cost gets corrected at finalization).
            lines.forEach(l => {
                let batch = createStockBatch({
                    itemName: l.itemName, location, qty: l.qty,
                    isDraft: true, estimatedCost: l.baseCost, purchaseDate
                });
                createdBatchIds.push(batch.id);
            });
            showToast(`📋 ${lines.length} item(s) logged as draft at ${location} — finalize the bill later`, 'info');
        } else {
            let totalTransport = parseFloat(document.getElementById('batchTotalTransport').value) || 0;
            let totalUnloading = parseFloat(document.getElementById('batchTotalUnloading').value) || 0;
            let results = calculateLandingCosts(lines, totalTransport, totalUnloading);
            results.forEach(r => {
                let batch = createStockBatch({
                    itemName: r.itemName, location, qty: r.qty,
                    baseCost: r.baseCost, transportCost: r.transportShare, unloadingCost: r.unloadingShare,
                    landingCost: r.landingCost, purchaseDate
                });
                createdBatchIds.push(batch.id);
            });
            showToast(`✅ ${results.length} item(s) added to stock at ${location}`, 'success');
        }

        populateAllItemDropdowns();
        populateAllLocationDropdowns();

        // Optional purchase bill attachment — all batches created in this
        // submission share the same physical bill, so the same PDF links
        // to all of them (using the first batch's id as the primary link).
        if (pdfFile) {
            _pendingBatchLinkForAuditPdf = createdBatchIds[0];
            let monthKey = (purchaseDate || new Date().toISOString().slice(0,10)).slice(0, 7);
            fileToBase64(pdfFile).then(base64 => {
                fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({
                        action: 'uploadAuditPdf',
                        data: {
                            id: 'AD' + Date.now(), month: monthKey, kind: 'PURCHASE_BILL',
                            fileName: pdfFile.name, base64Pdf: base64,
                            linkedBatchId: createdBatchIds[0]
                        }
                    })
                })
                .then(r => r.json())
                .then(res => {
                    if (res.success) {
                        let docs = getAuditDocs();
                        docs.push({
                            id: res.id, month: monthKey, kind: 'PURCHASE_BILL', fileName: pdfFile.name,
                            driveUrl: res.driveUrl, driveFileId: res.driveFileId,
                            linkedBatchId: createdBatchIds[0], linkedDocNo: '', uploadedAt: new Date().toISOString()
                        });
                        saveAuditDocsLocal(docs);
                        showToast('📎 Purchase bill attached', 'success');
                    } else {
                        showToast('⚠️ Stock added, but bill upload failed — attach it later from Audit', 'error');
                    }
                })
                .catch(() => showToast('⚠️ Stock added, but bill upload failed — attach it later from Audit', 'error'));
            });
        }

        resetBatchForm();
        renderStockGrid();
    }

    // --- UPGRADED PDF EXPORT ENGINE ---
    // U3: now returns a Promise that resolves once the PDF has actually been
    // generated — needed so exportSelectedToPDF() can await each document fully
    // finishing before loading the next one (otherwise two exports could race
    // and capture the wrong document's content).
    function exportToPDF() {
        return new Promise((resolve) => {
            // 1. Lock scroll position to absolute top to prevent Viewport Blank Canvas Bug
            const currentScroll = window.scrollY || document.documentElement.scrollTop;
            window.scrollTo(0, 0);

            const element = document.getElementById('billPage');
            const docNo = document.getElementById('dispDocNo').innerText.replace(/[^a-zA-Z0-9]/g, '_') || 'Draft';
            const filename = `${docNo}.pdf`;

            // Adds our strict A4 CSS overrides
            element.classList.add('pdf-export-mode');

            // Setting PDF config to EXACT A4 pixel mapping with Scroll Lock Enabled
            const opt = {
                margin:       0,
                filename:     filename,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true, scrollY: 0 },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
                pagebreak:    { mode: 'avoid-all' } // 🛡️ Double protection against empty pages
            };

            // 2. The Render Race Buffer: Give the browser 150ms to physically draw the A4 box before taking the picture
            setTimeout(() => {
                html2pdf().set(opt).from(element).save().then(() => {
                    element.classList.remove('pdf-export-mode'); // Revert back to screen view
                    window.scrollTo(0, currentScroll); // Seamlessly return user to where they were looking
                    resolve();
                });
            }, 150);
        });
    }

    // --- CLOUD SYNC & DATA MANAGEMENT ---
    function cleanDate(rawDate) {
        if (!rawDate) return "";
        if (rawDate.includes("T")) {
            return rawDate.split("T")[0]; 
        }
        return rawDate;
    }

    // FIX (code review): new Date("YYYY-MM-DD") parses as UTC midnight, which can
    // shift the date by one day in IST depending on time of day. This helper always
    // parses YYYY-MM-DD as a LOCAL date, matching what updateInfo() already does.
    // Used everywhere analytics code compares/sorts/filters dates.
    function parseLocalDate(rawDate) {
        let clean = cleanDate(rawDate);
        if (!clean) return new Date(0); // epoch fallback for missing dates, sorts first
        let parts = clean.split('-').map(Number);
        if (parts.length !== 3 || parts.some(isNaN)) return new Date(0);
        return new Date(parts[0], parts[1] - 1, parts[2]);
    }

    // U9: Unambiguous date display format — "20 JUN 2026" instead of locale-dependent
    // DD/MM vs MM/DD formats that read differently depending on the device/browser.
    // Used everywhere a date is shown to the person, on-screen or printed.
    const MONTH_ABBR = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
    function formatDateDisplay(rawDate) {
        let clean = cleanDate(rawDate);
        if (!clean) return '';
        let parts = clean.split('-').map(Number);
        if (parts.length !== 3 || parts.some(isNaN)) return clean; // fall back to raw string if unparseable
        let [y, m, d] = parts;
        return `${String(d).padStart(2,'0')} ${MONTH_ABBR[m-1]} ${y}`;
    }

    // Tiny DOM helper for new code — not retrofitted across the whole file to avoid
    // a risky mechanical find-replace, but used in all Batch 7 additions below.
    const $ = id => document.getElementById(id);

    // Lightweight toast notification — used for quiet actions that previously had no feedback
    function showToast(msg, kind = 'success') {
        let existing = document.getElementById('toastNotif');
        if (existing) existing.remove();
        let colors = { success: '#1e8449', error: '#c0392b', info: '#2980b9' };
        let toast = document.createElement('div');
        toast.id = 'toastNotif';
        toast.innerText = msg;
        toast.style.cssText = `position:fixed; bottom:100px; left:50%; transform:translateX(-50%);
            background:${colors[kind]||colors.success}; color:#fff; padding:12px 22px; border-radius:24px;
            font-size:14px; font-weight:bold; box-shadow:0 4px 16px rgba(0,0,0,0.3); z-index:9999;
            opacity:0; transition:opacity 0.25s ease; pointer-events:none;`;
        document.body.appendChild(toast);
        requestAnimationFrame(() => { toast.style.opacity = '1'; });
        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 300);
        }, 2200);
    }

    // BUG FIX (code review): savedDocs starts empty and only fills in once this fetch
    // resolves. If the person opens Ledger/Outstanding/Summary/Sites before that happens
    // (e.g. on a slow connection), every screen silently shows zero data with no
    // indication a sync is even in progress. This flag lets analytics openers show a
    // "still loading" state instead of a misleading empty/zero result.
    let isCloudSyncing = true;

    function syncWithCloud() {
        if(WEB_APP_URL === "PASTE_YOUR_WEB_APP_URL_HERE") { isCloudSyncing = false; return; }
        isCloudSyncing = true;
        fetch(WEB_APP_URL)
            .then(response => response.json())
            .then(data => {
                // BUG FIX (A3): Google Sheets/Apps Script can round-trip numeric ids
                // as strings through JSON depending on cell formatting. Normalizing
                // here means d.id is ALWAYS a number from this point on, everywhere
                // in the app — fixes the selectedDocIds Set silently mismatching
                // string vs number ids (which broke "select all" / bulk actions).
                savedDocs = (data || []).map(d => ({ ...d, id: Number(d.id) }));
                isCloudSyncing = false;
                if(!isCurrentVoided && currentlyLoadedDocId === null) {
                    document.getElementById('docNoIn').value = getNextDocNo(document.getElementById('docType').value);
                    updateInfo();
                }
            })
            .catch(err => { console.error("Cloud Sync Error:", err); isCloudSyncing = false; });

    // U6: Injects user-added custom items into the product dropdown, right before
    // the "[+] Custom Item..." option, so newly-added products are immediately
    // selectable without editing any code.
    function refreshProductDropdown() {
        let selectEl = document.getElementById('prodSelect');
        if (!selectEl) return;
        let currentVal = selectEl.value;
        // Remove any previously-injected custom options (tagged via data-custom)
        selectEl.querySelectorAll('option[data-custom="1"]').forEach(opt => opt.remove());
        // Insert each custom item right before the "[+] Custom Item..." option
        let customOptionEl = selectEl.querySelector('option[value="CUSTOM"]');
        pricingConfig.customItems.forEach(item => {
            let opt = document.createElement('option');
            opt.value = item.name;
            opt.textContent = item.name;
            opt.setAttribute('data-custom', '1');
            selectEl.insertBefore(opt, customOptionEl);
        });
        // Restore selection if it still exists
        if ([...selectEl.options].some(o => o.value === currentVal)) selectEl.value = currentVal;
    }

    // ============================================================
    // Initial pull for the cloud-backed collections added in this session.
    // Local-first design: if localStorage already has data for a collection,
    // it's left untouched (it's the source of truth on this device — the
    // background sync will push it up). If localStorage is EMPTY for a
    // collection (new device, fresh browser, cleared data), it's populated
    // from the cloud instead of starting blank. Sites always seeds
    // _lastSyncedSiteIds regardless, so the very first deletion after load
    // diffs correctly instead of assuming nothing existed before.
    // ============================================================
    function pullCloudCollectionsOnLoad() {
        if (WEB_APP_URL === "PASTE_YOUR_WEB_APP_URL_HERE") return;

        const pulls = [
            ['clients', 'kenClients', getClients, saveClientsLocalOnly],
            ['stockItems', 'kenStockItems', getStockItems, saveStockItemsLocalOnly],
            ['stockBatches', 'kenStockBatches', getStockBatches, saveStockBatchesLocalOnly],
            ['stockMovements', 'kenStockMovements', getStockMovements, saveStockMovementsLocalOnly],
            ['stockLocations', STOCK_LOCATIONS_KEY, getStockLocations, saveStockLocationsLocalOnly],
            ['toolItems', 'kenToolItems', getToolItems, saveToolItemsLocalOnly],
            ['toolMovements', 'kenToolMovements', getToolMovements, saveToolMovementsLocalOnly],
            ['cash', 'kenCashBook', getCashEntries, saveCashEntriesLocalOnly],
            ['projects', 'kenProjects', getProjects, saveProjectsLocalOnly]
        ];
        pulls.forEach(([remoteKey, storageKey, localGetter, localOnlySetter]) => {
            if (localGetter().length > 0) return; // local data already exists — it's the source of truth, don't overwrite
            fetch(WEB_APP_URL + '?sheet=' + remoteKey)
                .then(r => r.json())
                .then(data => { if (data && data.length > 0) localOnlySetter(data); })
                .catch(() => {}); // silent — local-first means this isn't critical-path
        });

        // Sites: always pull (to seed _lastSyncedSiteIds correctly), but only
        // overwrite local data if local is empty, same rule as above.
        fetch(WEB_APP_URL + '?sheet=sites')
            .then(r => r.json())
            .then(data => {
                let cloudSites = (data || []).map(d => ({ ...d, id: Number(d.id) || d.id }));
                _lastSyncedSiteIds = new Set(cloudSites.map(s => String(s.id)));
                if (getSites().length === 0 && cloudSites.length > 0) {
                    try { localStorage.setItem('kenSites', JSON.stringify(cloudSites)); } catch(e) {}
                }
            })
            .catch(() => {});

        // Config: unlike the others, pricingConfig is an OBJECT with
        // hardcoded defaults baked in (not an empty array), so "is local
        // already populated" can't be a .length check — it has to check
        // whether localStorage has a saved key at all. Only pulls from
        // cloud on a genuinely fresh device; an existing device's
        // (possibly-default) local config is never silently overwritten.
        if (!localStorage.getItem('kenPricingConfig')) {
            fetch(WEB_APP_URL + '?sheet=config')
                .then(r => r.json())
                .then(data => {
                    if (data && data.pricingConfig) {
                        pricingConfig = data.pricingConfig;
                        try { localStorage.setItem('kenPricingConfig', JSON.stringify(pricingConfig)); } catch(e) {}
                    }
                })
                .catch(() => {});
        }
    }

    // Maps backup file keys to: [human label, local save function, cloud
    // bulkSync collection name (null if it doesn't use bulkSync)]. Sites is
    // handled separately below since it needs the per-entry saveSite path,
    // same reason it's excluded from SYNC_COLLECTION_MAP elsewhere.
    const RESTORE_COLLECTION_MAP = {
        clients:        ['Clients', saveClients, 'clients'],
        stockItems:     ['Stock Items', saveStockItems, 'stockItems'],
        stockBatches:   ['Stock Batches', saveStockBatches, 'stockBatches'],
        stockMovements: ['Stock Movements', saveStockMovements, 'stockMovements'],
        toolItems:      ['Tool Items', saveToolItems, 'toolItems'],
        toolMovements:  ['Tool Movements', saveToolMovements, 'toolMovements'],
        cashBook:       ['Cash Book Entries', saveCashEntries, 'cashBook'],
        projects:       ['Projects', saveProjects, 'projects']
    };

    function handleRestoreFileSelected() {
        let fileInput = document.getElementById('restoreFileInput');
        let statusEl = document.getElementById('restoreStatus');
        if (!fileInput.files || fileInput.files.length === 0) return;

        let reader = new FileReader();
        reader.onload = () => {
            let parsed;
            try {
                parsed = JSON.parse(reader.result);
            } catch (e) {
                statusEl.innerHTML = '❌ This file isn\'t valid JSON — make sure you selected the right backup file.';
                return;
            }

            // Basic sanity check — a genuine backup from downloadFullBackup()
            // always has these two keys. Catches "wrong file selected"
            // before any preview is shown, rather than silently restoring
            // garbage.
            if (!('exportedAt' in parsed) || !('appVersion' in parsed)) {
                statusEl.innerHTML = '❌ This doesn\'t look like a KEN Traders backup file (missing expected fields).';
                return;
            }

            _pendingRestoreData = parsed;
            renderRestorePreview(parsed);
            document.getElementById('restoreStepPick').style.display = 'none';
            document.getElementById('restoreStepPreview').style.display = 'block';
            statusEl.innerHTML = '';
        };
        reader.onerror = () => { statusEl.innerHTML = '❌ Could not read the file.'; };
        reader.readAsText(fileInput.files[0]);
    }

    function renderRestorePreview(data) {
        let exportedDate = data.exportedAt ? new Date(data.exportedAt).toLocaleString('en-IN') : 'unknown date';
        let collections = [
            ['documents', 'Documents (invoices, quotes, etc.)'],
            ['clients', 'Clients'],
            ['stockItems', 'Stock Items'],
            ['stockBatches', 'Stock Batches'],
            ['stockMovements', 'Stock Movements'],
            ['toolItems', 'Tool Items'],
            ['toolMovements', 'Tool Movements'],
            ['cashBook', 'Cash Book Entries'],
            ['sites', 'Sites'],
            ['projects', 'Projects'],
            ['auditDocs', 'Purchase Bill / RCM links (metadata only)']
        ];

        let rows = collections.map(([key, label]) => {
            let present = Array.isArray(data[key]);
            let count = present ? data[key].length : 0;
            return `<tr>
                <td>${label}</td>
                <td style="text-align:right; font-weight:bold; color:${present ? '#2c3e50' : '#bbb'};">${present ? count : '— not in this file —'}</td>
            </tr>`;
        }).join('');

        document.getElementById('restorePreviewBody').innerHTML = `
            <div style="font-size:12px; color:#7f8c8d; margin-bottom:10px;">Backup taken: <b>${exportedDate}</b> (${data.appVersion || 'unknown version'})</div>
            <table class="analytics-table"><tbody>${rows}</tbody></table>
            <div style="font-size:11px; color:#888; margin-top:8px;">Only the collections actually present in this file will be touched — anything missing from the file (shown greyed out above) is left exactly as it is now.</div>
        `;
    }

    function executeRestore() {
        if (!_pendingRestoreData) return;
        let pwd = document.getElementById('restorePasswordInput').value;
        if (pwd !== MASTER_PASSWORD) { alert('Incorrect password.'); return; }
        if (!confirm('Final confirmation: this will overwrite live data for every collection present in the backup file. This cannot be undone from within the app. Proceed?')) return;

        let statusEl = document.getElementById('restoreStatus');
        statusEl.innerHTML = '⏳ Restoring…';
        let data = _pendingRestoreData;

        // Documents: not part of SYNC_COLLECTION_MAP (it has its own save
        // path with the docNo collision guard), so restored documents are
        // pushed through the same per-document saveDocument cloud action,
        // sequentially, to respect that safety net rather than bypassing it
        // with a raw bulk write.
        let restoreDocsSequentially = (docs) => {
            if (!Array.isArray(docs) || docs.length === 0) return Promise.resolve();
            let remaining = [...docs];
            return new Promise((resolve) => {
                let next = () => {
                    if (remaining.length === 0) { resolve(); return; }
                    let d = remaining.shift();
                    if (WEB_APP_URL === "PASTE_YOUR_WEB_APP_URL_HERE") { next(); return; }
                    fetch(WEB_APP_URL, {
                        method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action: 'save', data: d })
                    }).then(() => next()).catch(() => next()); // best-effort — a single bad row shouldn't halt the whole restore
                };
                next();
            });
        };

        // Sites: same reasoning as the regular sync engine — needs the
        // per-entry saveSite cloud action, not raw bulkSync, because of the
        // timeline field shape mismatch noted elsewhere in this file.
        let restoreSites = (sites) => {
            if (!Array.isArray(sites)) return Promise.resolve();
            try { localStorage.setItem('kenSites', JSON.stringify(sites)); } catch(e) {}
            if (WEB_APP_URL === "PASTE_YOUR_WEB_APP_URL_HERE") return Promise.resolve();
            return Promise.all(sites.map(s => fetch(WEB_APP_URL, {
                method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: 'saveSite', data: s })
            }).catch(() => null)));
        };

        // Stock Locations: stored as plain name strings locally but as
        // {name} objects in the backup/cloud shape — same conversion used
        // by downloadFullBackup() and pullCloudCollectionsOnLoad().
        let restoreLocations = (locs) => {
            if (!Array.isArray(locs)) return Promise.resolve();
            let names = locs.map(l => typeof l === 'string' ? l : l.name).filter(Boolean);
            saveStockLocations(names); // already queues its own cloud sync
            return Promise.resolve();
        };

        let restoreConfig = (cfg) => {
            if (!cfg || typeof cfg !== 'object') return;
            pricingConfig = cfg;
            savePricingConfig(); // existing function — persists locally + cloud (Config tab)
        };

        Promise.all([
            restoreDocsSequentially(data.documents),
            restoreSites(data.sites),
            restoreLocations(data.stockLocations)
        ]).then(() => {
            // The remaining collections all share the same simple shape, so
            // they go through the existing local-save functions (which
            // already queue their own debounced cloud bulkSync) rather than
            // duplicating that logic here.
            Object.entries(RESTORE_COLLECTION_MAP).forEach(([key, [label, saveFn]]) => {
                if (Array.isArray(data[key])) saveFn(data[key]);
            });
            if (data.config) restoreConfig(data.config);
            if (Array.isArray(data.auditDocs)) saveAuditDocsLocal(data.auditDocs);

            // Refresh savedDocs in memory immediately so the rest of the
            // app (doc list, ledger, outstanding) reflects the restore
            // without needing a manual reload.
            if (Array.isArray(data.documents)) savedDocs = data.documents.map(d => ({ ...d, id: Number(d.id) || d.id }));

            statusEl.innerHTML = '✅ Restore complete.';
            showToast('✅ Data restored from backup', 'success');
            setTimeout(() => { closeRestoreModal(); location.reload(); }, 1500); // reload so every screen reflects the restored state cleanly
        }).catch(err => {
            statusEl.innerHTML = '❌ Restore failed partway: ' + err.message + ' — some data may have been restored. Check your collections before continuing.';
        });
    }

    function downloadFullBackup() {
        showToast('⏳ Gathering backup data…', 'info');

        let fetchOrLocal = (sheetParam, localGetter) => {
            if (WEB_APP_URL === "PASTE_YOUR_WEB_APP_URL_HERE") return Promise.resolve(localGetter());
            return fetch(WEB_APP_URL + '?sheet=' + sheetParam)
                .then(r => r.json())
                .then(data => (data && data.length >= 0) ? data : localGetter())
                .catch(() => localGetter());
        };

        Promise.all([
            fetchOrLocal('documents', () => savedDocs),
            fetchOrLocal('clients', getClients),
            fetchOrLocal('stockItems', getStockItems),
            fetchOrLocal('stockBatches', getStockBatches),
            fetchOrLocal('stockMovements', getStockMovements),
            fetchOrLocal('stockLocations', () => getStockLocations().map(name => ({ name }))),
            fetchOrLocal('toolItems', getToolItems),
            fetchOrLocal('toolMovements', getToolMovements),
            fetchOrLocal('cash', getCashEntries),
            fetchOrLocal('sites', getSites),
            fetchOrLocal('config', () => pricingConfig),
            fetchOrLocal('projects', getProjects)
        ]).then(([documents, clients, stockItems, stockBatches, stockMovements, stockLocations, toolItems, toolMovements, cashBook, sites, config, projects]) => {
            let backup = {
                exportedAt: new Date().toISOString(),
                appVersion: 'KEN Traders Master OS v17',
                documents, clients, stockItems, stockBatches, stockMovements,
                stockLocations, toolItems, toolMovements, cashBook, sites, config, projects,
                auditDocs: getAuditDocs() // metadata only — actual PDFs stay in Drive, not duplicated into this file
            };

            let blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
            let url = URL.createObjectURL(blob);
            let a = document.createElement('a');
            let dateStamp = new Date().toISOString().slice(0, 10);
            a.href = url;
            a.download = `KEN-Traders-Backup-${dateStamp}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            showToast('✅ Backup downloaded', 'success');
        }).catch(err => {
            showToast('❌ Backup failed: ' + err.message, 'error');
        });
    }

    // --- CORE ENGINE MATH ---
    function getBlockSize(pName) {
        if(pName.includes("4 Inch")) return 4;
        if(pName.includes("6 Inch")) return 6;
        if(pName.includes("8 Inch")) return 8;
        if(pName.includes("9 Inch")) return 9;
        return 0;
    }

    function calculateTotalTonnage() {
        let kg = 0;
        cart.forEach(item => {
            let size = getBlockSize(item.p);
            if(size > 0) kg += (item.q * pricingConfig.weights[size]);
        });
        return kg / 1000;
    }

    function getDynamicBlockRate(pName, customTier = "DEFAULT", customDelivery = "DEFAULT") {
        let size = getBlockSize(pName);
        if(size === 0) {
            // U6: was a hardcoded if/else chain — now reads from pricingConfig so
            // rates can be edited in the Item Manager UI instead of in code.
            if (pricingConfig.itemDefaults[pName]) return pricingConfig.itemDefaults[pName].rate;
            let custom = pricingConfig.customItems.find(c => c.name === pName);
            if (custom) return custom.rate;
            return 0;
        }

        let tier = customTier !== "DEFAULT" ? customTier : document.getElementById('globalTierSelect').value;
        let perInch = pricingConfig.tiers[tier] || 15.5;
        let basePrice = size * perInch;

        let isWholesale = false;
        if (customDelivery === "Wholesale") isWholesale = true;
        else if (customDelivery === "Retail") isWholesale = false;
        else isWholesale = (calculateTotalTonnage() >= pricingConfig.wholesaleTonnage);

        return basePrice + (isWholesale ? 0 : pricingConfig.retailPremium);
    }

    function updateCartPricing() {
        let currentTonnage = calculateTotalTonnage();
        document.getElementById('liveTonnageTracker').innerText = `Cart Tonnage: ${currentTonnage.toFixed(2)} T`;
        
        cart.forEach(item => {
            if (!item.isManuallyPriced && getBlockSize(item.p) > 0) {
                item.r = getDynamicBlockRate(item.p, item.tierOverride, item.deliveryOverride);
            }
        });
        renderTable();
    }

    // Improvement #8: shows live stock for the selected product, broken
    // down by location, right next to the picker. Only meaningful for
    // physical stock-tracked items (blocks/mortar/etc, whatever exists in
    // the Stock Manager catalog) — hidden entirely for services (Transport,
    // Loading) or items never added to Stock, since "stock" doesn't apply.
    function updateStockCheckIndicator(productName) {
        let el = document.getElementById('stockCheckIndicator');
        if (!productName || productName === 'CUSTOM') { el.style.display = 'none'; return; }

        let stockItem = getStockItems().find(i => i.name === productName);
        if (!stockItem) { el.style.display = 'none'; return; } // not a tracked stock item — nothing to show

        let locs = getStockLocations();
        let breakdown = locs.map(l => ({ loc: l, qty: getStockQty(productName, l) })).filter(x => x.qty > 0);
        let total = breakdown.reduce((s, x) => s + x.qty, 0);

        el.style.display = 'block';
        if (total === 0) {
            el.innerHTML = '⚠️ Out of stock everywhere';
            el.style.background = '#fdedec'; el.style.color = '#c0392b';
        } else {
            let detail = breakdown.map(x => `${x.loc}: ${x.qty}`).join(' · ');
            el.innerHTML = `📦 In stock: <b>${total}</b> (${detail})`;
            el.style.background = '#eafaf1'; el.style.color = '#1e8449';

    function triggerRateAutoFill() {
        const prod = document.getElementById('prodSelect').value;
        if (!prod || prod === "CUSTOM") return;
        
        let rawQ = document.getElementById('qtyInput').value;
        let dummyQ = rawQ === "" ? 1 : parseFloat(rawQ);
        
        let originalTonnage = calculateTotalTonnage();
        let size = getBlockSize(prod);
        let hypotheticalTonnage = originalTonnage;
        if(size > 0) hypotheticalTonnage += ((dummyQ * pricingConfig.weights[size]) / 1000);
        
        let isWholesale = hypotheticalTonnage >= pricingConfig.wholesaleTonnage;
        
        let tier = document.getElementById('globalTierSelect').value;
        let perInch = pricingConfig.tiers[tier] || 15.5;
        
        let calculatedRate = 0;
        if(size > 0) calculatedRate = (size * perInch) + (isWholesale ? 0 : pricingConfig.retailPremium);
        else calculatedRate = getDynamicBlockRate(prod); 

        document.getElementById('rateInput').value = calculatedRate || "";
    }

    // ----------------------------------------------------------------
    // G3: GSTIN FORMAT VALIDATION
    // ----------------------------------------------------------------
    // Structure: 2-digit state code + 10-char PAN + 1-digit entity number +
    // 'Z' (fixed by convention) + 1 checksum character. This checks
    // STRUCTURE only (regex), not the actual GST portal checksum algorithm
    // (which would need a small checksum computation) — structure alone
    // catches the overwhelming majority of real-world mistakes: wrong
    // length, transposed digits, lowercase letters, stray spaces. This is
    // deliberately advisory, never blocking — a manual/legacy GSTIN that
    // doesn't fit the modern pattern, or a deliberately blank field for a
    // walk-in customer, must never prevent saving a document.
    const GSTIN_PATTERN = /^[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z]{1}[1-9A-Z]{1}Z[0-9A-Z]{1}$/;

    function validateGSTINField() {
        let input = document.getElementById('gstinIn');
        let msg = document.getElementById('gstinValidationMsg');
        let val = input.value.trim().toUpperCase();

        // Blank or explicitly "URD" (Unregistered Dealer) is a legitimate,
        // valid state — not every client has a GSTIN. Don't show anything.
        if (!val || val === 'URD' || val === 'UNREGISTERED') {
            msg.style.display = 'none';
            return;
        }

        if (GSTIN_PATTERN.test(val)) {
            msg.style.display = 'block';
            msg.innerText = '✅ Valid GSTIN format';
            msg.style.background = '#eafaf1'; msg.style.color = '#1e8449';
        } else {
            msg.style.display = 'block';
            // Specific, actionable feedback rather than just "invalid" —
            // length is the single most common mistake (a digit dropped or
            // doubled when copying off a bill).
            if (val.length !== 15) {
                msg.innerText = `⚠️ GSTIN should be 15 characters (currently ${val.length}) — double-check against the client's certificate`;
            } else {
                msg.innerText = '⚠️ Doesn\'t match standard GSTIN structure — verify before filing. If this is correct, you can ignore this warning.';
            }
            msg.style.background = '#fef5e7'; msg.style.color = '#b9770e';
        }
    }

    function addItem() {
        let p = document.getElementById('prodSelect').value;
        let wasCustomEntry = (p === 'CUSTOM');
        if (p === 'CUSTOM') p = document.getElementById('customProdIn').value;
        
        let typedRate = parseFloat(document.getElementById('rateInput').value) || 0;
        let rawQ = document.getElementById('qtyInput').value;
        let q = rawQ === "" ? 1 : parseFloat(rawQ); 
        
        if(!p) return;
        if(typedRate<=0) { alert("Please specify a valid price transaction value."); return; }
        
        let isDuplicate = cart.some(item => item.p === p);
        if(isDuplicate) {
            alert(`Execution Halted: "${p}" has already been processed inside this document. Use the edit feature to change its parameters.`);
            return;
        }

        // i10: CUSTOM ITEM MEMORY — track how many times this exact free-text
        // name has been typed across sessions. After it's been typed a few
        // times, offer to promote it into the permanent catalog so it stops
        // needing to be retyped from scratch. Only fires for genuinely
        // free-text entries (wasCustomEntry), never for items already in the
        // dropdown — those are already "in the catalog" by definition.
        if (wasCustomEntry) trackCustomItemUsage(p, typedRate);

        let btn = document.getElementById('btnAddItemMain');
        btn.classList.add('pressed-state');
        setTimeout(() => btn.classList.remove('pressed-state'), 150);

        // U6: check custom items / item defaults first for HSN+GST, since a
        // user-added product won't match the Block/Mortar keyword heuristics.
        let customItemCfg = pricingConfig.customItems.find(c => c.name === p);
        let itemDefaultCfg = pricingConfig.itemDefaults[p];
        let hsn, g;
        if (customItemCfg) { hsn = customItemCfg.hsn || "9965"; g = customItemCfg.gst || 18; }
        else if (itemDefaultCfg) { hsn = itemDefaultCfg.hsn || "9965"; g = itemDefaultCfg.gst || 18; }
        else { hsn = p.includes("Block") ? "6815" : (p.includes("Mortar") ? "3824" : "9965"); g = p.includes("Block") ? 12 : 18; }

        let selectEl = document.getElementById('prodSelect');
        let optionOrderIndex = 999;
        for (let i = 0; i < selectEl.options.length; i++) {
            if (selectEl.options[i].value === p) { optionOrderIndex = i; break; }
        }
        
        let expectedDynamicRate = getDynamicBlockRate(p);
        let isManuallyPriced = Math.abs(typedRate - expectedDynamicRate) > 0.1;
        
        cart.push({ 
            p, hsn, q, r: typedRate, g, rawQ: rawQ,
            unit: document.getElementById('unitSelect').value || 'Nos',  // F6
            notes: document.getElementById('itemNotesIn').value || '',    // F17
            defaultSortIndex: optionOrderIndex,
            isManuallyPriced: isManuallyPriced,
            tierOverride: "DEFAULT",
            deliveryOverride: "DEFAULT"
        });
        
        executeCartDefaultSort();
        updateCartPricing();
        markDirty(); // F18: mark unsaved

        document.getElementById('prodSelect').value = "";
        document.getElementById('customProdIn').style.display = "none";
        document.getElementById('customProdIn').value = "";
        document.getElementById('qtyInput').value = "";
        document.getElementById('rateInput').value = "";
        document.getElementById('itemNotesIn').value = ""; // F17: clear notes
        document.getElementById('stockCheckIndicator').style.display = 'none'; // Improvement #8: clear stale stock info
    }

    // ----------------------------------------------------------------
    // i10: CUSTOM ITEM MEMORY
    // ----------------------------------------------------------------
    // Lightweight, local-only usage counter (not cloud-synced — losing this
    // on a fresh device just means re-earning the prompt, no real data is
    // at risk). After a free-text item has been typed 3 times, offers to
    // promote it into the permanent catalog using the SAME mechanism as
    // manually adding one via Item Defaults, so a promoted item behaves
    // identically afterward (shows in the dropdown, has a saved default
    // rate/GST/unit).
    const CUSTOM_ITEM_PROMOTE_THRESHOLD = 3;

    function getCustomItemUsage() {
        try { return JSON.parse(localStorage.getItem('kenCustomItemUsage') || '{}'); } catch(e) { return {}; }
    }
    function saveCustomItemUsage(usage) {
        try { localStorage.setItem('kenCustomItemUsage', JSON.stringify(usage)); } catch(e) {}
    }

    function trackCustomItemUsage(name, rate) {
        let usage = getCustomItemUsage();
        let key = name.trim().toLowerCase(); // case-insensitive matching — "Diesel" and "diesel" shouldn't count as two different things
        if (!usage[key]) usage[key] = { count: 0, lastRate: rate, displayName: name };
        usage[key].count += 1;
        usage[key].lastRate = rate; // keep the most recent rate as the suggested default if promoted
        usage[key].displayName = name; // keep the most recently-typed casing/spelling as the display name
        saveCustomItemUsage(usage);

        if (usage[key].count === CUSTOM_ITEM_PROMOTE_THRESHOLD) {
            // Only offer once — if declined, don't ask again for this item
            // every single time (that would get annoying fast). A person
            // can still add it manually via Item Defaults later if they
            // change their mind.
            offerCatalogPromotion(usage[key].displayName, usage[key].lastRate);
        }
    }

    function offerCatalogPromotion(name, suggestedRate) {
        // Skip silently if it somehow already made it into the catalog by
        // another path in the meantime (e.g. added manually) — avoids a
        // confusing "add it?" prompt for something already added.
        if (pricingConfig.customItems.some(c => c.name === name)) return;

        if (confirm(
            `"${name}" has been typed as a custom item ${CUSTOM_ITEM_PROMOTE_THRESHOLD} times now.\n\n` +
            `Add it to your product list permanently? It'll show up in the dropdown from now on, with ₹${suggestedRate} as the default rate (18% GST, editable anytime in Item Defaults).`
        )) {
            pricingConfig.customItems.push({ name, rate: suggestedRate, gst: 18, hsn: '9965', unit: 'Nos' });
            persistPricingConfig();
            renderCustomItems();
            refreshProductDropdown();
            showToast(`✅ "${name}" added to your product list`, 'success');
        }
    }

    function executeCartDefaultSort() { cart.sort((a, b) => a.defaultSortIndex - b.defaultSortIndex); }

    function shiftItemPosition(index, direction) {
        if (direction === 'UP' && index > 0) {
            let temp = cart[index]; cart[index] = cart[index - 1]; cart[index - 1] = temp;
        } else if (direction === 'DOWN' && index < cart.length - 1) {
            let temp = cart[index]; cart[index] = cart[index + 1]; cart[index + 1] = temp;
        }
        renderTable();
    }

    function saveInlineItemEdit() {
        if (activeEditIndex === null) return;
        let item = cart[activeEditIndex];
        let newQty = parseFloat(document.getElementById('uxEditQty').value) || 0;
        let updatedRate = parseFloat(document.getElementById('uxEditRate').value) || 0;
        
        if (newQty <= 0 || updatedRate <= 0) { alert("Quantity and rate variables must remain positive real values."); return; }
        
        let newTier = document.getElementById('uxEditTier').value;
        let newDel = document.getElementById('uxEditDelivery').value;
        
        let expectedDynamic = getDynamicBlockRate(item.p, newTier, newDel);

        item.q = newQty;
        item.rawQ = newQty;
        item.r = updatedRate;
        item.tierOverride = newTier;
        item.deliveryOverride = newDel;
        item.isManuallyPriced = Math.abs(updatedRate - expectedDynamic) > 0.1;
        item.g = parseInt(document.getElementById('uxEditGst').value) || item.g; // F12
        item.notes = document.getElementById('uxEditNote').value || '';           // F17
        
        closeInlineItemEdit();
        updateCartPricing();
    }
