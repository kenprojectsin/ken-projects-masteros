    function autoAddMortar() {
        let totalBags = 0, hasBlocks = false;
        cart.forEach(i => { 
            if(i.p.includes("Block")) {
                hasBlocks = true;
                if(i.p.includes("4 Inch")) totalBags += (i.q / 105);
                else if(i.p.includes("8 Inch")) totalBags += (i.q / 47.5);
                else if(i.p.includes("9 Inch")) totalBags += (i.q / 42.5);
                else totalBags += (i.q / 72.5);
            } 
        });
        if(!hasBlocks) { alert("Add blocks first!"); return; }
        
        let bags = Math.ceil(totalBags), found = false, foundIndex = -1;
        cart.forEach((i, index) => { if(i.p.includes("Mortar")) { found = true; foundIndex = index; } });
        
        if(found) {
            cart[foundIndex].q = bags; cart[foundIndex].rawQ = bags;
        } else {
            let optionOrderIndex = 999;
            let selectEl = document.getElementById('prodSelect');
            for (let i = 0; i < selectEl.options.length; i++) {
                if (selectEl.options[i].value === "Jointing Mortar (40 Kg bag)") { optionOrderIndex = i; break; }
            }
            cart.push({ 
                p: "Jointing Mortar (40 Kg bag)", hsn: "3824", q: bags, r: 550, g: 18, rawQ: bags, 
                defaultSortIndex: optionOrderIndex, isManuallyPriced: false, tierOverride: "DEFAULT", deliveryOverride: "DEFAULT"
            });
        }
        executeCartDefaultSort();
        updateCartPricing();

        let mBtn = document.getElementById('btnMortar');
        let originalText = mBtn.innerText;
        mBtn.innerText = `🪄 ${bags} Bags Appended!`;
        mBtn.classList.add('pressed-state');
        setTimeout(() => { mBtn.innerText = originalText; mBtn.classList.remove('pressed-state'); }, 2000);
    }

    function renderTable() {
        let type = document.getElementById('docType').value, tbody = document.getElementById('tableBody');
        // F21: SAL = simple sales invoice (no HSN/GST cols), F7: CRN = credit note (negative amounts)
        let isInc = document.getElementById('inclusiveTax').checked;
        let isInv = (type === 'INV');
        let isAdv = (type === 'ADV');
        let isSal = (type === 'SAL');
        let isCrn = (type === 'CRN');
        // F6: show unit col on QUO, SAL, CRN
        let showUnit = (type === 'QUO' || type === 'SAL' || type === 'CRN');

        document.getElementById('thSno').style.display = isInv ? 'table-cell' : 'none';
        document.getElementById('thHsn').style.display = isInv ? 'table-cell' : 'none';
        document.getElementById('thGst').style.display = isInv ? 'table-cell' : 'none';
        document.getElementById('thRate').style.display = isAdv ? 'none' : 'table-cell';
        document.getElementById('thTotalLabel').innerText = isInv ? 'Taxable Amt' : (isCrn ? 'Credit Amt' : 'Amount (₹)');

        let tTax = 0, tCgst6 = 0, tCgst9 = 0, tSimple = 0;
        let rowsHTML = '';

        cart.forEach((i, x) => {
            let rate = (isInv && isInc) ? i.r / (1 + (i.g / 100)) : i.r;
            let rowTotal = rate * i.q;
            tTax += rowTotal; tSimple += (i.r * i.q);

            if(i.g === 12) tCgst6 += (rowTotal * 0.06);
            if(i.g === 18) tCgst9 += (rowTotal * 0.09);

            // F6: unit label — stored on item or fall back to 'Nos'
            let unitLabel = i.unit || 'Nos';

            let row = `<tr>`;
            if(isInv) row += `<td class="text-center">${x+1}</td>`;

            row += `<td class="text-left">
                <div style="font-weight: 600; color: #2c3e50;">${i.p}</div>
                ${i.notes ? `<div class="item-notes-print">${i.notes}</div>` : ''}
                <div class="action-flex-wrapper no-print" style="margin-top: 8px;">
                    <button class="action-btn btn-move-item" onclick="shiftItemPosition(${x}, 'UP')">▲</button>
                    <button class="action-btn btn-move-item" onclick="shiftItemPosition(${x}, 'DOWN')">▼</button>
                    <button class="action-btn btn-edit-item" onclick="openInlineItemEdit(${x})">📝 Edit</button>
                    <button class="action-btn btn-del" style="padding: 5px 8px;" onclick="removeItem(${x})">X</button>
                </div>
            </td>`;

            if(isInv) row += `<td class="text-center">${i.hsn}</td>`;
            // F6: show qty + unit label together
            row += `<td class="text-center">${i.rawQ === "" ? "" : i.q}${showUnit ? ' <span style="font-size:10px;color:#888;">'+unitLabel+'</span>' : ''}</td>`;
            if(!isAdv) row += `<td class="text-right">${rate.toFixed(2)}</td>`;
            if(isInv) row += `<td class="text-center">${i.g}%</td>`;
            // CRN amounts shown in red as negative credits
            let dispAmt = isInv ? rowTotal : (i.r * i.q);
            let amtStyle = isCrn ? 'color:#e74c3c;' : '';
            row += `<td class="text-right" style="font-weight:bold;${amtStyle}">${isCrn ? '- ' : ''}${dispAmt.toFixed(2)}</td>`;
            row += `</tr>`;
            rowsHTML += row;
        });
        tbody.innerHTML = rowsHTML;

        let dataCols = isInv ? 7 : (isAdv ? 3 : 4);
        let labelSpan = dataCols - 1;

        document.querySelectorAll('.dynamic-colspan').forEach(td => td.colSpan = labelSpan);
        document.querySelectorAll('.dynamic-colspan-full').forEach(td => td.colSpan = dataCols);

        let grand = isInv ? Math.round(tTax + (tCgst6*2) + (tCgst9*2)) : Math.round(tSimple);
        document.getElementById('taxRows').style.display = isInv ? 'table-row' : 'none';
        document.getElementById('dispTaxable').innerText = tTax.toFixed(2);

        if(isInv && tCgst6 > 0) {
            document.getElementById('gst12ComboRow').style.display = 'table-row';
            document.getElementById('dispGst12Combined').innerText = (tCgst6 * 2).toFixed(2);
        } else { document.getElementById('gst12ComboRow').style.display = 'none'; }

        if(isInv && tCgst9 > 0) {
            document.getElementById('gst18ComboRow').style.display = 'table-row';
            document.getElementById('dispGst18Combined').innerText = (tCgst9 * 2).toFixed(2);
        } else { document.getElementById('gst18ComboRow').style.display = 'none'; }

        let grandLabel = isAdv ? "TOTAL ADVANCE (₹):" : (isCrn ? "TOTAL CREDIT (₹):" : "GRAND TOTAL (₹):");
        document.getElementById('grandText').innerText = grandLabel;
        document.getElementById('dispGrand').innerText = grand.toLocaleString('en-IN', {minimumFractionDigits:2});

        let advAmt = 0, advSummaryParts = [];
        if((isInv || isSal) && document.getElementById('advLinkBody')) {
            document.querySelectorAll('#advLinkBody tr').forEach(row => {
                let refEl = row.querySelector('.adv-ref-in');
                let amtEl = row.querySelector('.adv-amt-in');
                let ref = refEl ? refEl.value : '';
                let amt = parseFloat(amtEl ? amtEl.value : 0) || 0;
                if(amt > 0) { advAmt += amt; if(ref) advSummaryParts.push(ref); }
            });
            let balDisplay = grand - advAmt;
            let totalEl = document.getElementById('advLinkTotal');
            let balEl = document.getElementById('advLinkBalance');
            if(totalEl) totalEl.innerText = '₹' + advAmt.toLocaleString('en-IN');
            if(balEl) { balEl.innerText = '₹' + Math.max(0,balDisplay).toLocaleString('en-IN'); balEl.style.color = balDisplay > 0 ? '#ffeb3b' : '#2ecc71'; }

        if((isInv || isSal) && advAmt > 0) {
            document.getElementById('advanceRow').style.display = 'table-row';
            document.getElementById('balanceRow').style.display = 'table-row';
            let refText = advRef ? ` (${advRef})` : '';
            document.getElementById('lblAdvanceText').innerText = `Less: Advance Adjusted${refText}:`;
            document.getElementById('dispAdvance').innerText = "- " + advAmt.toLocaleString('en-IN', {minimumFractionDigits:2});
            let balance = grand - advAmt; if(balance < 0) balance = 0;

            if(document.getElementById('advanceRow')) document.getElementById('advanceRow').style.display = 'none';
            if(document.getElementById('balanceRow')) document.getElementById('balanceRow').style.display = 'none';
            document.getElementById('dispSalesWords').innerText = "Rupees " + numberToWords(grand) + " Only";
        }

        let mode = document.getElementById('salesPayMode').value;
        if(mode && (type === 'INV' || type === 'SAL')) {
            document.getElementById('paymentPrintRow').style.display = 'table-row';
            let txt = "Payment: " + mode;
            if(mode==='UPI') txt += " (UTR: " + document.getElementById('salesUpiDetails').value + ")";
            if(mode==='Bank Transfer') txt += " (Ref: " + document.getElementById('salesBankDetails').value + ")";
            document.getElementById('dispPaymentDetails').innerText = txt;
        } else { document.getElementById('paymentPrintRow').style.display = 'none'; }
        updateInfo();
    }

    // ----------------------------------------------------------------
    // G2: FINANCIAL YEAR LABEL (was hardcoded as '26-27' in getNextDocNo)
    // ----------------------------------------------------------------
    // Indian GST financial years run April 1 → March 31. Derives the
    // 'YY-YY' label from a given date rather than always using "today" —
    // this matters because the document's OWN date is what determines
    // which FY it legally belongs to, not the date it happens to be saved.
    // E.g. backdating a March 31 invoice and saving it on April 2nd should
    // still produce a 25-26 doc number, not 26-27.
    function getFinancialYearLabel(dateInput) {
        let d = dateInput ? new Date(dateInput) : new Date();
        if (isNaN(d.getTime())) d = new Date(); // malformed/empty date input — fall back to today rather than producing "NaN-NaN"
        let year = d.getFullYear();
        let month = d.getMonth(); // 0-indexed: 0=Jan, 3=Apr
        let startYear = month >= 3 ? year : year - 1; // April (3) onward = current FY start; Jan-Mar = previous FY
        let endYearShort = String((startYear + 1) % 100).padStart(2, '0');
        let startYearShort = String(startYear % 100).padStart(2, '0');
        return `${startYearShort}-${endYearShort}`;
    }

    function getNextDocNo(type) {
        let docs = savedDocs.filter(d => d.type === type);
        // G2: derive from the document currently being dated, not a hardcoded
        // string — so numbering correctly rolls over every April 1st without
        // needing a manual code edit each year.
        let fyLabel = getFinancialYearLabel(document.getElementById('dateIn') ? document.getElementById('dateIn').value : null);
        let prefix = `KT/${type}${fyLabel}/`;

        // Sequence start overrides: QUO starts at 200, CRN at 1, SAL at 1
        let max = (type === 'QUO') ? 200 : 0;

        docs.forEach(d => {
            if(!d.docNo.includes("VOID") && d.docNo.startsWith(prefix)) {
                // BUG FIX (code review): parseInt("001A") silently returns 1, ignoring the
                // trailing "A" — a manually-edited doc number could collide with a future
                // auto-generated one. A strict /^\d+$/ match rejects anything non-numeric
                // instead of guessing, so malformed numbers are correctly skipped.
                let suffix = d.docNo.slice(prefix.length);
                if (/^\d+$/.test(suffix)) {
                    let numPart = parseInt(suffix, 10);
                    if (numPart > max) max = numPart;
                }
            }
        });

        return prefix + String(max + 1).padStart(4, '0');
    }

    function saveDocument() {
        if(WEB_APP_URL === "PASTE_YOUR_WEB_APP_URL_HERE") { alert("Paste Web App URL to enable saving!"); return; }
        let type = document.getElementById('docType').value;
        let docNo = document.getElementById('docNoIn').value;

        // Overwrite guard: only block if this doc number belongs to a completely
        // different document (different id). The previous version had a subtle bug
        // where switching type (e.g. INV→SAL) or creating a new doc of the same type
        // would find the last-saved doc of that type with the same auto-generated number
        // and incorrectly demand the master password just to save a NEW document.
        // Fix: we only flag a collision when BOTH conditions are true:
        //   1. A doc with this exact number exists in savedDocs
        //   2. Its id is NOT the currently-loaded doc we're editing
        // This correctly allows: re-saving the same doc (same id), creating a new doc
        // (currentlyLoadedDocId is null so any match is a real collision).
        let existingDoc = savedDocs.find(d => d.docNo === docNo && d.id !== currentlyLoadedDocId);
        if (existingDoc) {
            let pwd = prompt(`WARNING: Document Number "${docNo}" already exists.\nEnter the master password to overwrite it:`);
            if (pwd !== MASTER_PASSWORD) {
                if (pwd !== null) alert("Incorrect password. Save cancelled.");
                return;
            }
            currentlyLoadedDocId = existingDoc.id;
        }

        let saveBtn = document.querySelector('.btn-save');
        
        let totalVal = parseFloat(document.getElementById('dispGrand').innerText.replace(/,/g, '')) || 0;
        if(type === 'EXP' || type === 'RCM') totalVal = parseFloat(document.getElementById('vAmt').value) || 0;
        if(type === 'ADV') totalVal = parseFloat(document.getElementById('advDirectAmt').value) || 0;

        // A1: Register this client in the registry (creates a new C# id if needed,
        // backfills missing contact details on an existing one). Sales documents
        // use clientNameIn; vouchers (EXP/RCM) use vPaidTo instead, but vouchers
        // aren't really "customers" so they're intentionally NOT registered here —
        // only INV/QUO/ADV/SAL/CRN client names go into the registry.
        let clientForRegistry = ['INV','QUO','ADV','SAL','CRN'].includes(type)
            ? document.getElementById('clientNameIn').value : null;
        let registeredClient = clientForRegistry
            ? registerOrUpdateClient(
                clientForRegistry,
                document.getElementById('phoneIn').value,
                document.getElementById('gstinIn').value,
                document.getElementById('locIn').value
              )
            : null;

        let docData = {
            id: currentlyLoadedDocId ? currentlyLoadedDocId : Date.now(),
            clientId: registeredClient ? registeredClient.id : "",
            type: type,
            docNo: docNo,
            date: cleanDate(document.getElementById('dateIn').value),
            clientName: document.getElementById('clientNameIn').value || document.getElementById('vPaidTo').value,
            clientTitle: document.getElementById('clientTitleIn').value || "",
            phone: document.getElementById('phoneIn').value || "",
            location: document.getElementById('locIn').value || "",
            gstin: document.getElementById('gstinIn').value || "",
            vehicle: document.getElementById('vehIn').value || "",
            ewayBill: document.getElementById('ewayBillIn').value || "",
            customEway: document.getElementById('customEwayIn').value || "",
            freight: document.getElementById('freightTypeIn').value || "",
            customFreight: document.getElementById('customFreightIn').value || "",
            deliverySite: document.getElementById('deliverySiteIn').value || "",
            payMode: document.getElementById('salesPayMode').value || "",
            payDetails: document.getElementById('salesPayMode').value === 'Cash' ? document.getElementById('salesCashDetails').value :
                        document.getElementById('salesPayMode').value === 'UPI' ? document.getElementById('salesUpiDetails').value :
                        document.getElementById('salesPayMode').value === 'Bank Transfer' ? document.getElementById('salesBankDetails').value : "",
            // CRITICAL FIX: advRefIn/advAmtIn were removed from the HTML when F22's
            // multi-advance table (advLinkBody) replaced them. Calling .value on a
            // null element throws a TypeError that silently aborted EVERY save —
            // this was the root cause of "Save Doc does nothing." advRef/advAmt are
            // kept as empty legacy fields for backward compatibility with old saved
            // docs; the real data now lives in advLinks (see getAdvLinks() below).
            advRef: "",
            advAmt: "",
            inclusiveTax: document.getElementById('inclusiveTax').checked,
            // Voucher fields
            vPaidTo: document.getElementById('vPaidTo').value || "",
            vAmt: document.getElementById('vAmt').value || "",
            vDesc: document.getElementById('vDesc').value || "",
            vVeh: document.getElementById('vVeh').value || "",
            vPan: document.getElementById('vPan').value || "",
            vMode: document.getElementById('vMode').value || "",
            vRef: document.getElementById('vRef').value || "",
            supersedesRef: document.getElementById('supersedesRef').value || "",
            rcmGstRate: document.getElementById('rcmGstRate').value || "0",
            crnOrigRef: document.getElementById('crnOrigRef').value || "",
            // ADV direct fields
            advDirectAmt: document.getElementById('advDirectAmt').value || "",
            advDirectDesc: document.getElementById('advDirectDesc').value || "",
            advQuoRef: document.getElementById('advQuoRef').value || "",
            advQuoTotal: document.getElementById('advQuoTotal').value || "",
            advPayMode: document.getElementById('advPayMode').value || "",
            advPayRef: document.getElementById('advPayRef').value || "",
            // F22: Multi-advance link rows
            advLinks: getAdvLinks(),
            total: totalVal,
            cart: cart,
            voided: isCurrentVoided
        };

        // LOCAL-FIRST SAVE — instant UI response, cloud sync in background
        let idx = savedDocs.findIndex(d => d.id === docData.id);
        if (idx > -1) savedDocs[idx] = docData; else savedDocs.push(docData);
        currentlyLoadedDocId = docData.id;
        hasUnsavedChanges = false;
        saveBtn.innerText = "💾 SAVE DOC"; saveBtn.disabled = false;
        showToast('✅ Saved — syncing to cloud...', 'success');

        fetch(WEB_APP_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action: 'save', data: docData }) 
        })
        .then(response => response.json())
        .then(data => {
            if (data && data.success === false) {
                if (data.error === 'duplicate_docno') {
                    let freshNo = getNextDocNo(type);
                    if (confirm(
                        `⚠️ Document Number "${data.docNo}" was taken by another device.\n\nClick OK to update to ${freshNo} and re-save.`
                    )) {
                        document.getElementById('docNoIn').value = freshNo;
                        updateInfo();
                        saveDocument();
                    }
                } else {
                    showToast('⚠️ Cloud sync failed: ' + (data.error || 'Unknown error') + ' — saved locally', 'error');
                }
                return;
            }
            showToast('☁️ Synced to cloud', 'success');
        })
        .catch(err => {
            queueOfflineDocSave(docData);
            showToast('📡 Offline — will sync when back online', 'info');
        });
    }

    // ----------------------------------------------------------------
    // Improvement #5: OFFLINE DOCUMENT SAVE QUEUE
    // ----------------------------------------------------------------
    function getOfflineDocQueue() {
        try { return JSON.parse(localStorage.getItem('kenOfflineDocQueue') || '[]'); } catch(e) { return []; }
    }
    function saveOfflineDocQueue(q) {
        try { localStorage.setItem('kenOfflineDocQueue', JSON.stringify(q)); } catch(e) {}
    }
    function queueOfflineDocSave(docData) {
        let q = getOfflineDocQueue();
        // Replace any existing queued save for the same document id, rather
        // than stacking duplicates if someone hits Save multiple times
        // while still offline.
        let idx = q.findIndex(d => d.id === docData.id);
        if (idx > -1) q[idx] = docData; else q.push(docData);
        saveOfflineDocQueue(q);
        updateOfflineQueueBadge();
    }

    function flushOfflineDocQueue() {
        let q = getOfflineDocQueue();
        if (q.length === 0 || WEB_APP_URL === "PASTE_YOUR_WEB_APP_URL_HERE") return;

        // Process sequentially (not Promise.all) so a duplicate_docno
        // rejection on one queued document doesn't abandon the others
        // mid-flight — each gets its own turn and its own outcome.
        let remaining = [...q];
        let processNext = () => {
            if (remaining.length === 0) { saveOfflineDocQueue([]); updateOfflineQueueBadge(); showToast('☁️ Offline documents synced', 'success'); return; }
            let docData = remaining.shift();
            fetch(WEB_APP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: 'save', data: docData })
            })
            .then(r => r.json())
            .then(res => {
                if (res && res.success === false && res.error === 'duplicate_docno') {
                    // Can't auto-resolve a numbering collision silently for a
                    // queued background save — flag it clearly so the person
                    // re-saves it manually with a fresh number, rather than
                    // either losing the document or risking a duplicate.
                    showToast(`⚠️ "${docData.docNo}" couldn't auto-sync (number conflict) — please re-open and save it manually`, 'error');
                }
                // Whether it succeeded or hit a different error, remove it
                // from the persistent queue so it doesn't retry forever;
                // genuine network failures leave it in `remaining` to retry
                // on the NEXT flush call instead (see catch below).
                saveOfflineDocQueue(remaining);
                updateOfflineQueueBadge();
                processNext();
            })
            .catch(() => {
                // Still offline / request failed — stop here, leave this
                // item (and anything after it) in the queue for next time.
                remaining.unshift(docData);
                saveOfflineDocQueue(remaining);
                updateOfflineQueueBadge();
            });
        };
        processNext();
    }

    function updateOfflineQueueBadge() {
        let count = getOfflineDocQueue().length;
        let el = document.getElementById('offlineQueueBadge');
        if (!el) {
            el = document.createElement('div');
            el.id = 'offlineQueueBadge';
            el.style.cssText = 'position:fixed; top:8px; left:8px; z-index:5000; font-size:10px; padding:3px 8px; border-radius:10px; font-weight:bold; background:#e67e22; color:#fff; display:none;';
            document.body.appendChild(el);
        }
        if (count > 0) { el.innerText = `📡 ${count} doc(s) pending sync`; el.style.display = 'block'; }
        else { el.style.display = 'none'; }
    }

    // Connectivity badge — distinct from the cloud sync indicator (which
    // only reflects collection sync state); this reflects raw browser
    // online/offline status so it's obvious at a glance, especially useful
    // out on a site with patchy signal.
    function updateConnectivityBadge() {
        let el = document.getElementById('connectivityBadge');
        if (!el) {
            el = document.createElement('div');
            el.id = 'connectivityBadge';
            el.style.cssText = 'position:fixed; bottom:8px; left:8px; z-index:5000; font-size:10px; padding:3px 8px; border-radius:10px; font-weight:bold;';
            document.body.appendChild(el);
        }
        if (navigator.onLine) { el.style.display = 'none'; }
        else { el.innerText = '📡 Offline — changes saving locally'; el.style.background = '#7f8c8d'; el.style.color = '#fff'; el.style.display = 'block'; }
    }
    window.addEventListener('online', () => { updateConnectivityBadge(); flushOfflineDocQueue(); retryFailedSyncs(); });
    window.addEventListener('offline', updateConnectivityBadge);
    updateConnectivityBadge();
    updateOfflineQueueBadge();
    flushOfflineDocQueue(); // in case there's a leftover queue from a previous session that never got the chance to flush

    // ----------------------------------------------------------------
    // Improvement #6: PWA — service worker registration
    // ----------------------------------------------------------------
    // Enables "Add to Home Screen" installability and caches the app shell
    // (this HTML file + its assets) so it opens instantly even with no
    // signal. Registration is wrapped defensively: service workers require
    // a secure context (HTTPS or localhost) and won't register at all over
    // a plain file:// path — that's a browser restriction, not a bug here,
    // PWA service worker — register on HTTPS (GitHub Pages) or local file.
    // Skip on Claude preview (claudeusercontent.com) where sw.js doesn't exist.
    if ('serviceWorker' in navigator) {
        let hostname = window.location.hostname;
        let isClaudePreview = hostname.includes('claude') || hostname.includes('anthropic');
        if (!isClaudePreview) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => {
                        console.log('SW registered:', reg.scope);
                        // Check for updates on every load — this is what enables
                        // auto-update: the SW fetches the new version silently
                        // and activates it on next open.
                        reg.update();
                    })
                    .catch(err => console.log('SW skipped:', err.message));
            });
        }
    }

    let activeClientFilterId = null;

    // A2: Quick month picker fills the From/To date range to that month's bounds
    function applyQuickMonthFilter() {
        let monthVal = document.getElementById('docFilterMonth').value; // 'YYYY-MM'
        if (!monthVal) return;
        let [y, m] = monthVal.split('-').map(Number);
        let firstDay = new Date(y, m - 1, 1);
        let lastDay = new Date(y, m, 0);
        let toIso = d => d.toISOString().slice(0, 10);
        document.getElementById('docFilterFrom').value = toIso(firstDay);
        document.getElementById('docFilterTo').value = toIso(lastDay);

    function changeDocPage(delta) {

    function renderDocList() {
        let filterVal = document.getElementById('filterType').value;
        let searchQ = document.getElementById('searchFilter').value.toLowerCase().trim();
        let dateFrom = document.getElementById('docFilterFrom').value;
        let dateTo = document.getElementById('docFilterTo').value;

        let filteredDocs = savedDocs.filter(d => {
            let matchesFilter = filterVal === 'ALL' || d.type === filterVal;
            if (!matchesFilter) return false;

            // A1: client filter
            if (activeClientFilterId && d.clientId !== activeClientFilterId) return false;

            // A2: date range filter
            if (dateFrom || dateTo) {
                let dt = parseLocalDate(d.date);
                if (dateFrom && dt < parseLocalDate(dateFrom)) return false;
                if (dateTo && dt > parseLocalDate(dateTo)) return false;
            }

            if (!searchQ) return true;
            // BUG FIX (code review): searching the entire stringified document matched
            // unrelated fields — e.g. typing "10" matched a 10% GST rate, not a ₹10 amount.
            // Now searches only the fields a person would actually search by: doc number,
            // client/payee name, phone, item names, and the total amount.
            let itemNames = (d.cart || []).map(i => i.p).join(' ');
            let searchableFields = [
                d.docNo, d.clientName, d.clientId, d.phone, d.vPaidTo, d.vDesc,
                itemNames, d.total != null ? String(d.total) : ''
            ].filter(Boolean).join(' ').toLowerCase();
            return searchableFields.includes(searchQ);
        });

        filteredDocs.sort((a, b) => {
            let valA, valB;
            if (currentSortColumn === 'date' || currentSortColumn === 'id') {
                valA = parseLocalDate(a.date).getTime() || a.id;
                valB = parseLocalDate(b.date).getTime() || b.id;
            } else if (currentSortColumn === 'total') {
                valA = Number(a.total) || 0;
                valB = Number(b.total) || 0;
            } else {
                valA = String(a[currentSortColumn] || '').toLowerCase();
                valB = String(b[currentSortColumn] || '').toLowerCase();
            }

            if (valA < valB) return isSortDescending ? 1 : -1;
            if (valA > valB) return isSortDescending ? -1 : 1;
            return 0;
        });

        document.getElementById('docCountLabel').innerText = `Displaying: ${filteredDocs.length}`;

        // Drop selections for docs no longer in the filtered view's underlying set
        // (e.g. if one got deleted elsewhere) — keeps the Set from growing stale.
        let allIds = new Set(savedDocs.map(d => d.id));
        selectedDocIds.forEach(id => { if (!allIds.has(id)) selectedDocIds.delete(id); });

        // A3: Gmail-style pagination — 50 per page
        let totalPages = Math.max(1, Math.ceil(filteredDocs.length / DOCS_PER_PAGE));
        if (currentDocPage > totalPages) currentDocPage = totalPages;
        if (currentDocPage < 1) currentDocPage = 1;
        let pageStart = (currentDocPage - 1) * DOCS_PER_PAGE;
        let pageDocs = filteredDocs.slice(pageStart, pageStart + DOCS_PER_PAGE);

        let tbody = document.getElementById('docListBody');
        let rowsHTML = '';
        pageDocs.forEach(d => {
            let trColor = d.docNo.includes("VOID") ? "background: #ffebee;" : "";
            let formattedTotal = d.total ? d.total.toLocaleString('en-IN') : "0";
            let cDate = cleanDate(d.date);
            let isChecked = selectedDocIds.has(d.id);

            rowsHTML += `<tr style="${trColor}">
                <td><input type="checkbox" class="doc-select-checkbox" data-doc-id="${d.id}" ${isChecked ? 'checked' : ''} onclick="handleDocCheckboxClick(event, ${d.id})" onchange="toggleDocSelection(${d.id}, this.checked)"></td>
                <td><b>${d.docNo}</b></td>
                <td>${d.type}</td>
                <td>${cDate ? formatDateDisplay(cDate) : ''}</td>
                <td>${d.clientName || '---'}</td>
                <td>${d.clientId ? `<span style="background:#e8daef;color:#6c3483;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:bold;">${d.clientId}</span>` : ''}</td>
                <td>₹ ${formattedTotal}</td>
                <td>
                    <button class="btn-load" onclick="loadDocument(${d.id})">Load</button>
                    ${['INV','SAL'].includes(d.type) ? `<button class="action-btn" style="background:#2c3e50;color:#fff;" onclick="openDispatchView(${d.id})" title="Dispatch / Delivery View">🚚</button>` : ''}
                    <button class="btn-admin-del" onclick="deleteDocument(${d.id})">🗑️</button>
                </td>
            </tr>`;
        });
        tbody.innerHTML = rowsHTML;

        updateBulkActionBar();
        // Reflect current selection state on the "select all" header checkbox —
        // checks against the CURRENT PAGE only, matching Gmail's per-page semantics.
        let selectAllEl = document.getElementById('selectAllDocs');
        let visibleIds = pageDocs.map(d => d.id);
        selectAllEl.checked = visibleIds.length > 0 && visibleIds.every(id => selectedDocIds.has(id));

        // A3: pagination bar
        let infoText = filteredDocs.length === 0 ? 'No documents found'
            : `${pageStart + 1}–${Math.min(pageStart + DOCS_PER_PAGE, filteredDocs.length)} of ${filteredDocs.length}`;
        document.getElementById('docPageInfo').innerText = infoText;
        document.getElementById('docPagePrev').disabled = currentDocPage <= 1;
        document.getElementById('docPagePrev').style.opacity = currentDocPage <= 1 ? '0.4' : '1';
        document.getElementById('docPageNext').disabled = currentDocPage >= totalPages;
        document.getElementById('docPageNext').style.opacity = currentDocPage >= totalPages ? '0.4' : '1';
    }

    // A3: Shift-click range select — same-page only for now. Holding Shift while
    // clicking a checkbox selects every row between the last-clicked checkbox and
    // this one (inclusive), matching the Gmail-style behavior requested.
    // A3: Shift-click range select — same-page only for now. Holding Shift while
    // clicking a checkbox selects every row between the last-clicked checkbox and
    // this one (inclusive), matching the Gmail-style behavior requested.
    // BUG FIX: evt.preventDefault() here was blocking the checkbox's own native
    // click behavior, which fought with the manual .checked=true being set in the
    // loop below — the last checkbox in the range ended up visually unchecked
    // even though it was correctly added to selectedDocIds. Removed; nothing
    // needs preventing once the loop already sets every box's state directly.
    function handleDocCheckboxClick(evt, id) {
        id = Number(id);
        if (evt.shiftKey && lastClickedDocId !== null) {
            let checkboxes = [...document.querySelectorAll('#docListBody .doc-select-checkbox')];
            let ids = checkboxes.map(cb => Number(cb.getAttribute('data-doc-id')));
            let fromIdx = ids.indexOf(lastClickedDocId);
            let toIdx = ids.indexOf(id);
            if (fromIdx !== -1 && toIdx !== -1) {
                let [start, end] = fromIdx < toIdx ? [fromIdx, toIdx] : [toIdx, fromIdx];
                for (let i = start; i <= end; i++) {
                    checkboxes[i].checked = true;
                    selectedDocIds.add(ids[i]);
                }
                updateBulkActionBar();
            }
        }
        lastClickedDocId = id;
    }

    // U3: Toggle a single row's selection
    function toggleDocSelection(id, checked) {
        // BUG FIX (A3): id arrives from an inline template literal (${d.id}) in the
        // HTML, so it could be a string if d.id came from the cloud as a string —
        // Set.has(1) !== Set.has("1"), which silently broke "select all" counts.
        // Normalizing to Number() everywhere a doc id touches the Set fixes this.
        id = Number(id);
        if (checked) selectedDocIds.add(id); else selectedDocIds.delete(id);
        updateBulkActionBar();
        let selectAllEl = document.getElementById('selectAllDocs');
        let allCheckboxes = document.querySelectorAll('#docListBody .doc-select-checkbox');
        selectAllEl.checked = allCheckboxes.length > 0 && [...allCheckboxes].every(cb => cb.checked);
    }

    // U3: Header "select all" checkbox toggles every currently-visible (filtered) row
    function toggleSelectAllDocs() {
        let selectAllEl = document.getElementById('selectAllDocs');
        let checkboxes = document.querySelectorAll('#docListBody .doc-select-checkbox');
        checkboxes.forEach(cb => {
            cb.checked = selectAllEl.checked;
            let id = Number(cb.getAttribute('data-doc-id'));
            if (selectAllEl.checked) selectedDocIds.add(id); else selectedDocIds.delete(id);
        });
        updateBulkActionBar();
    }

    function renderClientList() {
        let search = document.getElementById('clientListSearch').value.toLowerCase().trim();
        let clients = getClients();

        // doc count per client, computed from savedDocs (kept live, not stored)
        clients = clients.map(c => ({
            ...c,
            docCount: savedDocs.filter(d => d.clientId === c.id).length
        }));

        if (search) {
            clients = clients.filter(c =>
                c.name.toLowerCase().includes(search) ||
                c.id.toLowerCase().includes(search) ||
                (c.phone || '').includes(search)
            );
        }

        clients.sort((a, b) => {
            let valA, valB;
            if (clientSortColumn === 'id') {
                // sort numerically by the digits after "C", not alphabetically
                // (alphabetical would put C10 before C2)
                valA = parseInt(a.id.replace('C', '')) || 0;
                valB = parseInt(b.id.replace('C', '')) || 0;
            } else if (clientSortColumn === 'docCount') {
                valA = a.docCount; valB = b.docCount;
            } else {
                valA = String(a[clientSortColumn] || '').toLowerCase();
                valB = String(b[clientSortColumn] || '').toLowerCase();
            }
            if (valA < valB) return clientSortDescending ? 1 : -1;
            if (valA > valB) return clientSortDescending ? -1 : 1;
            return 0;
        });

        let body = document.getElementById('clientListBody');
        if (clients.length === 0) {
            body.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#aaa;padding:20px;">No clients yet — they\'re added automatically when you save a document with a client name.</td></tr>';
            return;

        body.innerHTML = clients.map(c => `
            <tr style="cursor:pointer;" onclick="filterDocsByClient('${c.id}', '${c.name.replace(/'/g, "\\'")}')">

                <td><b>${c.name}</b></td>
                <td>${c.phone || '—'}</td>

                    <button class="btn-load" onclick="event.stopPropagation(); filterDocsByClient('${c.id}', '${c.name.replace(/'/g, "\\'")}')">View Docs</button>
                    <button class="btn-edit-item action-btn" onclick="event.stopPropagation(); openEditClient('${c.id}')" style="margin-left:4px;">📝 Edit</button>

    function reassignClientId() {
        if (!_editingClientId) return;
        let newId = document.getElementById('editClientNewId').value.trim().toUpperCase();
        if (!newId || !newId.match(/^C\d+$/)) { alert('Enter a valid ID like C5 or C12.'); return; }
        if (newId === _editingClientId) { alert('That is already this client\'s ID.'); return; }
        let existing = findClientById(newId);
        if (existing) { alert(`${newId} is already taken by "${existing.name}". Delete or merge that client first.`); return; }

        let oldId = _editingClientId;
        let clients = getClients();
        let client = clients.find(c => c.id === oldId);
        if (!client) return;

        let affectedDocs = savedDocs.filter(d => d.clientId === oldId);
        if (!confirm(
            `Reassign ${oldId} → ${newId} for "${client.name}"?\n\n` +
            `This will also re-tag ${affectedDocs.length} saved document(s).\n\nThis cannot be undone.`
        )) return;

        client.id = newId;
        saveClients(clients);
        affectedDocs.forEach(d => { d.clientId = newId; });

        if (WEB_APP_URL !== "PASTE_YOUR_WEB_APP_URL_HERE") {
            affectedDocs.forEach(doc => {
                fetch(WEB_APP_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'save', data: doc }) }).catch(() => {});
            });
        }

        closeEditClient();
        renderClientList();
        showToast(`✅ ${oldId} → ${newId} — ${affectedDocs.length} document(s) re-tagged`, 'success');
    }

    // Saving here only updates the Client Directory record itself — it does
    // NOT retroactively rewrite past saved documents, which keep whatever
    // name/phone/GSTIN was correct at the time they were issued. This is
    // intentional: a corrected phone number shouldn't silently rewrite a
    // GST return you already filed. New documents pick up the edited details
    // immediately via the autocomplete/autofill.
    function saveEditedClient() {
        let newName = document.getElementById('editClientName').value.trim();
        if (!newName) { alert('Client name cannot be blank.'); return; }

        let phone = document.getElementById('editClientPhone').value.trim();
        let gstin = document.getElementById('editClientGstin').value.trim();
        let location = document.getElementById('editClientLocation').value.trim();

        if (_isCreatingNewClient) {
            // Reuses the same creation path as saving a document with a new
            // client name — guards against duplicates by name automatically.
            let existing = findClientByName(newName);
            if (existing) { alert(`"${newName}" already exists as client ${existing.id}. Edit that client instead, or use a different name.`); return; }
            let created = registerOrUpdateClient(newName, phone, gstin, location);
            closeEditClient();
            renderClientList();
            showToast(`✅ ${created.id} created`, 'success');
            return;
        }

        if (!_editingClientId) return;
        let clients = getClients();
        // Guard against renaming into a collision with a different existing client
        let collision = clients.find(c => c.id !== _editingClientId && c.name.trim().toLowerCase() === newName.toLowerCase());
        if (collision) { alert(`"${newName}" is already used by client ${collision.id}. Choose a different name, or edit that client instead.`); return; }

        let client = clients.find(c => c.id === _editingClientId);
        if (!client) return;
        client.name = newName;
        client.phone = phone;
        client.gstin = gstin;
        client.location = location;
        saveClients(clients);

        closeEditClient();
        renderClientList();
        showToast('Client updated', 'success');
    }

    // U3: Bulk delete — asks for the master password ONCE, then deletes all selected
    function bulkDeleteDocuments() {
        let ids = getSelectedDocIds();
        if (ids.length === 0) return;
        let pwd = prompt(`ADMIN ACTION: Enter Master Password to delete ${ids.length} selected document(s):`);
        if (pwd !== MASTER_PASSWORD) { alert("Access Denied: Incorrect Password."); return; }
        if (!confirm(`Permanently delete ${ids.length} document(s) from the cloud? This cannot be undone.`)) return;

        savedDocs = savedDocs.filter(d => !ids.includes(d.id));
        selectedDocIds.clear();
        renderDocList();

        // Fire one delete request per doc — password already verified above,
        // so deleteDocumentSilent skips the per-item password prompt.
        ids.forEach(id => {
            fetch(WEB_APP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: 'delete', id: id })
            }).catch(err => console.error("Cloud Deletion Failed for id " + id, err));
        });
        showToast(`🗑️ ${ids.length} document(s) deleted`, 'error');
    }

    // U3: Export each selected document to its own separate PDF file.
    // Loads each doc into the (hidden) editor briefly, renders, exports, then
    // restores whatever was open before the bulk export started.
    async function exportSelectedToPDF() {
        let ids = getSelectedDocIds();
        if (ids.length === 0) return;

        let originalId = currentlyLoadedDocId;
        let originalCart = JSON.parse(JSON.stringify(cart));
        let originalType = document.getElementById('docType').value;

        showToast(`📄 Exporting ${ids.length} PDF(s)... keep this tab open`, 'info');
        closeSavedDocs();

        for (let i = 0; i < ids.length; i++) {
            let doc = savedDocs.find(d => d.id === ids[i]);
            if (!doc) continue;
            loadDocument(doc.id, true); // true = silent load, skip modal close (already closed)
            await new Promise(resolve => setTimeout(resolve, 200)); // let the DOM repaint
            await exportToPDF(); // returns a Promise now — waits for this PDF to finish before continuing
        }

        // Restore whatever was open before the bulk export
        if (originalId !== null) {
            loadDocument(originalId, true);
        } else {
            cart = originalCart;
            document.getElementById('docType').value = originalType;
            switchAppMode(true);
        }
        showToast(`✅ ${ids.length} PDF(s) exported`, 'success');
    }

    // ============================================================
    // F9: AMEND DOCUMENT (Void original, new doc references it)
    // ============================================================
    // ----------------------------------------------------------------
    // Improvement #10: AMENDMENT DIFF VIEW
    // ----------------------------------------------------------------
    // Compares the current document (which has supersedesRef set) against
    // the original it's replacing — looked up in savedDocs by the original
    // docNo with " - VOID" appended, since that's how amendDocument() stores
    // the voided original. Shows field-level changes (client/total/etc) and
    // a line-item diff (added/removed/changed quantities or rates), instead
    // of the amendment just silently happening with no visible record of
    // what was actually different between versions.
    // ----------------------------------------------------------------
    function openAmendmentDiff() {
        let supersedesNo = document.getElementById('supersedesRef').value;
        if (!supersedesNo) { alert('No original document reference set — nothing to compare against.'); return; }

        let original = savedDocs.find(d => d.docNo === supersedesNo || d.docNo === supersedesNo + ' - VOID');
        if (!original) {
            alert(`Could not find the original document "${supersedesNo}" in the saved documents list. It may not have synced yet — try "List Docs" to refresh, then try again.`);
            return;
        }

        // Build a "current" snapshot from the live form, matching the same
        // shape as a saved doc, so the comparison is apples-to-apples.
        let current = {
            docNo: document.getElementById('docNoIn').value,
            clientName: document.getElementById('clientNameIn').value,
            phone: document.getElementById('phoneIn').value,
            location: document.getElementById('locIn').value,
            gstin: document.getElementById('gstinIn').value,
            total: parseFloat(document.getElementById('dispGrand').innerText.replace(/,/g, '')) || 0,
            cart: cart
        };

        renderAmendmentDiff(original, current);
        document.getElementById('amendDiffModal').style.display = 'flex';
    }
    function closeAmendmentDiff() { document.getElementById('amendDiffModal').style.display = 'none'; }

    function renderAmendmentDiff(original, current) {
        let fieldLabels = {
            clientName: 'Client Name', phone: 'Phone', location: 'Location',
            gstin: 'GSTIN', total: 'Total Amount (₹)'
        };

        let fieldRows = Object.entries(fieldLabels).map(([key, label]) => {
            let oldVal = original[key] || '—';
            let newVal = current[key] || '—';
            let changed = String(oldVal) !== String(newVal);
            if (!changed) return '';
            return `<tr>
                <td style="font-weight:bold; color:#555;">${label}</td>
                <td style="color:#c0392b; text-decoration:line-through;">${oldVal}</td>
                <td style="color:#1e8449; font-weight:bold;">${newVal}</td>
            </tr>`;
        }).join('');

        // Line-item diff — match by product name. Anything only in the
        // original = removed; only in current = added; in both but
        // different qty/rate = changed; identical = unchanged (collapsed,
        // not shown, to keep the diff focused on what actually moved).
        let origCart = original.cart || [];
        let curCart = current.cart || [];
        let allProductNames = [...new Set([...origCart.map(c => c.p), ...curCart.map(c => c.p)])];

        let itemRows = allProductNames.map(name => {
            let o = origCart.find(c => c.p === name);
            let c = curCart.find(c => c.p === name);
            if (o && !c) return `<tr><td>${name}</td><td style="color:#c0392b;">${o.q} @ ₹${o.r}</td><td style="color:#c0392b; font-weight:bold;">❌ Removed</td></tr>`;
            if (!o && c) return `<tr><td>${name}</td><td style="color:#888;">—</td><td style="color:#1e8449; font-weight:bold;">✅ Added: ${c.q} @ ₹${c.r}</td></tr>`;
            if (o && c && (o.q !== c.q || o.r !== c.r)) return `<tr><td>${name}</td><td style="color:#c0392b;">${o.q} @ ₹${o.r}</td><td style="color:#1e8449; font-weight:bold;">${c.q} @ ₹${c.r}</td></tr>`;
            return ''; // unchanged — omitted to keep the diff focused
        }).join('');

        let hasFieldChanges = fieldRows.trim().length > 0;
        let hasItemChanges = itemRows.trim().length > 0;

        let html = `<div style="margin-bottom:14px; font-size:12px; color:#7f8c8d;">
            Comparing <b>${original.docNo.replace(' - VOID','')}</b> (original) → <b>${current.docNo}</b> (this document)
        </div>`;

        if (!hasFieldChanges && !hasItemChanges) {
            html += '<p style="color:#888; padding:20px; text-align:center;">No differences detected — the amendment hasn\'t changed any tracked fields or line items yet.</p>';
        } else {
            if (hasFieldChanges) {
                html += `<div style="font-size:12px; font-weight:bold; color:#2c3e50; margin-bottom:6px;">Field Changes</div>
                <table class="analytics-table" style="margin-bottom:18px;">
                    <thead><tr><th>Field</th><th>Before</th><th>After</th></tr></thead>
                    <tbody>${fieldRows}</tbody>
                </table>`;
            }
            if (hasItemChanges) {
                html += `<div style="font-size:12px; font-weight:bold; color:#2c3e50; margin-bottom:6px;">Line Item Changes</div>
                <table class="analytics-table">
                    <thead><tr><th>Item</th><th>Before</th><th>After</th></tr></thead>
                    <tbody>${itemRows}</tbody>
                </table>`;
            }
        }

        document.getElementById('amendDiffBody').innerHTML = html;
    }

    function amendDocument() {
        let type = document.getElementById('docType').value;
        if(!['INV','SAL'].includes(type)) { alert("Only Tax Invoices and Sales Invoices can be amended."); return; }
        let origDocNo = document.getElementById('docNoIn').value;
        if(!origDocNo || origDocNo.includes("VOID")) { alert("Cannot amend a document that is already voided or unsaved."); return; }
        if(!confirm(`Amend "${origDocNo}"?\n\n1. The original will be VOIDED and saved.\n2. A new document will be created referencing it.\n3. All items and client details carry over.`)) return;

        // Step 1: Void the original and save it
        if(!origDocNo.includes("VOID")) document.getElementById('docNoIn').value = origDocNo + " - VOID";
        document.getElementById('watermark').style.display = 'block';
        isCurrentVoided = true;
        updateInfo();
        saveDocument(); // save the voided original

        // Step 2: Snapshot everything
        let clientName = document.getElementById('clientNameIn').value;
        let phone = document.getElementById('phoneIn').value;
        let loc = document.getElementById('locIn').value;
        let gstin = document.getElementById('gstinIn').value;
        let cartSnapshot = JSON.parse(JSON.stringify(cart));
        // CRITICAL FIX: advRefIn/advAmtIn no longer exist (replaced by F22's
        // multi-advance link table). Snapshot the actual advance links instead.
        let advLinksSnapshot = getAdvLinks();

        // Step 3: Create fresh doc of same type
        currentlyLoadedDocId = null;
        isCurrentVoided = false;
        document.getElementById('watermark').style.display = 'none';
        document.getElementById('docNoIn').value = getNextDocNo(type);

        // Restore all fields
        document.getElementById('clientNameIn').value = clientName;
        document.getElementById('phoneIn').value = phone;
        document.getElementById('locIn').value = loc;
        document.getElementById('gstinIn').value = gstin;
        restoreAdvLinks(advLinksSnapshot);
        cart = cartSnapshot;

        // Step 4: Mark as superseding the original
        document.getElementById('supersedesRef').value = origDocNo.replace(" - VOID","");
        document.getElementById('supersedesBox').style.display = 'block';

        updateCartPricing();
        updateInfo();
    }

    document.addEventListener('keydown', function(e) {

        let isCtrl = e.ctrlKey || e.metaKey;
        if(isCtrl && e.key === 's') { e.preventDefault(); saveDocument(); }
        if(isCtrl && e.key === 'p') { e.preventDefault(); window.print(); }

    // ============================================================
    let clientSuggestionActiveIndex = -1;
    let clientSuggestionMatches = [];

    function handleClientAutofill() {
        let raw = document.getElementById('clientNameIn').value.trim();
        let box = document.getElementById('clientSuggestionsBox');
        clientSuggestionActiveIndex = -1;

        if (raw.length < 1) { box.style.display = 'none'; document.getElementById('clientAutofillBanner').style.display='none'; return; }

        let needle = raw.toLowerCase();
        let clients = getClients();

        // A7: match by name substring OR by client ID number — typing "22"
        // surfaces C22, C220, C122, etc. (matches anywhere in the digits, same
        // substring logic as the name match, for consistency).
        let isNumeric = /^\d+$/.test(needle);
        let matches = clients.filter(c => {
            if (c.name.toLowerCase().includes(needle)) return true;
            if (isNumeric && c.id.replace('C', '').includes(needle)) return true;
            return false;
        });

        // Rank exact/prefix matches above partial matches
        matches.sort((a, b) => {
            let aName = a.name.toLowerCase(), bName = b.name.toLowerCase();
            let aStarts = aName.startsWith(needle) ? 0 : 1;
            let bStarts = bName.startsWith(needle) ? 0 : 1;
            if (aStarts !== bStarts) return aStarts - bStarts;
            return aName.localeCompare(bName);
        });

        clientSuggestionMatches = matches.slice(0, 8);

        if (clientSuggestionMatches.length === 0) { box.style.display = 'none'; }
        else {
            box.innerHTML = clientSuggestionMatches.map((c, i) => `
                <div class="client-suggestion-row" data-idx="${i}" onmousedown="selectClientSuggestion(${i})">
                    <span><span class="client-suggestion-id">${c.id}</span> &nbsp;${c.name}</span>
                    <span class="client-suggestion-meta">${c.phone || ''}</span>
                </div>
            `).join('');
            box.style.display = 'block';
        }

        // F16: also check if the typed name (once it stops matching a fragment and
        // becomes an exact match) has newer details on file than what's in the form
        checkExactMatchAutofillBanner(raw);
    }

    function closeClientSuggestions() {
        document.getElementById('clientSuggestionsBox').style.display = 'none';
    }

    // A7: keyboard navigation (up/down/enter) through the suggestions list
    function handleClientSuggestionKeydown(evt) {
        let box = document.getElementById('clientSuggestionsBox');
        if (box.style.display !== 'block' || clientSuggestionMatches.length === 0) return;
        if (evt.key === 'ArrowDown') {
            evt.preventDefault();
            clientSuggestionActiveIndex = Math.min(clientSuggestionActiveIndex + 1, clientSuggestionMatches.length - 1);
            highlightActiveSuggestion();
        } else if (evt.key === 'ArrowUp') {
            evt.preventDefault();
            clientSuggestionActiveIndex = Math.max(clientSuggestionActiveIndex - 1, -1);
            highlightActiveSuggestion();
        } else if (evt.key === 'Enter' && clientSuggestionActiveIndex >= 0) {
            evt.preventDefault();
            selectClientSuggestion(clientSuggestionActiveIndex);
        } else if (evt.key === 'Escape') {
            closeClientSuggestions();
        }
    }

    function highlightActiveSuggestion() {
        document.querySelectorAll('.client-suggestion-row').forEach((row, i) => {
            row.classList.toggle('active-suggestion', i === clientSuggestionActiveIndex);
        });
    }

    // A7: Picking a suggestion fills name, phone, GSTIN, and billing location instantly
    function selectClientSuggestion(idx) {
        let c = clientSuggestionMatches[idx];
        if (!c) return;
        document.getElementById('clientNameIn').value = c.name;
        if (c.phone) document.getElementById('phoneIn').value = c.phone;
        if (c.gstin) document.getElementById('gstinIn').value = c.gstin;
        if (c.location) document.getElementById('locIn').value = c.location;
        closeClientSuggestions();
        updateInfo();
    }

    // F16: separated out from the old handleClientAutofill — still checks for
    // newer saved details on an exact client-name match and surfaces the banner.
    let _clientAutofillData = null;
    function checkExactMatchAutofillBanner(rawName) {
        let name = rawName.toLowerCase();
        let matches = savedDocs.filter(d =>
            d.clientName && d.clientName.toLowerCase() === name &&
            ['INV','QUO','SAL'].includes(d.type) && !d.docNo.includes('VOID')
        );
        if(matches.length === 0) { document.getElementById('clientAutofillBanner').style.display='none'; return; }

        matches.sort((a,b) => parseLocalDate(b.date) - parseLocalDate(a.date));
        let ref = matches[0];

        let currentGstin = document.getElementById('gstinIn').value;
        if(ref.gstin && ref.gstin !== currentGstin) {
            _clientAutofillData = ref;
            let banner = document.getElementById('clientAutofillBanner');
            banner.innerText = `💡 Last seen: ${ref.gstin || 'URD'} | ${ref.location || ''} — tap to auto-fill`;
            banner.style.display = 'block';
        } else {
            document.getElementById('clientAutofillBanner').style.display='none';
        }
    }

    function applyClientAutofill() {
        if(!_clientAutofillData) return;
        let ref = _clientAutofillData;
        if(ref.gstin) document.getElementById('gstinIn').value = ref.gstin;
        if(ref.location) document.getElementById('locIn').value = ref.location;
        if(ref.phone) document.getElementById('phoneIn').value = ref.phone;
        document.getElementById('clientAutofillBanner').style.display='none';
        updateInfo();
    }

    // ============================================================
    // F2: DUPLICATE INVOICE GUARD
    // ============================================================
    // Hook into clientNameIn onkeyup — also called from handleClientAutofill
    function checkDuplicateGuard() {
        let type = document.getElementById('docType').value;
        if(!['INV','SAL'].includes(type)) { document.getElementById('duplicateGuardBanner').style.display='none'; return; }
        let name = document.getElementById('clientNameIn').value.trim().toLowerCase();
        if(name.length < 2) { document.getElementById('duplicateGuardBanner').style.display='none'; return; }

        let today = document.getElementById('dateIn').value;
        // Find open (non-voided) INV or SAL for this client on same date with no logged payment
        let dups = savedDocs.filter(d =>
            d.clientName && d.clientName.toLowerCase() === name &&
            ['INV','SAL'].includes(d.type) &&
            !d.docNo.includes('VOID') &&
            cleanDate(d.date) === today &&
            d.id !== currentlyLoadedDocId
        );
        let banner = document.getElementById('duplicateGuardBanner');
        if(dups.length > 0) {
            document.getElementById('duplicateGuardText').innerText =
                `Existing ${dups[0].type} for this client today: ${dups[0].docNo} (₹${(dups[0].total||0).toLocaleString('en-IN')}). Load it instead?`;
            banner.style.display = 'block';
            banner.style.cursor = 'pointer';
            banner.onclick = () => loadDocument(dups[0].id);
        } else {
            banner.style.display = 'none';
        }
    }

    // ============================================================
    // F1: CUSTOMER LEDGER
    // ============================================================
    function openLedger() {
        // Populate client dropdown from savedDocs
        let clients = [...new Set(savedDocs.filter(d => d.clientName).map(d => d.clientName))].sort();
        let sel = document.getElementById('ledgerClientSelect');
        sel.innerHTML = '<option value="">-- Select Client --</option>';
        clients.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);
        // Pre-select current client if set
        let cur = document.getElementById('clientNameIn').value;
        if(cur) sel.value = cur;
        document.getElementById('ledgerModal').style.display = 'flex';
        renderLedger();
    }
    function closeLedger() { document.getElementById('ledgerModal').style.display='none'; }

    function renderLedger() {
        let client = document.getElementById('ledgerClientSelect').value;
        let period = document.getElementById('ledgerPeriod').value;
        let body = document.getElementById('ledgerBody');
        let balBar = document.getElementById('ledgerBalanceBar');

        if (syncPendingNotice('ledgerBody')) { balBar.style.display = 'none'; return; }
        if(!client) { body.innerHTML = '<p style="color:#888;padding:20px;">Select a client above.</p>'; balBar.style.display='none'; return; }

        let docs = savedDocs.filter(d => d.clientName === client && !d.docNo.includes('VOID'));

        // Period filter
        let now = new Date();
        docs = docs.filter(d => {
            let dt = parseLocalDate(d.date);
            if(period === '1M') return (now - dt) <= 30*24*60*60*1000;
            if(period === '3M') return (now - dt) <= 90*24*60*60*1000;
            if(period === 'FY') {
                let fyStart = new Date(now.getMonth() >= 3 ? now.getFullYear() : now.getFullYear()-1, 3, 1);
                return dt >= fyStart;
            }
            return true;
        });
        docs.sort((a,b) => parseLocalDate(a.date) - parseLocalDate(b.date));

        // QUO is deliberately excluded — a quotation is a price proposal, not
        // a financial transaction. It has no bearing on what a client owes.
        // INV + SAL = money owed by client (debit)
        // ADV + CRN = money received or credited back (credit)
        // Cash Book IN entries linked to invoices count as payments received
        let allCashForClient = getCashEntries().filter(e =>
            e.direction === 'IN' && e.linkedDoc &&
            docs.some(d => d.docNo === e.linkedDoc)
        );
        let totalBilled = 0, totalPaid = 0;
        docs.forEach(d => {
            let amt = d.total || 0;
            if(['INV','SAL'].includes(d.type)) totalBilled += amt;
            if(d.type === 'ADV') totalPaid += amt;
            if(d.type === 'CRN') totalPaid += amt;
        });
        // Add cash payments for this client's invoices
        totalPaid += allCashForClient.reduce((s,e) => s + (e.amount||0), 0);
        let netDue = totalBilled - totalPaid;

        balBar.style.display = 'flex';
        document.getElementById('ledgerClientName').innerText = client;
        let balEl = document.getElementById('ledgerNetBalance');
        balEl.innerText = `₹${Math.abs(netDue).toLocaleString('en-IN')}`;
        balEl.style.color = netDue <= 0 ? '#2ecc71' : '#e74c3c';
        balEl.title = netDue <= 0 ? 'Client is paid up or in credit' : 'Amount still due';

        // Only show financial documents in the ledger — QUO excluded
        let financialDocs = docs.filter(d => ['INV','SAL','ADV','CRN'].includes(d.type));
        // Merge cash payments as virtual ledger rows
        let cashRows = allCashForClient.map(e => ({
            _isCashPayment: true, id: e.id, date: e.date, docNo: e.linkedDoc,
            amount: e.amount, party: e.party
        }));
        // Combine and sort chronologically
        let allRows = [...financialDocs.map(d => ({...d, _isCashPayment:false})), ...cashRows]
            .sort((a,b) => parseLocalDate(a.date) - parseLocalDate(b.date));

        if(allRows.length === 0) { body.innerHTML = '<p style="color:#888;padding:20px;">No financial documents found for this client in this period.</p>'; return; }

        let html = `<table class="analytics-table">
            <thead><tr><th>Date</th><th>Doc No</th><th>Type</th><th>Description</th><th style="text-align:right">Billed (₹)</th><th style="text-align:right">Paid/Credit (₹)</th><th style="text-align:right">Running Balance (₹)</th></tr></thead><tbody>`;
        let running = 0;
        allRows.forEach(d => {
            let cDate = formatDateDisplay(d.date);
            if (d._isCashPayment) {
                running -= d.amount;
                html += `<tr class="ledger-credit" style="background:#f0fff4;">
                    <td>${cDate}</td>
                    <td style="font-size:11px;color:#888;">vs ${d.docNo}</td>
                    <td><span style="background:#27ae60;color:#fff;padding:2px 7px;border-radius:10px;font-size:11px;">PAYMENT</span></td>
                    <td style="font-size:12px;color:#555;">${d.party}</td>
                    <td style="text-align:right;">—</td>
                    <td style="text-align:right;color:#27ae60;font-weight:bold;">₹${d.amount.toLocaleString('en-IN')}</td>
                    <td style="text-align:right;font-weight:bold;color:${running>0?'#e74c3c':'#27ae60'}">₹${Math.abs(running).toLocaleString('en-IN')}</td>
                </tr>`;
            } else {
                let amt = d.total || 0;
                let isDebit = ['INV','SAL'].includes(d.type);
                let isCredit = ['ADV','CRN'].includes(d.type);
                if(isDebit) running += amt;
                if(isCredit) running -= amt;
                let desc = d.cart && d.cart.length ? d.cart.map(i=>i.p).join(', ').substring(0,60) : (d.vDesc || '');
                let rowClass = isCredit ? 'ledger-credit' : 'ledger-debit';
                html += `<tr class="${rowClass}" onclick="loadDocument(${d.id}); closeLedger();" style="cursor:pointer;">
                    <td>${cDate}</td>
                    <td><b>${d.docNo}</b></td>
                    <td><span style="background:${typeColor(d.type)};color:#fff;padding:2px 7px;border-radius:10px;font-size:11px;">${d.type}</span></td>
                    <td style="font-size:12px;color:#555;">${desc}</td>
                    <td style="text-align:right;">${isDebit ? '₹'+amt.toLocaleString('en-IN') : '—'}</td>
                    <td style="text-align:right;">${isCredit ? '₹'+amt.toLocaleString('en-IN') : '—'}</td>
                    <td style="text-align:right;font-weight:bold;color:${running>0?'#e74c3c':'#27ae60'}">₹${Math.abs(running).toLocaleString('en-IN')}</td>
                </tr>`;
            }
        });
        html += `<tr class="total-row"><td colspan="4">TOTALS</td><td style="text-align:right;">₹${totalBilled.toLocaleString('en-IN')}</td><td style="text-align:right;">₹${totalPaid.toLocaleString('en-IN')}</td><td style="text-align:right;color:${netDue>0?'#e74c3c':'#27ae60'}">₹${Math.abs(netDue).toLocaleString('en-IN')} ${netDue>0?'DUE':'CR'}</td></tr>`;
        html += '</tbody></table>';
        body.innerHTML = html;
    }

    function typeColor(t) {
        return {INV:'#2980b9',SAL:'#16a085',QUO:'#8e44ad',ADV:'#d35400',CRN:'#c0392b',EXP:'#7f8c8d',RCM:'#e67e22'}[t] || '#555';
    }

    // ============================================================
    // F5: OUTSTANDING DUES
    // ============================================================
    function openOutstanding() {
        document.getElementById('outstandingModal').style.display='flex';
        renderOutstanding();
    }
    function closeOutstanding() { document.getElementById('outstandingModal').style.display='none'; }

    function renderOutstanding() {
        if (syncPendingNotice('outstandingBody')) return;
        let filter = document.getElementById('outstandingFilter').value;
        let types = filter === 'ALL' ? ['INV','SAL'] : [filter];

        let docs = savedDocs.filter(d =>
            types.includes(d.type) &&
            !d.docNo.includes('VOID')
        );

        // Pre-load cash entries once (not inside the map loop)
        let allCashEntries = getCashEntries();

        docs = docs.map(d => {
            let linkedAdvTotal = (d.advLinks || []).reduce((sum, l) => sum + (parseFloat(l.amt) || 0), 0);
            if (linkedAdvTotal === 0 && d.advAmt) linkedAdvTotal = parseFloat(d.advAmt) || 0;
            let crnLinked = savedDocs.filter(c =>
                c.type === 'CRN' && c.crnOrigRef === d.docNo
            ).reduce((sum, c) => sum + (c.total||0), 0);
            let advReceiptsForDoc = savedDocs.filter(a =>
                a.type === 'ADV' && a.clientName === d.clientName &&
                (a.linkedInvoice === d.docNo || (a.vDesc || '').includes(d.docNo))
            ).reduce((sum, a) => sum + (a.total||0), 0);
            // Cash Book IN entries explicitly linked to this invoice doc number
            // — this is the new Option A payment system: log ₹5000 received
            // against KT/INV26-27/0042 in Cash Book → balance reduces by ₹5000
            let cashPaymentsForDoc = allCashEntries.filter(e =>
                e.direction === 'IN' && e.linkedDoc === d.docNo
            ).reduce((sum, e) => sum + (e.amount||0), 0);
            let totalCredit = linkedAdvTotal + crnLinked + advReceiptsForDoc + cashPaymentsForDoc;
            // If payMode is set AND no advance/cash linking, treat full amount as paid
            let balanceDue = (d.payMode && totalCredit === 0) ? 0 : Math.max(0, (d.total||0) - totalCredit);
            return { ...d, balanceDue, totalCredit, cashPaymentsForDoc };
        }).filter(d => d.balanceDue > 0);

        docs.sort((a,b) => parseLocalDate(a.date) - parseLocalDate(b.date));

        let totalDue = docs.reduce((s,d) => s+d.balanceDue, 0);
        document.getElementById('outstandingTotalBadge').innerText = `Total Due: ₹${totalDue.toLocaleString('en-IN')}`;

        if(docs.length === 0) {
            document.getElementById('outstandingBody').innerHTML = '<p style="color:#27ae60;padding:20px;font-weight:bold;">✅ No outstanding dues found.</p>';
            return;
        }

        let now = new Date();
        docs = docs.map(d => {
            let cDate = cleanDate(d.date);
            let age = Math.floor((now - new Date(cDate)) / (24*60*60*1000));
            return { ...d, _age: age, _cDate: cDate };
        }).sort((a, b) => b._age - a._age);

        let buckets = { fresh: 0, due: 0, overdue: 0 };
        docs.forEach(d => {
            if (d._age <= 30) buckets.fresh += d.balanceDue;
            else if (d._age <= 60) buckets.due += d.balanceDue;
            else buckets.overdue += d.balanceDue;
        });

        let bucketHtml = `<div style="display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap;">
            <div style="flex:1; min-width:140px; background:#eafaf1; border:1px solid #a9dfbf; border-radius:6px; padding:10px; text-align:center;">
                <div style="font-size:10px; color:#1e8449; font-weight:bold; text-transform:uppercase;">0–30 Days</div>
                <div style="font-size:16px; font-weight:bold; color:#1e8449;">₹${buckets.fresh.toLocaleString('en-IN')}</div>
            </div>
            <div style="flex:1; min-width:140px; background:#fef5e7; border:1px solid #f8c471; border-radius:6px; padding:10px; text-align:center;">
                <div style="font-size:10px; color:#b9770e; font-weight:bold; text-transform:uppercase;">31–60 Days</div>
                <div style="font-size:16px; font-weight:bold; color:#b9770e;">₹${buckets.due.toLocaleString('en-IN')}</div>
            </div>
            <div style="flex:1; min-width:140px; background:#fdedec; border:1px solid #f1948a; border-radius:6px; padding:10px; text-align:center;">
                <div style="font-size:10px; color:#c0392b; font-weight:bold; text-transform:uppercase;">60+ Days ⚠️</div>
                <div style="font-size:16px; font-weight:bold; color:#c0392b;">₹${buckets.overdue.toLocaleString('en-IN')}</div>
            </div>
        </div>`;

        let html = bucketHtml + `<table class="analytics-table">
            <thead><tr><th>Date</th><th>Doc No</th><th>Type</th><th>Client</th><th style="text-align:right">Invoice (₹)</th><th style="text-align:right">Balance Due (₹)</th><th>Age</th><th>Actions</th></tr></thead><tbody>`;
        docs.forEach(d => {
            let age = d._age;
            let ageColor = age > 60 ? '#c0392b' : (age > 30 ? '#b9770e' : '#1e8449');
            let rowClass = age > 60 ? 'outstanding-row-overdue' : (age > 30 ? 'outstanding-row-due' : 'outstanding-row-ok');
            let ageIcon = age > 60 ? '🔴' : (age > 30 ? '🟠' : '');
            html += `<tr class="${rowClass}">
                <td>${formatDateDisplay(d._cDate)}</td>
                <td><b>${d.docNo}</b></td>
                <td><span style="background:${typeColor(d.type)};color:#fff;padding:2px 7px;border-radius:10px;font-size:11px;">${d.type}</span></td>
                <td>${d.clientName||'—'}</td>
                <td style="text-align:right;">₹${(d.total||0).toLocaleString('en-IN')}</td>
                <td style="text-align:right;font-weight:bold;color:#e74c3c;">₹${d.balanceDue.toLocaleString('en-IN')}</td>
                <td style="color:${ageColor};font-weight:bold;">${age}d ${ageIcon}</td>
                <td style="white-space:nowrap;">
                    <button class="btn-load" onclick="loadDocument(${d.id}); closeOutstanding();" style="font-size:11px;padding:4px 8px;">Load</button>
                    <button onclick="quickMarkPaid(${d.id})" style="background:#27ae60;color:#fff;border:none;padding:4px 8px;border-radius:3px;font-size:11px;cursor:pointer;font-weight:bold;width:auto;margin:0 0 0 4px;" title="Mark as paid — creates an Advance Receipt">💰 Paid</button>
                    <button onclick="shareOutstandingWhatsApp('${(d.clientName||'').replace(/'/g,"\\'")}','${d.docNo}',${d.balanceDue})" style="background:#25D366;color:#fff;border:none;padding:4px 8px;border-radius:3px;font-size:11px;cursor:pointer;font-weight:bold;width:auto;margin:0 0 0 4px;">📲</button>
                </td>
            </tr>`;
        });
        html += `<tr class="total-row"><td colspan="5">TOTAL OUTSTANDING</td><td style="text-align:right;">₹${totalDue.toLocaleString('en-IN')}</td><td colspan="2"></td></tr>`;
        html += '</tbody></table>';
        document.getElementById('outstandingBody').innerHTML = html;
    }

    // Quick "Mark as Paid" — loads the invoice into the editor pre-filled,
    // closes Outstanding, and switches to ADV mode so you can issue a
    // proper Advance Receipt in one flow.
    function quickMarkPaid(docId) {
        let doc = savedDocs.find(d => d.id === docId);
        if (!doc) return;
        let balDue = doc.balanceDue || doc.total || 0;
        let msg = `Mark ₹${balDue.toLocaleString('en-IN')} as received from ${doc.clientName}?\n\nThis will load the invoice so you can create an Advance Receipt linked to it.`;
        if (!confirm(msg)) return;
        closeOutstanding();
        loadDocument(docId, true);
        // Brief delay to let the doc load, then guide the user
        setTimeout(() => {
            showToast(`💰 Load complete — log the payment below or create an ADV receipt`, 'success');
        }, 400);
    }

    function shareOutstandingWhatsApp(client, docNo, balance) {
        let msg = `🧾 *KEN TRADERS — Payment Reminder*\n\nDear *${client}*,\n\nThis is a gentle reminder that a balance of *₹${balance.toLocaleString('en-IN')}* is due against invoice *${docNo}*.\n\nKindly arrange payment at your earliest convenience.\n\n📞 95850 88822 / 95850 88844`;
        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
    }

    // ============================================================
    // F19: MONTHLY SUMMARY
    // ============================================================
    let _summaryTab = 'monthly';
    function setSummaryTab(tab) {
        _summaryTab = tab;
        ['tabMonthly','tabClients','tabProducts'].forEach(id => document.getElementById(id).classList.remove('active'));
        document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
        renderSummary();
