    function openMonthlySummary() {
        document.getElementById('summaryModal').style.display='flex';
        populateSummaryFYDropdown();
        renderSummary();
    }
    function closeSummary() { document.getElementById('summaryModal').style.display='none'; }

    // G2: generates FY options dynamically around the current financial
    // year (a few years back, since older documents may still be looked
    // up, plus one year ahead for anything backdated/forward-dated) rather
    // than two hardcoded options that would silently stop covering new
    // years after April 2027.
    function populateSummaryFYDropdown() {
        let sel = document.getElementById('summaryFY');
        let currentFY = getFinancialYearLabel(); // e.g. "26-27" for today
        let currentStartYear = 2000 + parseInt(currentFY.split('-')[0], 10);

        let options = [];
        for (let offset = -3; offset <= 1; offset++) {
            let startY = currentStartYear + offset;
            let endYShort = String((startY + 1) % 100).padStart(2, '0');
            let label = `${startY}-${endYShort}`; // matches the full-year-prefixed format this dropdown has always used, e.g. "2026-27"
            options.push(label);
        }

        let previousValue = sel.value;
        sel.innerHTML = options.map(label =>
            `<option value="${label}">${label.replace('-', '–')}</option>`
        ).join('');
        // Preserve whatever was selected if it's still in range; otherwise default to current FY
        if (options.includes(previousValue)) sel.value = previousValue;
        else sel.value = `${currentStartYear}-${String((currentStartYear + 1) % 100).padStart(2, '0')}`;
    }

    function renderSummary() {
        if (syncPendingNotice('summaryBody')) { document.getElementById('summaryStatsGrid').innerHTML = ''; return; }
        let fy = document.getElementById('summaryFY').value;
        // G2: parse the start year out of the label generically (e.g.
        // "2026-27" → 2026) instead of a hardcoded ternary that only
        // recognized two specific financial years.
        let fyStartYear = parseInt(fy.split('-')[0], 10);
        let [fyStart, fyEnd] = [
            new Date(`${fyStartYear}-04-01`),
            new Date(`${fyStartYear + 1}-03-31`)
        ];

        let docs = savedDocs.filter(d => {
            let dt = parseLocalDate(d.date);
            return dt >= fyStart && dt <= fyEnd && !d.docNo.includes('VOID');
        });

        let salesDocs = docs.filter(d => ['INV','SAL'].includes(d.type));
        let totalSales = salesDocs.reduce((s,d) => s+(d.total||0), 0);
        let totalTax = salesDocs.filter(d=>d.type==='INV').reduce((s,d) => s+(d.total||0)*0.107, 0); // approx GST portion
        let totalAdv = docs.filter(d=>d.type==='ADV').reduce((s,d) => s+(d.total||0), 0);
        let totalExp = docs.filter(d=>['EXP','RCM'].includes(d.type)).reduce((s,d) => s+(d.total||0), 0);

        document.getElementById('summaryStatsGrid').innerHTML = `
            <div class="stat-card"><h3>Total Billed</h3><div class="stat-val">₹${totalSales.toLocaleString('en-IN')}</div><div class="stat-sub">${salesDocs.length} invoices</div></div>
            <div class="stat-card" style="border-color:#e67e22;"><h3>GST Collected (est.)</h3><div class="stat-val">₹${Math.round(totalTax).toLocaleString('en-IN')}</div><div class="stat-sub">Approx from INV only</div></div>
            <div class="stat-card" style="border-color:#2ecc71;"><h3>Advances Received</h3><div class="stat-val">₹${totalAdv.toLocaleString('en-IN')}</div><div class="stat-sub">${docs.filter(d=>d.type==='ADV').length} receipts</div></div>
            <div class="stat-card" style="border-color:#e74c3c;"><h3>Expenses</h3><div class="stat-val">₹${totalExp.toLocaleString('en-IN')}</div><div class="stat-sub">EXP + RCM vouchers</div></div>`;

        let html = '';
        if(_summaryTab === 'monthly') {
            let months = {};
            salesDocs.forEach(d => {
                let dt = parseLocalDate(d.date);
                let key = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`;
                if(!months[key]) months[key] = {billed:0, count:0};
                months[key].billed += d.total||0;
                months[key].count++;
            });
            html = `<table class="analytics-table"><thead><tr><th>Month</th><th style="text-align:right">No. of Invoices</th><th style="text-align:right">Total Billed (₹)</th></tr></thead><tbody>`;
            Object.keys(months).sort().forEach(k => {
                let [y,m] = k.split('-');
                let mName = new Date(y,m-1,1).toLocaleString('en-IN',{month:'long',year:'numeric'});
                html += `<tr><td>${mName}</td><td style="text-align:right;">${months[k].count}</td><td style="text-align:right;font-weight:bold;">₹${months[k].billed.toLocaleString('en-IN')}</td></tr>`;
            });
            html += `<tr class="total-row"><td>TOTAL</td><td style="text-align:right;">${salesDocs.length}</td><td style="text-align:right;">₹${totalSales.toLocaleString('en-IN')}</td></tr></tbody></table>`;

        } else if(_summaryTab === 'clients') {
            let clients = {};
            salesDocs.forEach(d => {
                let c = d.clientName || 'Unknown';
                if(!clients[c]) clients[c] = {billed:0, count:0};
                clients[c].billed += d.total||0;
                clients[c].count++;
            });
            let sorted = Object.entries(clients).sort((a,b) => b[1].billed - a[1].billed).slice(0,20);
            html = `<table class="analytics-table"><thead><tr><th>Client</th><th style="text-align:right">Invoices</th><th style="text-align:right">Total Billed (₹)</th></tr></thead><tbody>`;
            sorted.forEach(([name,v],i) => {
                html += `<tr><td>${i+1}. ${name}</td><td style="text-align:right;">${v.count}</td><td style="text-align:right;font-weight:bold;">₹${v.billed.toLocaleString('en-IN')}</td></tr>`;
            });
            html += '</tbody></table>';

        } else if(_summaryTab === 'products') {
            let products = {};
            salesDocs.forEach(d => {
                (d.cart||[]).forEach(item => {
                    if(!products[item.p]) products[item.p] = {qty:0, revenue:0};
                    products[item.p].qty += item.q||0;
                    products[item.p].revenue += (item.q||0)*(item.r||0);
                });
            });
            let sorted = Object.entries(products).sort((a,b) => b[1].revenue - a[1].revenue);
            html = `<table class="analytics-table"><thead><tr><th>Product</th><th style="text-align:right">Total Qty</th><th style="text-align:right">Revenue (₹)</th></tr></thead><tbody>`;
            sorted.forEach(([name,v]) => {
                html += `<tr><td>${name}</td><td style="text-align:right;">${v.qty.toLocaleString('en-IN')}</td><td style="text-align:right;font-weight:bold;">₹${Math.round(v.revenue).toLocaleString('en-IN')}</td></tr>`;
            });
            html += '</tbody></table>';
        }
        document.getElementById('summaryBody').innerHTML = html;
    }

    // ----------------------------------------------------------------
    // AUDIT PDF STORAGE — purchase bills & RCM vouchers, bundled by month
    // in Google Drive. Local cache (kenAuditDocs) holds metadata only (never
    // the PDF bytes themselves) so the list renders instantly; the actual
    // files live in Drive via the backend's uploadAuditPdf action.
    // ----------------------------------------------------------------
    function getAuditDocs() {
        try { return JSON.parse(localStorage.getItem('kenAuditDocs') || '[]'); } catch(e) { return []; }
    }
    function saveAuditDocsLocal(docs) {
        try { localStorage.setItem('kenAuditDocs', JSON.stringify(docs)); } catch(e) {}
    }

    // Converts a File object to a base64 string (without the data: URL
    // prefix), since that's what the backend's Utilities.base64Decode expects.
    function fileToBase64(file) {
        return new Promise((resolve, reject) => {
            let reader = new FileReader();
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

    // ----------------------------------------------------------------
    // i9: CLIENT-SIDE PHOTO COMPRESSION
    // ----------------------------------------------------------------
    // A phone camera photo straight off the camera is often 3-8MB. Resizing
    // to a sensible max dimension and re-encoding as JPEG at ~75% quality
    // brings that down to roughly 150-400KB — visually fine for a site
    // progress photo or delivery-proof shot, much faster to upload on poor
    // site signal, and keeps Drive's free-tier storage from filling up
    // even at a heavy logging pace (the math: even 20 photos/week at the
    // compressed size is well under 1GB/year, versus several GB/year at
    // full camera resolution).
    function compressImageFile(file, maxDimension = 1600, quality = 0.75) {
        return new Promise((resolve, reject) => {
            let img = new Image();
            let reader = new FileReader();
            reader.onload = (e) => { img.src = e.target.result; };
            reader.onerror = reject;

            img.onload = () => {
                let { width, height } = img;
                if (width > height && width > maxDimension) {
                    height = Math.round(height * (maxDimension / width));
                    width = maxDimension;
                } else if (height > maxDimension) {
                    width = Math.round(width * (maxDimension / height));
                    height = maxDimension;
                }

                let canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                canvas.getContext('2d').drawImage(img, 0, 0, width, height);

                canvas.toBlob(blob => {
                    if (!blob) { reject(new Error('Compression failed')); return; }
                    let compressedReader = new FileReader();
                    compressedReader.onload = () => resolve(compressedReader.result.split(',')[1]); // base64 without data: prefix
                    compressedReader.onerror = reject;
                    compressedReader.readAsDataURL(blob);
                }, 'image/jpeg', quality);
            };
            img.onerror = () => reject(new Error('Could not load image — file may be corrupted or not a supported image format'));

            reader.readAsDataURL(file);
        });
    }

    // editingAuditDocId is set when re-uploading to REPLACE an existing bill
    // (per "add or edit it anytime") rather than create a new one — passed
    // through as existingDriveFileId so the backend removes the old Drive
    // file instead of leaving an orphaned duplicate.
    let _editingAuditDocId = null;
    // Set when "Attach Purchase Bill" is used directly from the Add Batch
    // form in Stock Manager — links the resulting AuditDoc record back to
    // the batch it came from. Cleared after each upload.
    let _pendingBatchLinkForAuditPdf = null;

    function handleUploadAuditPdf() {
        let fileInput = document.getElementById('auditPdfFile');
        let month = document.getElementById('auditPdfMonth').value;
        let kind = document.getElementById('auditPdfKind').value;
        let statusEl = document.getElementById('auditPdfUploadStatus');

        if (!month) { alert('Select a month first.'); return; }
        if (!fileInput.files || fileInput.files.length === 0) { alert('Choose a PDF file to upload.'); return; }
        let file = fileInput.files[0];
        if (file.type !== 'application/pdf') { alert('Only PDF files are supported.'); return; }

        let existingDoc = _editingAuditDocId ? getAuditDocs().find(d => d.id === _editingAuditDocId) : null;

        statusEl.innerHTML = '⏳ Uploading…';
        fileToBase64(file).then(base64 => {
            let docId = existingDoc ? existingDoc.id : 'AD' + Date.now();
            fetch(WEB_APP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({
                    action: 'uploadAuditPdf',
                    data: {
                        id: docId, month, kind,
                        fileName: file.name,
                        base64Pdf: base64,
                        existingDriveFileId: existingDoc ? existingDoc.driveFileId : null,
                        linkedBatchId: existingDoc ? existingDoc.linkedBatchId : (_pendingBatchLinkForAuditPdf || ''),
                        linkedDocNo: existingDoc ? existingDoc.linkedDocNo : ''
                    }
                })
            })
            .then(r => r.json())
            .then(res => {
                if (!res.success) { statusEl.innerHTML = `❌ Upload failed: ${res.error || 'unknown error'}`; return; }
                let docs = getAuditDocs();
                let record = {
                    id: docId, month, kind, fileName: file.name,
                    driveUrl: res.driveUrl, driveFileId: res.driveFileId,
                    linkedBatchId: existingDoc ? existingDoc.linkedBatchId : (_pendingBatchLinkForAuditPdf || ''),
                    linkedDocNo: existingDoc ? existingDoc.linkedDocNo : '',
                    uploadedAt: new Date().toISOString()
                };
                let idx = docs.findIndex(d => d.id === docId);
                if (idx > -1) docs[idx] = record; else docs.push(record);
                saveAuditDocsLocal(docs);

                statusEl.innerHTML = `✅ ${existingDoc ? 'Replaced' : 'Uploaded'} successfully`;
                fileInput.value = '';
                _editingAuditDocId = null;
                _pendingBatchLinkForAuditPdf = null;
                renderAuditPdfList();
                setTimeout(() => { statusEl.innerHTML = ''; }, 3000);
            })
            .catch(err => { statusEl.innerHTML = `❌ Upload failed: ${err.message}`; });
        });
    }

    function startEditAuditPdf(docId) {
        let doc = getAuditDocs().find(d => d.id === docId);
        if (!doc) return;
        _editingAuditDocId = docId;
        document.getElementById('auditPdfMonth').value = doc.month;
        document.getElementById('auditPdfKind').value = doc.kind;
        document.getElementById('auditPdfUploadStatus').innerHTML = `✏️ Choose a new PDF below to replace "${doc.fileName}"`;
        document.getElementById('auditPdfFile').scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function deleteAuditPdf(docId) {
        if (!confirm('Permanently delete this PDF from Drive and the audit list?')) return;
        fetch(WEB_APP_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action: 'deleteAuditDoc', id: docId })
        })
        .then(r => r.json())
        .then(res => {
            if (res.success) {
                saveAuditDocsLocal(getAuditDocs().filter(d => d.id !== docId));
                renderAuditPdfList();
                showToast('Purchase bill deleted', 'error');
            } else {
                alert('Delete failed: ' + (res.error || 'unknown error'));
            }
        })
        .catch(err => alert('Delete failed: ' + err.message));
    }

    function renderGstrSummary() {
        let from = document.getElementById('gstrFrom').value;
        let to = document.getElementById('gstrTo').value;
        let body = document.getElementById('gstrSummaryBody');
        if (!from || !to) return;
        body.innerHTML = '<p style="color:#888; padding:20px; text-align:center;">⏳ Loading line items…</p>';

        fetchLineItemsForGstr().then(allItems => {
            let fromDate = parseLocalDate(from);
            let toDate = parseLocalDate(to);
            toDate.setHours(23, 59, 59);

            // Only Tax Invoices carry HSN/GST data (SAL is the no-tax simple
            // format, see F21) — and only docs actually in savedDocs as
            // non-voided INV count, so cross-reference docNo against that
            // rather than trusting docType alone in case of stale rows.
            let validInvoiceDocNos = new Set(
                savedDocs.filter(d => d.type === 'INV' && !d.docNo.includes('VOID')).map(d => d.docNo)
            );

            let items = allItems.filter(item => {
                if (!validInvoiceDocNos.has(item.docNo)) return false;
                let dt = parseLocalDate(item.docDate);
                return dt >= fromDate && dt <= toDate;
            });

            if (items.length === 0) {
                body.innerHTML = '<p style="color:#888; padding:20px; text-align:center;">No Tax Invoice line items found in this period.</p>';
                return;
            }

            // GSTR-1 needs B2B (client has a valid GSTIN) split from B2C
            // (no GSTIN / URD) — different tables in the actual return.
            // Reuses the same structural check as G3's live validation.
            let docGstinMap = {};
            savedDocs.forEach(d => { if (d.type === 'INV') docGstinMap[d.docNo] = d.gstin || ''; });

            let groups = {}; // key: hsn|gstRate|b2bOrB2c
            items.forEach(item => {
                let gstin = (docGstinMap[item.docNo] || '').trim().toUpperCase();
                let isB2B = GSTIN_PATTERN.test(gstin);
                let key = `${item.hsn || 'NO-HSN'}|${item.g || 0}|${isB2B ? 'B2B' : 'B2C'}`;
                if (!groups[key]) groups[key] = { hsn: item.hsn || '—', rate: item.g || 0, segment: isB2B ? 'B2B' : 'B2C', qty: 0, taxableValue: 0, taxAmount: 0 };

                let lineTotal = (Number(item.q) || 0) * (Number(item.r) || 0);
                // Rates are GST-inclusive in this app (per the existing
                // inclusiveTax toggle elsewhere) — back out the taxable
                // value from the line total using the line's own rate, not
                // a blanket assumption across the whole document.
                let rate = Number(item.g) || 0;
                let taxableValue = rate > 0 ? lineTotal / (1 + rate / 100) : lineTotal;
                let taxAmount = lineTotal - taxableValue;

                groups[key].qty += Number(item.q) || 0;
                groups[key].taxableValue += taxableValue;
                groups[key].taxAmount += taxAmount;
            });

            let rows = Object.values(groups).sort((a, b) => a.hsn.localeCompare(b.hsn) || a.rate - b.rate);

            let totalTaxable = rows.reduce((s, r) => s + r.taxableValue, 0);
            let totalTax = rows.reduce((s, r) => s + r.taxAmount, 0);

            let html = `<div style="display:flex; gap:10px; margin-bottom:14px;">
                <div style="flex:1; background:#eafaf1; border:1px solid #a9dfbf; border-radius:6px; padding:10px; text-align:center;">
                    <div style="font-size:10px; color:#1e8449; font-weight:bold; text-transform:uppercase;">Total Taxable Value</div>
                    <div style="font-size:16px; font-weight:bold; color:#1e8449;">₹${Math.round(totalTaxable).toLocaleString('en-IN')}</div>
                </div>
                <div style="flex:1; background:#eaf2f8; border:1px solid #aed6f1; border-radius:6px; padding:10px; text-align:center;">
                    <div style="font-size:10px; color:#1b4f72; font-weight:bold; text-transform:uppercase;">Total GST</div>
                    <div style="font-size:16px; font-weight:bold; color:#1b4f72;">₹${Math.round(totalTax).toLocaleString('en-IN')}</div>
                </div>
            </div>
            <table class="analytics-table">
                <thead><tr><th>HSN</th><th>GST %</th><th>Segment</th><th style="text-align:right">Qty</th><th style="text-align:right">Taxable Value (₹)</th><th style="text-align:right">GST Amount (₹)</th></tr></thead>
                <tbody>`;
            rows.forEach(r => {
                html += `<tr>
                    <td><b>${r.hsn}</b></td>
                    <td>${r.rate}%</td>
                    <td><span style="background:${r.segment === 'B2B' ? '#2980b9' : '#7f8c8d'};color:#fff;padding:2px 7px;border-radius:10px;font-size:11px;">${r.segment}</span></td>
                    <td style="text-align:right;">${r.qty}</td>
                    <td style="text-align:right;">₹${Math.round(r.taxableValue).toLocaleString('en-IN')}</td>
                    <td style="text-align:right;">₹${Math.round(r.taxAmount).toLocaleString('en-IN')}</td>
                </tr>`;
            });
            html += `<tr class="total-row"><td colspan="4">TOTAL</td><td style="text-align:right;">₹${Math.round(totalTaxable).toLocaleString('en-IN')}</td><td style="text-align:right;">₹${Math.round(totalTax).toLocaleString('en-IN')}</td></tr>`;
            html += '</tbody></table>';
            body.innerHTML = html;
            _lastGstrRows = rows; // cached for CSV export, avoids re-fetching
        }).catch(err => {
            body.innerHTML = `<p style="color:#c0392b; padding:20px;">❌ Could not load line items: ${err.message}</p>`;
        });
    }

    let _lastGstrRows = [];
    let _cachedLineItems = null; // session-level cache — line items don't change often enough to refetch every tab switch

    function fetchLineItemsForGstr() {
        if (_cachedLineItems) return Promise.resolve(_cachedLineItems);
        if (WEB_APP_URL === "PASTE_YOUR_WEB_APP_URL_HERE") return Promise.resolve([]);
        return fetch(WEB_APP_URL + '?sheet=lineItems')
            .then(r => r.json())
            .then(data => { _cachedLineItems = data || []; return _cachedLineItems; });
    }

    function exportGstrCSV() {
        if (_lastGstrRows.length === 0) { alert('Nothing to export — adjust the date range first.'); return; }
        let header = 'HSN,GST Rate,Segment,Qty,Taxable Value,GST Amount\n';
        let rows = _lastGstrRows.map(r =>
            `${r.hsn},${r.rate}%,${r.segment},${r.qty},${r.taxableValue.toFixed(2)},${r.taxAmount.toFixed(2)}`
        ).join('\n');
        let blob = new Blob([header + rows], { type: 'text/csv' });
        let url = URL.createObjectURL(blob);
        let a = document.createElement('a');
        let from = document.getElementById('gstrFrom').value;
        let to = document.getElementById('gstrTo').value;
        a.href = url;
        a.download = `KEN-Traders-GSTR1-HSN-Summary_${from}_to_${to}.csv`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function renderAuditPdfList() {
        let docs = getAuditDocs().sort((a, b) => b.month.localeCompare(a.month) || b.uploadedAt.localeCompare(a.uploadedAt));
        let body = document.getElementById('auditPdfMonthList');

            body.innerHTML = '<p style="color:#aaa; padding:20px; text-align:center;">No purchase bills or RCM vouchers uploaded yet.</p>';

        }

        Object.keys(byMonth).sort().reverse().forEach(month => {
            let monthLabel = new Date(month + '-01').toLocaleDateString('en-IN', { month: 'long', year: 'numeric' });
            let items = byMonth[month];
            html += `<div style="margin-bottom:16px;">
                <div style="display:flex; justify-content:space-between; align-items:center; background:#f4f6f7; padding:8px 12px; border-radius:4px; margin-bottom:6px;">
                    <b style="color:#2c3e50; font-size:13px;">${monthLabel}</b>
                    <span style="font-size:11px; color:#7f8c8d;">${items.length} file(s)</span>
                </div>`;
            items.forEach(d => {
                let kindLabel = d.kind === 'RCM_VOUCHER' ? '🔄 RCM Voucher' : '📎 Purchase Bill';
                html += `<div style="display:flex; justify-content:space-between; align-items:center; padding:8px 10px; border-bottom:1px solid #f0f0f0; font-size:13px;">
                    <div>
                        <span style="background:#e8daef;color:#6c3483;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:bold;">${kindLabel}</span>
                        <span style="margin-left:6px;">${d.fileName}</span>
                    </div>
                    <div style="display:flex; gap:6px;">
                        <a href="${d.driveUrl}" target="_blank" class="action-btn btn-load" style="text-decoration:none;">Open / Share</a>
                        <button class="action-btn btn-edit-item" onclick="startEditAuditPdf('${d.id}')">📝 Replace</button>
                        <button class="action-btn btn-del" onclick="deleteAuditPdf('${d.id}')">✕</button>
                    </div>
                </div>`;
            });
            html += `</div>`;
        });
        body.innerHTML = html;
    }

    function renderAuditor() {
        if (syncPendingNotice('auditorBody')) { document.getElementById('auditorSummaryCards').innerHTML = ''; return; }
        let from = parseLocalDate(document.getElementById('auditFrom').value || '2000-01-01');
        let to = parseLocalDate(document.getElementById('auditTo').value || '2099-12-31');
        to.setHours(23,59,59);
        let typeFilter = document.getElementById('auditTypeFilter').value;

        let docs = savedDocs.filter(d => {
            let dt = parseLocalDate(d.date);
            let matchType = typeFilter === 'ALL' || d.type === typeFilter;
            return dt >= from && dt <= to && matchType && !d.docNo.includes('VOID');
        }).sort((a,b) => parseLocalDate(a.date) - parseLocalDate(b.date));

        // Summary cards
        let invDocs = docs.filter(d=>d.type==='INV');
        let totalTaxable = invDocs.reduce((s,d) => s + (d.total||0) / 1.12, 0); // approx, mixed rates
        let totalGst = invDocs.reduce((s,d) => s + (d.total||0) - (d.total||0)/1.12, 0);
        let totalSal = docs.filter(d=>d.type==='SAL').reduce((s,d)=>s+(d.total||0),0);
        let totalRcm = docs.filter(d=>d.type==='RCM').reduce((s,d)=>s+(d.total||0),0);
        let totalExp = docs.filter(d=>d.type==='EXP').reduce((s,d)=>s+(d.total||0),0);

        document.getElementById('auditorSummaryCards').innerHTML = `
            <div class="stat-card"><h3>Tax Invoices</h3><div class="stat-val">₹${Math.round(invDocs.reduce((s,d)=>s+(d.total||0),0)).toLocaleString('en-IN')}</div><div class="stat-sub">${invDocs.length} docs · est. GST ₹${Math.round(totalGst).toLocaleString('en-IN')}</div></div>
            <div class="stat-card" style="border-color:#16a085;"><h3>Sales Invoices</h3><div class="stat-val">₹${Math.round(totalSal).toLocaleString('en-IN')}</div><div class="stat-sub">${docs.filter(d=>d.type==='SAL').length} docs (incl. GST)</div></div>
            <div class="stat-card" style="border-color:#e67e22;"><h3>RCM Liability</h3><div class="stat-val">₹${Math.round(totalRcm).toLocaleString('en-IN')}</div><div class="stat-sub">${docs.filter(d=>d.type==='RCM').length} vouchers</div></div>
            <div class="stat-card" style="border-color:#e74c3c;"><h3>Expenses</h3><div class="stat-val">₹${Math.round(totalExp).toLocaleString('en-IN')}</div><div class="stat-sub">${docs.filter(d=>d.type==='EXP').length} vouchers</div></div>`;

        if(docs.length === 0) { document.getElementById('auditorBody').innerHTML='<p style="color:#888;padding:20px;">No documents in this range.</p>'; return; }

        let html = `<table class="analytics-table" id="auditTable">
            <thead><tr><th>Date</th><th>Doc No</th><th>Type</th><th>Client / Payee</th><th style="text-align:right">Amount (₹)</th><th>Payment</th></tr></thead><tbody>`;
        docs.forEach(d => {
            let cDate = formatDateDisplay(d.date);
            let payInfo = d.payMode ? d.payMode : (d.vMode || '—');
            html += `<tr>
                <td>${cDate}</td>
                <td><b>${d.docNo}</b></td>
                <td><span style="background:${typeColor(d.type)};color:#fff;padding:2px 7px;border-radius:10px;font-size:11px;">${d.type}</span></td>
                <td>${d.clientName || d.vPaidTo || '—'}</td>
                <td style="text-align:right;font-weight:bold;">₹${(d.total||0).toLocaleString('en-IN')}</td>
                <td style="font-size:12px;">${payInfo}</td>
            </tr>`;
        });
        let grandTotal = docs.reduce((s,d)=>s+(d.total||0),0);
        html += `<tr class="total-row"><td colspan="4">GRAND TOTAL (${docs.length} documents)</td><td style="text-align:right;">₹${grandTotal.toLocaleString('en-IN')}</td><td></td></tr>`;
        html += '</tbody></table>';
        document.getElementById('auditorBody').innerHTML = html;
    }

    function updateAdvPrint() {
        let amt = parseFloat(document.getElementById('advDirectAmt').value) || 0;
        let desc = document.getElementById('advDirectDesc').value || '—';
        let quoRef = document.getElementById('advQuoRef').value || '';
        let quoTotal = parseFloat(document.getElementById('advQuoTotal').value) || 0;
        let payMode = document.getElementById('advPayMode').value || '—';
        let payRef = document.getElementById('advPayRef').value || '';

        document.getElementById('advPrintAmt').innerText = '₹' + amt.toLocaleString('en-IN');
        document.getElementById('advPrintWords').innerText = amt > 0 ? 'Rupees ' + numberToWords(Math.round(amt)) + ' Only' : '';
        document.getElementById('advPrintDesc').innerText = desc;
        document.getElementById('advPrintPayMode').innerText = payMode;
        let ref = payRef ? (payMode.includes('UPI') || payMode.includes('Bank') ? '(UTR: '+payRef+')' : '(Ref: '+payRef+')') : '';
        document.getElementById('advPrintPayRef').innerText = ref;

        let quoRow = document.getElementById('advPrintQuoRow');
        let balRow = document.getElementById('advPrintBalRow');
        if(quoRef) {
            quoRow.style.display = 'block';
            document.getElementById('advPrintQuoRef').innerText = quoRef;
            document.getElementById('advPrintQuoTotal').innerText = quoTotal > 0 ? '(Total: ₹' + quoTotal.toLocaleString('en-IN') + ')' : '';
            if(quoTotal > 0 && amt > 0) {
                balRow.style.display = 'block';
                document.getElementById('advPrintQuoAmt').innerText = '₹' + quoTotal.toLocaleString('en-IN');
                document.getElementById('advPrintThisAmt').innerText = '₹' + amt.toLocaleString('en-IN');
                let bal = quoTotal - amt;
                document.getElementById('advPrintBal').innerText = bal > 0 ? '₹' + bal.toLocaleString('en-IN') : 'FULLY PAID ✅';
                document.getElementById('advPrintBal').style.color = bal > 0 ? '#e74c3c' : '#27ae60';
            } else { balRow.style.display = 'none'; }
        } else { quoRow.style.display = 'none'; balRow.style.display = 'none'; }

        // Also update the grand total display for saveDocument
        if(document.getElementById('dispGrand') && document.getElementById('docType').value === 'ADV') {
            document.getElementById('dispGrand').innerText = amt.toLocaleString('en-IN', {minimumFractionDigits:2});
            document.getElementById('dispSalesWords').innerText = amt > 0 ? 'Rupees ' + numberToWords(Math.round(amt)) + ' Only' : '';

    // A8: Builds one advance-link row. The Receipt No. field is a searchable
    // autocomplete (not free text) — it only shows ADV receipts belonging to the
    // currently-selected client, matched by substring on the digits (typing "12"
    // surfaces 0012, 0120, 0122, etc). Selecting one auto-fills the amount.
    function buildAdvLinkRowHTML(rowId, refVal = '', amtVal = '') {
        return `<td style="position:relative;">
                    <input type="text" class="adv-ref-in" id="advRefRow_${rowId}" value="${refVal}" placeholder="Search receipt no..." autocomplete="off"
                        oninput="handleAdvRefSearch('${rowId}')" onfocus="handleAdvRefSearch('${rowId}')"
                        onblur="setTimeout(() => closeAdvRefSuggestions('${rowId}'), 150)">
                    <div id="advRefSuggest_${rowId}" class="client-suggestions-box" style="top:auto;"></div>
                </td>
                <td><input type="number" class="adv-amt-in" id="advAmtRow_${rowId}" value="${amtVal}" placeholder="0" oninput="renderTable()"></td>
                <td><button class="btn-adv-del-row" onclick="this.closest('tr').remove(); renderTable();">✕</button></td>`;
    }

    let _advLinkRowCounter = 0;
    function addAdvLinkRow() {
        let tbody = document.getElementById('advLinkBody');
        if(!tbody) return;
        let rowId = 'r' + (_advLinkRowCounter++);
        let tr = document.createElement('tr');
        tr.innerHTML = buildAdvLinkRowHTML(rowId);
        tbody.appendChild(tr);
    }

    // A8: Finds this client's available (not already-linked-elsewhere) ADV receipts
    // matching what's typed, by substring on the receipt's digits or description.
    function getMatchingAdvReceipts(query) {
        let clientName = document.getElementById('clientNameIn').value.trim().toLowerCase();
        if (!clientName) return [];
        let needle = query.trim().toLowerCase();
        let advDocs = savedDocs.filter(d =>
            d.type === 'ADV' && !d.docNo.includes('VOID') &&
            d.clientName && d.clientName.trim().toLowerCase() === clientName
        );
        if (!needle) return advDocs.slice(0, 8);
        return advDocs.filter(d => {
            let digits = d.docNo.replace(/\D/g, '');
            return digits.includes(needle) || d.docNo.toLowerCase().includes(needle) ||
                   (d.advDirectDesc || '').toLowerCase().includes(needle);
        }).slice(0, 8);
    }

    function handleAdvRefSearch(rowId) {
        let input = document.getElementById('advRefRow_' + rowId);
        let box = document.getElementById('advRefSuggest_' + rowId);
        if (!input || !box) return;
        let matches = getMatchingAdvReceipts(input.value);
        if (matches.length === 0) {
            box.innerHTML = document.getElementById('clientNameIn').value.trim()
                ? '<div class="client-suggestion-row" style="color:#888;cursor:default;">No advance receipts found for this client</div>'
                : '<div class="client-suggestion-row" style="color:#888;cursor:default;">Enter a client name first</div>';
            box.style.display = 'block';
            return;
        }
        box.innerHTML = matches.map(d => `
            <div class="client-suggestion-row" onmousedown="selectAdvReceipt('${rowId}', '${d.docNo}', ${d.total || 0})">
                <span><b>${d.docNo}</b> ${d.advDirectDesc ? '— ' + d.advDirectDesc : ''}</span>
                <span class="client-suggestion-meta">₹${(d.total||0).toLocaleString('en-IN')}</span>
            </div>
        `).join('');
        box.style.display = 'block';
    }

    function closeAdvRefSuggestions(rowId) {
        let box = document.getElementById('advRefSuggest_' + rowId);
        if (box) box.style.display = 'none';
    }

    function selectAdvReceipt(rowId, docNo, amount) {
        document.getElementById('advRefRow_' + rowId).value = docNo;
        document.getElementById('advAmtRow_' + rowId).value = amount;
        closeAdvRefSuggestions(rowId);
        renderTable();
    }

        );

            let digits = d.docNo.replace(/\D/g, '');
            return digits.includes(needle) || d.docNo.toLowerCase().includes(needle);
        }).slice(0, 8);
    }

    function openInvoicePicker() {

    function closeInvoicePicker() {

    function clearInvoicePicker(evt) {
        if (evt) evt.stopPropagation();
        document.getElementById('cbLinkedDoc').value = '';
        document.getElementById('cbLinkedDocAmt').value = '';
        document.getElementById('cbInvoicePickerLabel').innerText = '🔍 Search invoice...';
        document.getElementById('cbInvoicePickerLabel').style.color = '#aaa';
        document.getElementById('cbInvoiceClearBtn').style.display = 'none';
    }

    function filterInvoicePicker() {
        let q = (document.getElementById('invoicePickerSearch').value || '').toLowerCase();
        let cashEntries = getCashEntries();
        let invoices = savedDocs.filter(d => ['INV','SAL'].includes(d.type) && !d.docNo.includes('VOID'));
        if (q) {
            invoices = invoices.filter(d =>
                (d.clientName||'').toLowerCase().includes(q) ||
                (d.docNo||'').toLowerCase().includes(q) ||
                String(d.total||'').includes(q)
            );
        }
        invoices.sort((a,b) => new Date(b.date||0) - new Date(a.date||0));
        invoices = invoices.slice(0, 30);

        let list = document.getElementById('invoicePickerList');
        if (invoices.length === 0) {
            list.innerHTML = '<div style="padding:16px;color:#aaa;font-size:13px;text-align:center;">No invoices found</div>';
            return;
        }
        list.innerHTML = invoices.map(d => {
            let cashPaid = cashEntries.filter(e => e.direction === 'IN' && e.linkedDoc === d.docNo).reduce((s,e)=>s+(e.amount||0),0);
            let advPaid = (d.advLinks||[]).reduce((s,l)=>s+(parseFloat(l.amt)||0),0);
            let balance = Math.max(0, (d.total||0) - cashPaid - advPaid);
            let balColor = balance === 0 ? '#27ae60' : '#e74c3c';
            let balLabel = balance === 0 ? '✅ Paid' : `₹${balance.toLocaleString('en-IN')} due`;
            return `<div onclick="selectInvoiceFromPicker('${d.docNo.replace(/'/g,"\\'")}',${d.total||0},'${(d.clientName||'').replace(/'/g,"\\'")}','${d.date||''}')"
                style="padding:10px 14px;cursor:pointer;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center;"
                onmouseover="this.style.background='#f4f6f7'" onmouseout="this.style.background='#fff'">
                <div>
                    <div style="font-weight:bold;font-size:13px;color:#2c3e50;">${d.docNo}</div>
                    <div style="font-size:11px;color:#888;">${d.clientName||''} · ${formatDateDisplay(d.date)}</div>
                </div>
                <div style="text-align:right;">
                    <div style="font-weight:bold;font-size:13px;color:#2c3e50;">₹${(d.total||0).toLocaleString('en-IN')}</div>
                    <div style="font-size:11px;color:${balColor};">${balLabel}</div>
                </div>
            </div>`;
        }).join('');
    }

    function populateCashBookProjectDropdown() {
        let sel = document.getElementById('cbProjectTag');
        let sites = getSites();
        let projects = getProjects();
        let options = projects.map(p => {
            let site = sites.find(s => s.id === p.siteId);
