<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KEN Traders - Master OS</title>

    <!-- Improvement #6: PWA basics — installable on phone/desktop home
         screens. Requires manifest.json + the icons/ folder to be hosted
         in the SAME location as this HTML file (relative paths below).
         Also requires HTTPS (or localhost) — installability and the
         service worker silently won't activate over a plain file:// path
         or non-secure http://, since browsers restrict both to secure
         contexts. See the updated SETUP_GUIDE.md for hosting notes. -->
    <!-- PWA — manifest + meta tags for Android (Chrome) and iOS (Safari).
         manifest.json must be in the same folder as this HTML file. -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="KEN Traders">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* --- GENERAL STYLES --- */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f5; margin: 0; padding: 0; padding-bottom: 100px; }
        
        /* --- RESPONSIVE LAYOUT ENGINE (DESKTOP OPTIMIZED) --- */
        .container { display: flex; align-items: flex-start; gap: 20px; width: 98%; max-width: 1900px; margin: 20px auto; }
        
        .editor-box { flex: 0 0 700px; background: #2c3e50; color: white; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); position: sticky; top: 20px; max-height: 94vh; overflow-y: auto; z-index: 10; border-bottom: 4px solid #e67e22; border-radius: 6px; box-sizing: border-box; }
        .preview-box { flex: 1; background: transparent; padding: 0; width: 100%; display: block; box-sizing: border-box; }
        
        @media (max-width: 1100px) {
            .container { flex-direction: column; width: 100%; margin: 0; }
            .editor-box { flex: none; width: 100%; position: relative; top: 0; max-height: none; overflow-y: visible; border-radius: 0; }
            .preview-box { padding: 20px 10px; }
        }

        /* BUG FIX: the document preview (.bill-layout) used fixed desktop/A4
           pixel sizes — 40px padding, a 32px nowrap title, and a 350px minimum
           width on the title block alone. On a ~380px phone screen that combo
           guaranteed the title got clipped ("QUOTATION" → "QUOTA") and the
           header fought itself for space. This breakpoint scales the whole
           preview down proportionally instead of just reflowing the editor. */
        @media (max-width: 600px) {
            .bill-layout { padding: 16px; min-height: auto; }
            .header { flex-direction: column; align-items: flex-start; gap: 14px; min-height: auto; }
            .invoice-title { min-width: 0; width: 100%; text-align: left; }
            .invoice-title h1 { font-size: 22px; white-space: normal; }
            .invoice-title > div { align-items: flex-start !important; text-align: left !important; }
            .company-sub { font-size: 12px; }
            .fixed-logo { max-height: 44px; }
            .info-grid { flex-direction: column; gap: 12px; }
            .header-divider { margin: 0 0 16px 0; }
            table { font-size: 11px; }
            th, td { padding: 6px 4px !important; }
            .unified-footer { flex-direction: column; gap: 10px; }
            .signature-box-condensed { border-left: none; padding-left: 0; align-items: center !important; text-align: center !important; }
            .terms-box-condensed { border-left: none; padding-left: 0; align-items: flex-start !important; text-align: left !important; }

            /* BUG FIX: the Add Product row (Select Product / Qty / Unit / Rate)
               was a rigid 4-wide flex row with no wrap — fine on desktop, but
               crammed into unreadable widths on a ~380px phone (see screenshot).
               Reflows into Product full-width on its own line, Qty/Unit/Rate
               sharing the row below. */
            .add-product-row { flex-wrap: wrap; }
            .add-product-row > div:first-child { flex: 1 1 100% !important; }
            .add-product-row > div:not(:first-child) { flex: 1 1 0 !important; }
        }
        
        .footer-flex { display: flex; justify-content: flex-end; align-items: center; gap: 15px; width: 100%; margin-right: -10px; }
        .grand-badge { display: inline-block; background: #21b860; color: white; padding: 4px 6px; border-radius: 4px; margin-right: -10px}
        .master-bar { background: #1a252f; padding: 15px; border-radius: 6px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; box-sizing: border-box; }
        .master-bar > div { display: flex; flex: 1; min-width: 140px; }
        .master-bar select, .master-bar button { width: 100%; font-size: 13px; font-weight: bold; padding: 10px 8px; background: #e67e22; color: white; border: none; border-radius: 4px; cursor: pointer; margin: 0; height: 100%; }
        .master-bar .btn-engine { background: #34495e; border: 1px solid #7f8c8d; }
        .master-bar .btn-void { background: #c0392b; }

        /* ============================================================
           U5: DOC TYPE — its own dedicated, visually prominent block
        ============================================================ */
        .doctype-spotlight { background: linear-gradient(135deg, #e67e22, #d35400); padding: 4px; border-radius: 8px; margin-bottom: 14px; box-shadow: 0 4px 12px rgba(230,126,34,0.35); }
        .doctype-spotlight label { color: #fff8f0; font-size: 10px; margin: 6px 0 2px 10px; opacity: 0.9; }
        .doctype-spotlight select { background: #1a252f; color: #fff; font-size: 16px; font-weight: 800; padding: 14px 12px; border-radius: 6px; border: none; margin-top: 0; }

        /* ============================================================
           U7: Signature / Boss Mode / Void — uniform grouped row
        ============================================================ */
        .action-trio-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 12px; }
        .action-trio-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; padding: 12px 6px; border-radius: 6px; border: none; cursor: pointer; font-size: 11px; font-weight: bold; color: #fff; text-align: center; min-height: 64px; width: 100%; margin: 0; box-sizing: border-box; }
        .action-trio-btn .trio-icon { font-size: 20px; line-height: 1; }
        .action-trio-btn select.trio-select { -webkit-appearance: none; appearance: none; background: transparent; border: none; color: #fff; font-size: 11px; font-weight: bold; text-align: center; text-align-last: center; cursor: pointer; padding: 0; margin: 0; height: auto; }
        /* BUG FIX: <option> elements render against the browser's native dropdown
           background (white), so they need an explicit dark color — without this
           they inherit the closed-select's white text and become invisible. */
        .action-trio-btn select.trio-select option { color: #222; background: #fff; }
        .trio-signature { background: #8e44ad; }
        .trio-bossmode { background: #2e7d32; }
        .trio-bossmode.is-on { background: #1b5e20; box-shadow: inset 0 0 0 2px #a5d6a7; }
        .trio-void { background: #c0392b; }

        /* ============================================================
           U4: Analytics buttons — dedicated 2x3 grid section
        ============================================================ */
        .analytics-section { background: #16212c; border-radius: 8px; padding: 12px; margin-bottom: 16px; border: 1px solid #2c3e50; }
        .analytics-section-title { font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; color: #7f8c8d; margin-bottom: 8px; padding-left: 2px; }
        .analytics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .analytics-grid-btn {
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
            background: var(--analytics-btn-color, #2c3e50);
            color: #fff; border: none; border-radius: 6px; cursor: pointer;
            padding: 12px 4px; font-size: 11px; font-weight: bold; min-height: 64px;
            width: 100%; margin: 0; box-sizing: border-box; text-align: center;
        }
        .analytics-grid-btn .ag-icon { font-size: 20px; line-height: 1; }
        /* Change any button's color later by editing the --analytics-btn-color custom
           property on its specific id below — see comment block right above this rule. */
        #btnAnalyticsLedger      { --analytics-btn-color: #2c3e50; }
        #btnAnalyticsOutstanding { --analytics-btn-color: #2c3e50; }
        #btnAnalyticsSummary     { --analytics-btn-color: #2c3e50; }
        #btnAnalyticsAudit       { --analytics-btn-color: #2c3e50; }
        #btnAnalyticsCashBook    { --analytics-btn-color: #2c3e50; }
        #btnAnalyticsStock       { --analytics-btn-color: #2c3e50; }

        /* ============================================================
           U6: Item Manager — tabbed modal (Tiers / Item Defaults)
        ============================================================ */
        .engine-tab-bar { display: flex; gap: 6px; margin-bottom: 16px; border-bottom: 2px solid #eee; padding-bottom: 8px; }
        .engine-tab-btn { background: #ecf0f1; color: #2c3e50; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: 600; width: auto; margin: 0; }
        .engine-tab-btn.active { background: #e67e22; color: #fff; }
        .engine-tab-content { display: none; }
        .engine-tab-content.active { display: block; }
        .item-mgr-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr auto; gap: 8px; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 13px; }
        .item-mgr-row input, .item-mgr-row select { background: #fff; color: #333; border: 1px solid #ccc; padding: 6px 8px; margin: 0; font-size: 12px; border-radius: 4px; }
        .item-mgr-header { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr auto; gap: 8px; font-size: 10px; font-weight: bold; text-transform: uppercase; color: #7f8c8d; padding-bottom: 6px; border-bottom: 2px solid #ddd; }
        .btn-item-mgr-del { background: #ffebee; color: #e74c3c; border: none; padding: 5px 9px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; width: auto; margin: 0; }
        .btn-item-mgr-add { background: #27ae60; color: #fff; border: none; padding: 9px 16px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold; width: auto; margin-top: 12px; }

        /* ============================================================
           U8: Doc number live-collision warning
        ============================================================ */
        .docno-warning { display: none; background: #c0392b; color: #fff; font-size: 11px; padding: 6px 10px; border-radius: 4px; margin-top: 4px; font-weight: bold; }

        /* ============================================================
           U3: Cloud Manager multi-select
        ============================================================ */
        .doc-select-checkbox { width: 18px; height: 18px; cursor: pointer; margin: 0; }
        .bulk-action-bar { display: none; background: #2c3e50; color: #fff; padding: 10px 14px; border-radius: 6px; margin-bottom: 10px; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
        .bulk-action-bar.show { display: flex; }
        .bulk-action-bar .bulk-count { font-size: 13px; font-weight: bold; }
        .bulk-action-bar .bulk-buttons { display: flex; gap: 8px; }
        .btn-bulk { background: #e74c3c; color: #fff; border: none; padding: 7px 14px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; width: auto; margin: 0; }
        .btn-bulk-pdf { background: #8e44ad; }
        .btn-bulk.disabled-bulk { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
        
        .bill-layout { background: white; padding: 40px; color: #333; width: 100%; box-sizing: border-box; box-shadow: 0 0 10px rgba(0,0,0,0.1); position: relative; overflow: hidden; min-height: 800px; display: flex; flex-direction: column;}

        .watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-45deg); font-size: 140px; color: rgba(231, 76, 60, 0.15); font-weight: 900; z-index: 50; pointer-events: none; display: none; letter-spacing: 5px; text-transform: uppercase;}

        label { font-size: 11px; font-weight: bold; text-transform: uppercase; color: #bdc3c7; margin-top: 12px; display: block; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; background: #34495e; border: 1px solid #465c71; color: white; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        
        button { cursor: pointer; border: none; padding: 12px; border-radius: 4px; font-weight: bold; width: 100%; margin-top: 15px; font-size: 15px; color: white; transition: transform 0.1s ease, background-color 0.2s ease; }
        button:active, .pressed-state { transform: scale(0.95); opacity: 0.85; box-shadow: inset 0 3px 5px rgba(0,0,0,0.4)!important; }
        .btn-add { background: #3498db; }
        .btn-mortar { background: #9b59b6; margin-top: 8px; }
        
        .action-bar { position: fixed; bottom: 20px; left: 5%; width: 90%; display: flex; gap: 10px; z-index: 1000; }
        .btn-print { flex: 1; background: #27ae60; color: white; font-size: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); padding: 15px; border-radius: 8px; margin: 0;}
        .btn-pdf { flex: 1; background: #e74c3c; color: white; font-size: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); padding: 15px; border-radius: 8px; margin: 0;}
        .btn-save { flex: 1; background: #2980b9; color: white; font-size: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); padding: 15px; border-radius: 8px; margin: 0;}

        /* --- INVOICE AESTHETICS --- */
        .header { display: flex; justify-content: space-between; align-items: stretch; min-height: 160px; height: auto; padding-bottom: 15px; z-index: 1;}
        .fixed-logo { max-height: 60px; max-width: 100%; display: block; margin-bottom: 15px; border-radius: 4px; }
        .company-sub { font-size: 13px; color: #555; line-height: 1.5; }
        .invoice-title { text-align: right; min-width: 350px; }
        .invoice-title h1 { margin: 0; font-size: 32px; color: #2c3e50; text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; }
        .header-divider { border-top: 4px solid #2c3e50; margin: 0 0 25px 0; z-index: 1;}
        
        .info-grid { display: flex; gap: 20px; margin-bottom: 25px; z-index: 1; width: 100%;}
        .client-box { background: #f9f9f9; padding: 15px 20px; border-left: 6px solid #2c3e50; flex: 1; line-height: 1.6; min-height: 100px; font-size: 13px; color: #555;}
        .client-label { font-size: 11px; font-weight: bold; color: #7f8c8d; text-transform: uppercase; margin-bottom: 5px; }

        .table-container { flex-grow: 1; z-index: 1;}
        table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; border-bottom: 1px solid #ddd;}
        th { background: #2c3e50; color: white; padding: 12px 10px; text-align: left; font-weight: 600; border-left: 1px solid #34495e; border-right: 1px solid #34495e;}
        td { border-left: 1px solid #eee; border-right: 1px solid #eee; border-bottom: 1px solid #eee; padding: 10px; color: #333; vertical-align: middle; word-wrap: break-word;}
        
        .action-flex-wrapper { display: flex; gap: 4px; justify-content: flex-start; align-items: center; }
        .action-btn { background: #eee; border: none; cursor: pointer; font-size: 11px; padding: 5px 6px; border-radius: 3px; color: #333; font-weight: bold; width: auto; margin-top: 0; }
        .btn-del { background: #ffebee; color: #e74c3c; }
        .btn-edit-item { background: #e8f4fd; color: #1da1f2; }
        .btn-move-item { background: #f4f6f7; color: #7f8c8d; padding: 3px 5px; }

        .text-right { text-align: right !important; }
        .text-center { text-align: center !important; }
        .text-left { text-align: left !important; }
        
        .summary-label { text-align: right; padding: 6px 10px; font-size: 13px; color: #555; border: none !important; }
        .summary-val { text-align: right; padding: 6px 10px; font-size: 13px; color: #222; border: none !important; }
        .grand-row td { border-top: 1px dashed #333 !important; border-bottom: 2px solid #333 !important; padding: 12px 10px; font-size: 16px; font-weight: bold; color: #222; border-left: none !important; border-right: none !important;}
        .payment-print-row { background: #e8f8f5 !important; font-weight: bold; color: #117a65;}
        .payment-print-row td { padding: 10px; font-size: 14px; border: none !important;}

        .v-row { display: flex; border-bottom: 1px solid #eee; padding: 12px 0; font-size: 14px; z-index: 1;}
        .v-label { width: 30%; font-weight: bold; color: #555; }
        .v-value { width: 70%; font-weight: 600; color: #222; }
        .v-desc-highlight { background: #fdfdfd; border-left: 4px solid #3498db; padding: 10px; margin: 5px 0; }
        .amount-box { background: #eeeeee; border-left: 6px solid #2c3e50; padding: 15px; margin-top: 20px; text-align: center; font-size: 20px; font-weight: bold; color: #2c3e50;}
        .rcm-badge { display: inline-block; background: #1e8449; color: white; padding: 6px 12px; font-size: 12px; font-weight: 700; border-radius: 4px; letter-spacing: 0.5px; font-family: 'Segoe UI', 'Inter', -apple-system, Arial, sans-serif; }
        /* A4: SAL "prices inclusive of GST" badge — same modern sans treatment as
           RCM, blue rather than green/orange since this is a neutral pricing note,
           not a compliance confirmation (green) or a warning (orange). */
        .gst-included-badge { display: inline-block; background: #2874a6; color: white; padding: 6px 12px; font-size: 12px; font-weight: 700; border-radius: 4px; letter-spacing: 0.5px; font-family: 'Segoe UI', 'Inter', -apple-system, Arial, sans-serif; }

        .unified-footer { display: flex; width: 100%; border-top: 2px solid #2c3e50; margin-top: auto; padding-top: 10px; gap: 15px; align-items: stretch; page-break-inside: avoid; break-inside: avoid; z-index: 1; }
        .bank-box-condensed { flex: 1.5; background: #f4f6f7; padding: 8px 10px; border-radius: 4px; font-size: 11px; line-height: 1.4; color: #333; display: flex; align-items: center; gap: 10px; border-left: 4px solid #2ecc71; }
        .bank-details-text { flex-grow: 1; }
        .qr-placeholder-box { width: 60px; height: 60px; min-width: 60px; min-height: 60px; background: #ffffff; border: 1px dashed #bdc3c7; border-radius: 4px; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 8px; font-weight: bold; color: #7f8c8d; text-transform: uppercase; line-height: 1.1; }

        .terms-box-condensed ul { padding-left: 12px; margin: 4px 0 0 0; }
        .terms-box-condensed li { margin-bottom: 2px; }
        .signature-box-condensed { flex: 1.2; display: flex; flex-direction: column; justify-content: space-between; align-items: flex-end; text-align: right; border-left: 1px solid #ddd; padding-left: 12px; min-height: 75px; }
        .signature-title { margin: 0; font-weight: bold; font-size: 12px; color: #2c3e50; }
        .signature-sub { margin: 0; font-size: 11px; color: #555; }

        /* MODALS */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 95%; max-width: 1000px; border-radius: 8px; padding: 20px; max-height: 85vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }
        .modal-header h2 { margin: 0; color: #2c3e50; display: flex; align-items: center; gap: 15px;}
        .close-btn { background: #e74c3c; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; width: auto; margin:0;}
        .btn-db { background: #3498db; color: white; font-size: 12px; padding: 6px 12px; border-radius: 4px; cursor: pointer; width: auto; margin: 0;}
        
        .doc-list-table { width: 100%; border-collapse: collapse; margin-top: 10px;}

            .doc-list-table { display: block; overflow-x: auto; white-space: nowrap; }
            .doc-list-table thead, .doc-list-table tbody, .doc-list-table tr { display: table; width: 100%; table-layout: fixed; }
            /* A9: quick high-value mobile fixes — modal content was overflowing
               and stat-card grids/date pickers were cramming into unreadable
               widths on phones (see Customer Ledger / Auditor Export screenshots).
               Scoped narrowly: tighter modal padding, smaller header text, and
               forcing the most common card-grid widths (2-4 col) down to 2 cols
               so numbers don't visually collide. Full responsive pass deferred —
               not worth the effort given the planned Android app conversion. */
            .modal-content { width: 100%; max-width: 100%; padding: 12px; border-radius: 0; max-height: 100vh; }
            .modal-header h2 { font-size: 16px; gap: 8px; }
            .stat-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 8px !important; }
            .period-select-row { flex-direction: column; align-items: stretch !important; gap: 6px !important; }
            .period-select-row input[type="date"], .period-select-row select { width: 100% !important; }
        }
        .doc-list-table th { background: #f4f6f7; color: #2c3e50; padding: 10px; border-bottom: 2px solid #bdc3c7; text-align: left; position: sticky; top: 0; cursor: pointer;}
        .doc-list-table th:hover { background: #e2e6e9; }
        .doc-list-table td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; color: #333;}
        .doc-list-table tr:hover { background: #f9f9f9; }
        .btn-load { background: #2ecc71; color: white; border: none; padding: 6px 12px; border-radius: 3px; cursor: pointer; font-size: 12px; width: auto; margin:0;}
        .btn-admin-del { background: #e74c3c; color: white; border: none; padding: 6px 10px; border-radius: 3px; cursor: pointer; font-size: 12px; width: auto; margin:0 0 0 5px;}
        
        .filter-bar { display: flex; flex-direction: column; gap: 12px; background: #ecf0f1; padding: 15px; border-radius: 6px; }
        .filter-bar select { padding: 8px; font-size: 13px; margin: 0; color: #333; background: white; border: 1px solid #ccc; border-radius: 4px; font-weight: bold; cursor: pointer; }
        /* BUG FIX: this search-box styling (magnifying glass icon, 40px left
           padding, full width) was written for #searchFilter specifically but
           was accidentally applying to every <input> in .filter-bar — including
           the date range pickers, which made each one render full-width on its
           own line instead of sitting compactly on one row. Scoped to #searchFilter only. */
        #searchFilter { 
            width: 100% !important; 
            max-width: 100% !important; 
            padding: 12px 15px 12px 40px !important; 
            font-size: 16px !important; 
            color: #111111 !important; 
            -webkit-text-fill-color: #111111 !important; /* 🛡️ KILLS THE INVISIBLE TEXT BUG */
            background-color: #ffffff !important; 
            border: 2px solid #bdc3c7 !important; 
            border-radius: 6px !important; 
            box-sizing: border-box;

        .filter-bar input[type="date"], .filter-bar input[type="month"] {

        /* i3: when the Dispatch View modal is open and Print is triggered,
           it needs the OPPOSITE of the rule above — hide everything else on

        body.dispatch-printing .container,
        body.dispatch-printing .modal-overlay:not(#dispatchViewModal) { display: none !important; }
        @media print {
            body.dispatch-printing #dispatchViewModal {
                position: static !important; background: none !important; display: block !important;
            }
            body.dispatch-printing #dispatchViewModal .modal-content {
                box-shadow: none !important; max-width: 100% !important; width: 100% !important;
            }
            body.dispatch-printing .close-btn,
            body.dispatch-printing #dispatchViewModal button { display: none !important; }
        }

        /* ============================================================
           MOBILE OPTIMIZATION — v23
           All rules scoped to max-width:480px so desktop is untouched.
           Target: 380px Android / iPhone SE and larger phones.
        ============================================================ */
        @media (max-width: 480px) {

            /* --- BODY & LAYOUT --- */
            body { padding-bottom: 90px; font-size: 14px; }
            .container { flex-direction: column; width: 100%; margin: 0; gap: 0; }
            .editor-box {
                flex: none; width: 100%; box-sizing: border-box;
                position: relative; top: 0; max-height: none;
                overflow-y: visible; border-radius: 0;
                padding: 14px 12px;
                border-bottom: 3px solid #e67e22;
            }
            .preview-box { padding: 12px 8px 8px 8px; }

            /* --- DOC TYPE SPOTLIGHT --- */
            .doctype-spotlight select { font-size: 15px; padding: 12px 10px; }
            .doctype-spotlight label { font-size: 9px; }

            /* --- MASTER BAR ---
               On 380px, 5 controls in one row is impossible.
               Reflow into 2x2 grid + void spanning full width. */
            .master-bar {
                padding: 10px;
                gap: 6px;
                display: grid;
                grid-template-columns: 1fr 1fr;
            }
            .master-bar > div { min-width: 0; flex: none; }
            .master-bar select, .master-bar button {
                font-size: 12px; padding: 10px 6px;
            }
            /* Void spans full width — it's a destructive action so making it
               prominent and hard to accidentally tap is actually correct. */
            .master-bar > div:last-child { grid-column: 1 / -1; }

            /* --- NEW DOC / VIEW LIST buttons row --- */
            .container > .editor-box > div:first-child button {
                font-size: 14px !important;
                padding: 13px 10px !important;
            }

            /* --- LABELS & INPUTS --- */
            label { font-size: 11px; margin-top: 12px; }
            input, select {
                padding: 12px 10px;
                font-size: 15px; /* iOS won't auto-zoom if font-size >= 16px,
                                    but 15px is close enough with our viewport tag */
                border-radius: 6px;
            }
            input::placeholder { font-size: 14px; }

            /* --- INLINE FLEX ROWS — stack them on mobile --- */
            /* Doc No + Date row */
            #salesInputs > div:first-child > div:first-child { flex-direction: column !important; gap: 8px !important; }

            /* Client Name / Location / Phone — 3 columns stacks to 1 */
            #salesInputs > div:nth-child(2) { flex-direction: column !important; gap: 8px !important; }

            /* GSTIN / Vehicle / E-Way — 3 columns stacks to 1 */
            #dispatchSettingsBox > div:first-child { flex-direction: column !important; gap: 8px !important; }

            /* Delivery Site / Freight — 2 columns stacks to 1 */

            .btn-add, .btn-mortar { font-size: 14px; padding: 13px; }

            #advAdjustBox > div { flex-direction: column !important; gap: 8px !important; }
            #paymentLogBox { margin-top: 14px; }

            /* Voucher inputs */

            #voucherInputs > div:nth-child(3) { flex-direction: column !important; gap: 8px !important; }
            #voucherInputs > div:nth-child(4) { flex-direction: column !important; gap: 8px !important; }

            .site-form-grid { grid-template-columns: 1fr; }

            /* Pricing engine modal */
            .engine-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
            .engine-grid input { font-size: 14px; }

            /* UX edit modal (item overrides) */
            #uxEditModal .modal-content { padding: 14px !important; }

            /* Period select rows in Summary / Ledger */
            .period-select-row { flex-wrap: wrap !important; gap: 8px !important; }
            .period-select-row select, .period-select-row input[type=date] {
                flex: 1 1 120px !important;
                font-size: 13px !important;
            }

            /* Outstanding dues table — stack badly on 380px */
            .outstanding-row-ok td,
            .outstanding-row-due td,
            .outstanding-row-overdue td { font-size: 11px !important; padding: 6px 4px !important; }

            /* Stock manager tabs */
            .engine-tab-bar { flex-wrap: wrap; gap: 4px; }
            .engine-tab-btn { font-size: 11px; padding: 6px 10px; }

            /* ADV receipt print box */
            #advPrintAmt { font-size: 32px !important; }

        } /* end @media 480px */

        /* Extra narrow (< 360px — Galaxy A series etc.) */
        @media (max-width: 360px) {
            .action-bar { padding: 6px 8px; gap: 6px; }
            .btn-print, .btn-pdf, .btn-save { font-size: 11px !important; padding: 10px 4px !important; }
            .analytics-grid-btn, .action-trio-btn { font-size: 9px; min-height: 52px; }
        }

</head>
<body>

<datalist id="clientList">
    <option value="Testing">
    <option value="Walk-in Customer">
    <option value="ARAN Builders">
    <option value="Mani Engineering">
    <option value="Kannan Constructs">
    <option value="Sri Ram Developers">
</datalist>

<div class="container">
    
    <div class="editor-box">
        <div style="display: flex; gap: 15px; margin-bottom: 20px;">
            <button onclick="createNewDocSafe()" style="flex: 1; margin: 0; background: #2ecc71; font-size: 16px; padding: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">✨ NEW DOC</button>
            <button class="btn-list" onclick="openSavedDocs()" style="flex: 1; margin: 0; background: #8e44ad; font-size: 16px; padding: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">📂 VIEW LIST</button>
        </div>
        <!-- Site Manager (renamed from "Sites") promoted to a standalone,
             full-width section. Stock lives only in the Reports & Tools grid
             below — having a second Stock button here was redundant. -->
        <div style="margin-bottom: 15px;">
            <button onclick="openSiteManager()" style="width: 100%; margin: 0; background: #1a3c5e; font-size: 15px; padding: 11px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">🏗️ SITE MANAGER</button>
        </div>
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <button id="btnConvertToInv" onclick="convertDocument('INV')" style="flex:1; margin:0; background:#16a085; font-size:13px; padding:9px; display:none;">⚡ → Tax Invoice</button>
            <button id="btnConvertToSal" onclick="convertDocument('SAL')" style="flex:1; margin:0; background:#1abc9c; font-size:13px; padding:9px; display:none;">⚡ → Sales Invoice</button>
            <button id="btnAmendDoc" onclick="amendDocument()" style="flex:1; margin:0; background:#d35400; font-size:13px; padding:9px; display:none;">✏️ Amend (Supersede)</button>
            <button id="btnWhatsApp" onclick="shareOnWhatsApp()" style="flex:1; margin:0; background:#25D366; font-size:13px; padding:9px;">📲 WhatsApp</button>
        </div>
        <!-- U4: Analytics — dedicated section, 2 rows x 3 columns, icon above label -->
        <div class="analytics-section">
            <div class="analytics-section-title">📊 Reports & Tools</div>
            <div class="analytics-grid">
                <button id="btnAnalyticsLedger" class="analytics-grid-btn" onclick="openLedger()"><span class="ag-icon">👤</span><span>Ledger</span></button>
                <button id="btnAnalyticsOutstanding" class="analytics-grid-btn" onclick="openOutstanding()"><span class="ag-icon">⏰</span><span>Outstanding</span></button>
                <button id="btnAnalyticsSummary" class="analytics-grid-btn" onclick="openMonthlySummary()"><span class="ag-icon">📊</span><span>Summary</span></button>
                <button id="btnAnalyticsAudit" class="analytics-grid-btn" onclick="openAuditorExport()"><span class="ag-icon">📋</span><span>Audit</span></button>
                <button id="btnAnalyticsCashBook" class="analytics-grid-btn" onclick="openCashBook()"><span class="ag-icon">💵</span><span>Cash Book</span></button>
                <button id="btnAnalyticsStock" class="analytics-grid-btn" onclick="openStockManager()"><span class="ag-icon">📦</span><span>Stock</span></button>
            </div>
            <!-- Improvement #1: full data backup/export — deliberately understated
                 (text link, not a button) since this is a safety-net action rather
                 than a daily workflow step. -->
            <div style="text-align:center; margin-top:10px;">
                <button onclick="downloadFullBackup()" style="width:auto; margin:0; background:none; border:none; color:#7f8c8d; font-size:11px; cursor:pointer; text-decoration:underline; padding:4px;">💾 Download full data backup (.json)</button>
                <span style="color:#ccc; font-size:11px;"> · </span>
                <!-- G1: Restore from backup. A different (warmer/orange) color
                     than the export link, signaling this is a different KIND
                     of action — destructive, not just informational — even
                     though both sit in the same understated row. -->
                <button onclick="openRestoreModal()" style="width:auto; margin:0; background:none; border:none; color:#d35400; font-size:11px; cursor:pointer; text-decoration:underline; padding:4px;">📥 Restore from backup</button>
            </div>
        </div>

        <!-- U5: Doc Type gets its own dedicated, visually prominent block —
             it's the single most important selector in the form. -->
        <div class="doctype-spotlight">
            <label>Document Type</label>
            <select id="docType" onchange="switchAppMode()">
                <option value="QUO">📝 Quotation</option>
                <option value="SAL">🧾 Sales Invoice</option>
                <option value="ADV">💰 Advance Receipt</option>
                <option value="INV">📄 Tax Invoice</option>
                <option value="CRN">↩️ Credit Note</option>
                <option value="EXP">💸 General Expense Voucher</option>
                <option value="RCM">🔄 RCM Payment Voucher</option>
            </select>
        </div>

        <!-- U6: Tier selector + Item/Pricing Manager grouped together since both
             are pricing-related. -->
        <div class="master-bar">
            <div style="flex:1.3;">
                <select id="globalTierSelect" onchange="updateCartPricing(); triggerRateAutoFill();">
                    <option value="Customer">Tier: Customer</option>
                    <option value="Engineer">Tier: Engineer</option>
                    <option value="Builder">Tier: Builder</option>
                    <option value="Sub-Dealer">Tier: Sub-Dealer</option>
                </select>
            </div>
            <div style="flex:1;">
                <button class="btn-engine" onclick="openPricingEngine()">⚙️ Pricing & Items</button>
            </div>
        </div>

        <!-- U7: Pen Signature / Boss Mode / Void — grouped, uniform size,
             icon-above-label, evenly spaced 3-column grid. -->
        <div class="action-trio-group">
            <!-- BUG FIX: clicking the div/icon previously did nothing because only
                 the <select> itself is a native click target for opening a dropdown.
                 Now the whole tile is clickable — it programmatically opens the
                 select (openSignatureSelect), same as tapping Boss Mode or Void
                 anywhere on their button. The <select> itself stays usable too. -->
            <div class="action-trio-btn trio-signature" onclick="openSignatureSelect(event)">
                <span class="trio-icon">🖊️</span>
                <select id="signatorySelect" class="trio-select" onchange="applySignature()" onclick="event.stopPropagation()">
                    <option value="NONE">Pen Signature</option>
                    <option value="AADIL">Sign: Aadil</option>
                    <option value="RAJA">Sign: Raja</option>
                    <option value="MEHAR">Sign: Mehar</option>
                </select>
            </div>
            <button type="button" id="bossModeBtn" class="action-trio-btn trio-bossmode" onclick="toggleBossMode()">
                <span class="trio-icon">👔</span>
                <span id="bossModeLabel">Boss Mode</span>
            </button>
            <button type="button" class="action-trio-btn trio-void" onclick="voidDocument()">
                <span class="trio-icon">🚫</span>
                <span>Void</span>
            </button>
        </div>

        <!-- U8: Doc No field widened now that Boss Mode no longer crowds this row.
             Added a live collision warning instead of locking characters (see
             checkDocNoCollision in JS) since the FY portion changes every April. -->
        <div style="display:flex; gap:10px; margin: 14px 0 10px 0;">
            <div style="flex:1.6;">
                <label style="margin-top:0;">Document No.</label>
                <input type="text" id="docNoIn" onkeyup="updateInfo(); checkDocNoCollision();" style="margin-top:5px; font-size:15px; font-weight:bold; letter-spacing:0.3px;">
                <div id="docNoWarning" class="docno-warning">⚠️ This document number already exists — saving may overwrite it.</div>
            </div>
            <div style="flex:1;">
                <label style="margin-top:0;">Date</label>
                <input type="date" id="dateIn" onchange="updateInfo()" style="margin-top:5px;">
            </div>
        </div>

        <div id="salesInputs">
            <div style="display:flex; gap:10px;">
                <!-- A7: Title selector — empty/blank is the default and always available -->
                <div style="flex:0.6;">
                    <label>Title</label>
                    <select id="clientTitleIn" onchange="updateInfo()">
                        <option value="">—</option>
                        <option value="Mr.">Mr.</option>
                        <option value="Mrs.">Mrs.</option>
                        <option value="Er.">Er.</option>
                        <option value="M/s">M/s</option>
                        <option value="Ms.">Ms.</option>
                        <option value="Dr.">Dr.</option>
                        
                    </select>
                </div>
                <!-- A7: Client Name — custom live-suggestion autocomplete replaces the
                     native <datalist> dropdown (which forces an arrow icon and doesn't
                     scale past a handful of entries). Matches by name substring OR by
                     client ID number (typing "22" surfaces C22, C220, etc.) -->
                <div style="flex:1.5; position:relative;">
                    <label>Client Name</label>
                    <input type="text" id="clientNameIn" autocomplete="off" onkeyup="updateInfo(); handleClientAutofill();" onkeydown="handleClientSuggestionKeydown(event)" onchange="handleClientShortcut()" onblur="setTimeout(closeClientSuggestions, 150)">
                    <div id="clientSuggestionsBox" class="client-suggestions-box"></div>
                </div>
                <div style="flex:1.5;"><label>Billing Location</label><input type="text" id="locIn" value="Udumalpet" placeholder="e.g. Udumalpet" onkeyup="updateInfo()"></div>
                <div style="flex:1;"><label>Contact No.</label><input type="text" id="phoneIn" onkeyup="updateInfo()"></div>
            </div>
            <!-- F16: Returning client autofill suggestion -->
            <div id="clientAutofillBanner" class="client-autofill-banner" onclick="applyClientAutofill()">
                💡 Returning client detected — tap to auto-fill GSTIN, location & tier
            </div>
            <!-- F2: Duplicate invoice guard -->
            <div id="duplicateGuardBanner" class="duplicate-warn-banner">
                ⚠️ <span id="duplicateGuardText"></span>
            </div>
            <div id="dispatchSettingsBox">
                <div style="display:flex; gap:10px; margin-top: 5px;">
                    <div style="flex:1;" id="inputGstinContainer">
                        <label>Client GSTIN / Status</label>
                        <input type="text" id="gstinIn" placeholder="GSTIN or URD" onkeyup="updateInfo(); validateGSTINField();" style="text-transform:uppercase;">
                        <!-- G3: live format check, not a blocker. A typo'd GSTIN
                             otherwise sails through silently until the GST
                             portal or the client's accountant rejects it weeks
                             later — this just catches the obvious cases (wrong
                             length, lowercase mixed in, bad structure) at the
                             point of entry. -->
                        <div id="gstinValidationMsg" style="display:none; font-size:10px; margin-top:3px; padding:2px 6px; border-radius:3px;"></div>
                    </div>
                    <div style="flex:1;" id="inputVehContainer"><label>Vehicle Number</label><input type="text" id="vehIn" onkeyup="updateInfo()"></div>
                    <div style="flex:1;" id="inputEwayContainer">
                        <label>E-Way Bill No.</label>
                        <select id="ewayBillIn" onchange="updateInfo()">
                            <option value="Not Applicable (Under 1 Lakh)">Not Applicable (Under 1L)</option>
                            <option value="___">Blank (___)</option>
                            <option value="CUSTOM">Enter Number...</option>
                        </select>
                        <input type="text" id="customEwayIn" style="display:none; margin-top:5px;" placeholder="Enter 12-digit number" onkeyup="updateInfo()">
                    </div>
                </div>
                <div style="display:flex; gap:10px; margin-top: 5px;">
                    <div style="flex:1.5;"><label>Site Delivery Destination</label><input type="text" id="deliverySiteIn" placeholder="Site Drop Location" onkeyup="updateInfo()"></div>
                    <div style="flex:1;">
                        <label>Freight Terms</label>
                        <select id="freightTypeIn" onchange="handleFreightChange()">
                            <option value="Borne By Customer (To Pay)">Borne By Customer (To Pay)</option>
                            <option value="Included in Invoice">Included in Invoice</option>
                            <option value="CUSTOM">Custom...</option>
                        </select>
                        <input type="text" id="customFreightIn" style="display:none; margin-top:5px;" onkeyup="updateInfo()">
                    </div>
                </div>
            </div>
            <div id="taxToggleDiv" style="background: #34495e; padding: 10px; border-radius: 4px; margin-top: 15px; border: 1px solid #f1c40f;">
                <label style="color: #f1c40f; margin-top: 0; cursor: pointer; text-transform: none;">
                    <input type="checkbox" id="inclusiveTax" onchange="renderTable()" checked style="vertical-align: middle;"> <b style="vertical-align: middle;">Rates INCLUDE GST</b>
                </label>
            </div>
            <hr style="border-color:#465c71; margin: 15px 0;">
            
            <label style="color:#3498db; display:flex; justify-content: space-between; margin-top:0; margin-bottom: 8px;">
                <span>Add Product / Advance</span>
                <span id="liveTonnageTracker" style="color:#f1c40f; font-weight:normal;">Cart Tonnage: 0.00 T</span>
            </label>
            
                        <div class="add-product-row" style="display:flex; gap:10px; align-items: flex-start;">
                <div style="flex:2; display:flex; flex-direction: column; gap:5px;">
                    <select id="prodSelect" style="margin-top:0;" onchange="handleProductSelect()">
                        <option value="" selected disabled>(Select Product)</option>
                        <option value="AAC Block 4 Inch (Meghalite)">AAC Block 4 Inch (Meghalite)</option>
                        <option value="AAC Block 6 Inch (Meghalite)">AAC Block 6 Inch (Meghalite)</option>
                        <option value="AAC Block 8 Inch (Meghalite)">AAC Block 8 Inch (Meghalite)</option>
                        <option value="AAC Block 9 Inch (Meghalite)">AAC Block 9 Inch (Meghalite)</option>
                        <option value="AAC Block 4 Inch (Birla)">AAC Block 4 Inch (Birla)</option>
                        <option value="AAC Block 6 Inch (Birla)">AAC Block 6 Inch (Birla)</option>
                        <option value="AAC Block 8 Inch (Birla)">AAC Block 8 Inch (Birla)</option>
                        <option value="AAC Block 9 Inch (Birla)">AAC Block 9 Inch (Birla)</option>
                        <option value="Jointing Mortar (40 Kg bag)">Jointing Mortar (40 Kg bag)</option>
                        <option value="Transport">Transport</option>
                        <option value="Unloading Charges">Unloading Charges</option>
                        <option value="Loading Charges">Loading Charges</option>
                        <option value="Loading & Unloading Charges">Loading & Unloading Charges</option>
                        <option value="Advance Payment Received">Advance Payment Received</option>
                        <option value="CUSTOM">[+] Custom Item...</option>
                    </select>
                    <input type="text" id="customProdIn" style="display:none; margin-top:0;" placeholder="Enter Item Name...">
                    <!-- Improvement #8: live stock check, right next to the
                         product picker — shows current quantity by location
                         the moment a product is selected, so there's no need
                         to separately open Stock Manager while quoting. -->
                    <div id="stockCheckIndicator" style="display:none; font-size:11px; padding:4px 8px; border-radius:4px; margin-top:2px;"></div>
                </div>
                <div style="flex:0.7;"><input type="number" id="qtyInput" style="margin-top:0;" placeholder="Qty" oninput="triggerRateAutoFill()"></div>
                <!-- F6: Unit label selector — shows on QUO, SAL, CRN; hidden on INV (units implied) -->
                <div style="flex:0.8;" id="unitLabelContainer">
                    <select id="unitSelect" style="margin-top:0;">
                        <option value="Nos">Nos</option>
                        <option value="Bags">Bags</option>
                        <option value="Sq.ft">Sq.ft</option>
                        <option value="Trip">Trip</option>
                        <option value="Job">Job</option>
                        <option value="Kg">Kg</option>
                        <option value="Ton">Ton</option>
                        <option value="Lump">Lump</option>
                    </select>
                </div>
                <div style="flex:1;"><input type="number" id="rateInput" style="margin-top:0;" placeholder="Rate / Amt ₹"></div>
            </div>

            <!-- F9: Supersedes reference — shown on INV and SAL when amending -->
            <div id="supersedesBox" style="display:none; background:#34495e; padding:10px; border-radius:4px; margin-top:10px; border:1px solid #d35400;">
                <label style="color:#e67e22; margin-top:0; text-transform:none;">✏️ This document supersedes (amends):</label>
                <div style="display:flex; gap:8px; align-items:center;">
                    <input type="text" id="supersedesRef" placeholder="Original Doc No. being replaced" onkeyup="updateInfo()" style="margin-top:5px; flex:1;">
                    <button onclick="openAmendmentDiff()" style="width:auto; margin:5px 0 0 0; background:#e67e22; padding:8px 12px; font-size:11px;">🔍 View Changes</button>
                </div>
            </div>

            <!-- F17: Item notes field — prints under item name on document -->
            <div style="margin-top:8px;">
                <input type="text" id="itemNotesIn" placeholder="📝 Optional note for this item (prints on document)..." style="font-size:12px; padding:7px 10px; background:#1a252f; border:1px dashed #465c71; color:#bdc3c7;">
            </div>
            <button class="btn-add" id="btnAddItemMain" onclick="addItem()" style="margin-top:10px;">+ Add to Document</button>
            <!-- U10: Mortar button sits below Add so workflow is: pick product → qty → rate → Add → then auto-mortar if needed -->
            <button class="btn-mortar" id="btnMortar" onclick="autoAddMortar()" style="margin-top:8px;">🪄 Auto-Calculate Mortar</button>

            <!-- F22: Multi-Advance Linking (for INV/SAL) -->
            <div id="advAdjustBox" style="background:#c0392b; padding:15px; border-radius:6px; margin-top:15px; display:none;">
                <label style="color:#fff; margin-top:0;">🔗 Link Advance Receipts</label>
                <table class="adv-link-table" id="advLinkTable">
                    <thead><tr><th style="width:45%">Receipt No.</th><th style="width:35%">Amount (₹)</th><th style="width:20%"></th></tr></thead>
                    <tbody id="advLinkBody"></tbody>
                </table>
                <button class="btn-adv-add-row" onclick="addAdvLinkRow()" style="margin-top:8px;">+ Add Another Receipt</button>
                <div style="margin-top:8px; padding:8px 10px; background:rgba(0,0,0,0.2); border-radius:4px; font-size:13px; color:#fff;">
                    Total Linked: <b id="advLinkTotal">₹0</b> &nbsp;|&nbsp; Balance: <b id="advLinkBalance">₹0</b>
                </div>
            </div>

            <!-- ADV: Direct amount entry + payment mode + QUO link (only shown for ADV type) -->
            <div id="advDirectBox" style="display:none;">
                <div class="adv-amount-box">
                    <label>💰 Advance Amount Received (₹)</label>
                    <input type="number" id="advDirectAmt" placeholder="e.g. 14000" onkeyup="renderTable(); updateAdvPrint();" style="font-size:18px; font-weight:bold; color:#f39c12; background:#1a252f; border:2px solid #f39c12; margin-top:6px;">
                </div>
                <div style="background:#1a252f; padding:12px 15px; border-radius:6px; margin-top:10px; border:1px solid #465c71;">
                    <label style="color:#3498db; margin-top:0;">📝 Purpose / Description</label>
                    <input type="text" id="advDirectDesc" placeholder="e.g. Advance for Block Supply — Mani Site" onkeyup="updateAdvPrint()" style="margin-top:5px;">
                    <label style="color:#8e44ad; margin-top:10px;">🔗 Link to Quotation (Optional)</label>
                    <div style="display:flex; gap:8px; margin-top:5px; position:relative;">
                        <div style="flex:1.5; position:relative;">
                            <input type="text" id="advQuoRef" placeholder="Search quotation no..." autocomplete="off"
                                oninput="handleAdvQuoSearch()" onfocus="handleAdvQuoSearch()"
                                onblur="setTimeout(closeAdvQuoSuggestions, 150)">
                            <div id="advQuoSuggestBox" class="client-suggestions-box" style="top:100%;"></div>
                        </div>
                        <input type="number" id="advQuoTotal" placeholder="QUO Total ₹" onkeyup="updateAdvPrint()" style="flex:1;">
                    </div>
                </div>
                <div style="background:#1abc9c; padding:15px; border-radius:6px; margin-top:10px;">
                    <label style="color:#fff; margin-top:0;">💳 Payment Method</label>
                    <select id="advPayMode" onchange="toggleAdvPayFields(); updateAdvPrint();" style="margin-top:5px;">
                        <option value="">Select Method...</option>
                        <option value="Cash">Cash</option>
                        <option value="UPI / GPay">UPI / GPay</option>
                        <option value="Bank Transfer">Bank Transfer</option>
                        <option value="Cheque">Cheque</option>
                    </select>
                    <div id="advPayDetails" style="display:none; margin-top:8px;">
                        <input type="text" id="advPayRef" placeholder="Transaction ID / Cheque No. / UTR" onkeyup="updateAdvPrint()">
                    </div>
                </div>
            </div>

            <div id="paymentLogBox" style="background: #1abc9c; padding: 15px; border-radius: 6px; margin-top: 20px;">
                <label style="color: #fff; margin-top: 0;">Log Payment (Internal Record)</label>
                <select id="salesPayMode" onchange="toggleSalesPayFields(); renderTable();">
                    <option value="">Select Method...</option>
                    <option value="Cash">Cash</option>
                    <option value="UPI">UPI</option>
                    <option value="Bank Transfer">Bank Transfer</option>
                </select>
                <div id="salesCashFields" style="display:none; margin-top:10px;"><input type="text" id="salesCashDetails" placeholder="Denominations" onkeyup="renderTable()"></div>
                <div id="salesUpiFields" style="display:none; margin-top:10px;"><input type="text" id="salesUpiDetails" placeholder="Transaction ID" onkeyup="renderTable()"></div>
                <div id="salesBankFields" style="display:none; margin-top:10px;"><input type="text" id="salesBankDetails" placeholder="Reference Number" onkeyup="renderTable()"></div>
            </div>
        </div>
        
        <div id="voucherInputs" style="display:none;">
            <div style="display:flex; gap:10px;">
                <div style="flex:2;"><label>Paid To</label><input type="text" id="vPaidTo" onkeyup="updateInfo()"></div>
                <div style="flex:1;"><label>Amount (₹)</label><input type="number" id="vAmt" onkeyup="updateInfo()"></div>
            </div>
            <label>Towards (Description)</label><input type="text" id="vDesc" onkeyup="updateInfo()">
            <!-- F4-fix: RCM GST Rate Selector -->
            <div id="rcmGstBox" style="display:none; background:#34495e; padding:10px; border-radius:4px; margin-top:10px; border:1px solid #e67e22;">
                <label style="color:#e67e22; margin-top:0; text-transform:none;">RCM Tax Liability</label>
                <div style="display:flex; gap:10px; margin-top:5px;">
                    <div style="flex:1;">
                        <select id="rcmGstRate" onchange="updateInfo()" style="margin-top:0;">
                            <option value="0">No GST / Exempt</option>
                            <option value="5">5% GST (GTA Freight)</option>
                            <option value="12">12% GST</option>
                            <option value="18">18% GST (Services)</option>
                        </select>
                    </div>
                    <div style="flex:1; display:flex; align-items:center; padding:10px; background:#1a252f; border-radius:4px; font-size:13px; color:#f1c40f; font-weight:bold;" id="rcmTaxDisplay">RCM Tax: ₹0.00</div>
                </div>
            </div>
            <!-- F7: Credit Note reference field -->

<script>
    // ⚠️ REPLACE THIS STRING WITH YOUR GOOGLE APPS SCRIPT DEPLOYMENT URL
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyCEa9mVyScBqRnwNb0AWYl0I4eniKE8sfVgzyaeyUKALNfYqS5BgT5bTMl0vll6TRPPQ/exec"; 

    // CRITICAL FIX: this used to be derived from WEB_APP_URL via .replace('/exec','/edit'),
    // but WEB_APP_URL is the Apps Script *web app* URL (.../macros/s/XXXX/exec), not the
    // spreadsheet URL — replacing /exec with /edit on that string does not produce a valid
    // spreadsheet link, which is why "OPEN DATABASE" gave "unable to open the file".
    // Paste your actual spreadsheet URL here instead (Google Sheets URL, ending in /edit).
    const SPREADSHEET_URL = "https://docs.google.com/spreadsheets/d/16wrBGgN0Kz23sCdusI_KgZL27v0_ZrDBda_LSuKUsPQ/edit";

    // ============================================================
    // CLOUD SYNC ENGINE — local-first, background sync
    // ----------------------------------------------------------------
    // Design (per explicit decision): every local write stays instant —
    // localStorage is the source of truth for the current session and the
    // UI never waits on a network round-trip to confirm a save. After each
    // local write, the relevant collection is queued for a background sync
    // that pushes the FULL current array to the cloud (bulkSync action) on
    // a short debounce, so rapid successive edits (e.g. typing) don't fire
    // a network call per keystroke-triggered save.
    //
    // Previously, Clients/Stock/Tools lived in localStorage ONLY — if the
    // device was lost or browser data cleared, that data had no recovery
    // path. CashBook/Sites already had backend support but the frontend
    // never actually called it. This engine fixes both: every one of the
    // 9 sync-eligible collections now reaches the cloud.
    // ============================================================
    const SYNC_DEBOUNCE_MS = 2500;
    let _syncTimers = {};
    let _syncInFlight = {};
    let _syncFailedQueue = new Set(); // collections that failed last attempt, retried on next trigger

    // Improvement #2: SYNC CONFLICT DETECTION
    // A stable per-device identifier (persisted, not regenerated each load)
    // plus a per-collection "last known stamp" — together these let the
    // backend tell whether THIS device's view of a collection is stale
    // because another device (e.g. a second phone, or desktop) wrote to it
    // in between syncs. See genericBulkSync in the backend for the actual
    // conflict check.
    function getDeviceId() {
        let id = localStorage.getItem('kenDeviceId');
        if (!id) {
            id = 'dev_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
            try { localStorage.setItem('kenDeviceId', id); } catch(e) {}
        }
        return id;
    }
    const DEVICE_ID = getDeviceId();
    let _lastKnownStamps = {}; // collectionName -> timestamp this device last successfully synced

    // Maps each local collection name to its getter (so the sync engine
    // always pushes the CURRENT array, not a stale snapshot from when the
    // save was first triggered) and its backend bulkSync collection key.
    const SYNC_COLLECTION_MAP = {
        clients:        { getter: () => getClients(),         remoteKey: 'clients' },
        stockItems:     { getter: () => getStockItems(),       remoteKey: 'stockItems' },
        stockBatches:   { getter: () => getStockBatches(),     remoteKey: 'stockBatches' },
        stockMovements: { getter: () => getStockMovements(),   remoteKey: 'stockMovements' },
        stockLocations: { getter: () => getStockLocations().map(name => ({ id: name, name })), remoteKey: 'stockLocations' },
        toolItems:      { getter: () => getToolItems(),        remoteKey: 'toolItems' },
        toolMovements:  { getter: () => getToolMovements(),    remoteKey: 'toolMovements' },
        cashBook:       { getter: () => getCashEntries(),      remoteKey: 'cashBook' },
        projects:       { getter: () => getProjects(),         remoteKey: 'projects' }
        // Sites is NOT in this map — its timeline field needs JSON
        // stringification that bulk-sync doesn't do. Sites instead calls
        // syncSiteToCloud()/deleteSiteFromCloud() directly (see Sites section).
    };

    // Call this after any local write to one of the SYNC_COLLECTION_MAP
    // collections. Debounced per-collection — calling it 10 times in a row
    // (e.g. adding 10 stock lines) results in one network call, not 10.
    function queueCloudSync(collectionName) {
        if (WEB_APP_URL === "PASTE_YOUR_WEB_APP_URL_HERE") return; // not configured yet, skip silently
        if (!SYNC_COLLECTION_MAP[collectionName]) return;

        clearTimeout(_syncTimers[collectionName]);
        _syncTimers[collectionName] = setTimeout(() => runCloudSync(collectionName), SYNC_DEBOUNCE_MS);
    }

    function runCloudSync(collectionName) {
        let entry = SYNC_COLLECTION_MAP[collectionName];
        if (!entry || _syncInFlight[collectionName]) return; // one sync at a time per collection
        _syncInFlight[collectionName] = true;
        updateSyncIndicator('syncing');

        let payload = entry.getter();
        fetch(WEB_APP_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({
                action: 'bulkSync', collection: entry.remoteKey, data: payload,
                deviceId: DEVICE_ID, lastKnownStamp: _lastKnownStamps[collectionName] || null
            })
        })
        .then(r => r.json())
        .then(res => {
            _syncInFlight[collectionName] = false;
            if (res && res.success) {
                _syncFailedQueue.delete(collectionName);
                if (res.stamp) _lastKnownStamps[collectionName] = res.stamp;
                updateSyncIndicator('synced');
            } else if (res && res.conflict) {
                // Another device wrote to this collection since this device
                // last synced. Per local-first design, local data is never
                // silently discarded — but blindly overwriting the OTHER
                // device's newer cloud write would discard THEIR work
                // instead. Surfaced clearly rather than guessing.
                handleSyncConflict(collectionName, res);
            } else {
                _syncFailedQueue.add(collectionName);
                updateSyncIndicator('error');
            }
        })
        .catch(() => {
            // Local-first by design: a failed background sync is silent to
            // the person (no alert/blocking), since their data is already
            // safe locally. It's queued for retry instead.
            _syncInFlight[collectionName] = false;
            _syncFailedQueue.add(collectionName);
            updateSyncIndicator('error');
        });
    }

    // A conflict means: this device's local changes AND another device's
    // cloud changes both exist and one would have to overwrite the other.
    // Rather than silently picking one, this surfaces a clear choice —
    // shown once per conflict, non-blocking (doesn't stop the person from
    // continuing to work locally while they decide).
    let _conflictDismissed = {};
    function handleSyncConflict(collectionName, res) {
        updateSyncIndicator('conflict');
        if (_conflictDismissed[collectionName]) return; // already shown this session, don't nag repeatedly
        _conflictDismissed[collectionName] = true;

        let when = res.lastWrittenAt ? new Date(res.lastWrittenAt).toLocaleString('en-IN') : 'recently';
        let proceed = confirm(
            `⚠️ Sync conflict on "${collectionName}"\n\n` +
            `Another device made changes to this data ${when}, after this device's last sync. ` +
            `Pushing this device's changes now would overwrite that.\n\n` +
            `Click OK to push THIS device's version anyway (overwrites the other device's recent changes).\n` +
            `Click Cancel to keep this device's data local-only for now and re-check later — nothing is lost either way, this only affects the cloud copy.`
        );
        if (proceed) {
            // Explicit override — clear the stamp so the next sync proceeds
            // unconditionally (treated as "this device wins").
            delete _lastKnownStamps[collectionName];
            _conflictDismissed[collectionName] = false;
            runCloudSync(collectionName);
        }
    }

    // Retries any collections that failed their last sync attempt — called
    // periodically and whenever the browser regains connectivity, so a
    // spotty-signal moment doesn't permanently strand data in localStorage.
    function retryFailedSyncs() {
        _syncFailedQueue.forEach(name => runCloudSync(name));
        // Sites doesn't go through SYNC_COLLECTION_MAP (see Sites section
        // below for why), so it needs its own check here.
        if (_syncFailedQueue.has('sites')) runSitesCloudSync(getSites());
    }
    // NOTE: the 'online' listener for this is consolidated with the
    // connectivity badge + offline doc queue flush — see Improvement #5
    // section below (one combined listener instead of multiple separate
    // ones firing on the same event).
    setInterval(retryFailedSyncs, 60000); // safety net every minute regardless of the 'online' event firing

    // Small, unobtrusive sync status dot — gives a quick visual confirmation
    // that the background sync is actually working, without interrupting
    // anything. Created lazily so it doesn't need static HTML.
    function updateSyncIndicator(state) {
        let el = document.getElementById('cloudSyncIndicator');
        if (!el) {
            el = document.createElement('div');
            el.id = 'cloudSyncIndicator';
            el.style.cssText = 'position:fixed; top:8px; right:8px; z-index:5000; font-size:10px; padding:3px 8px; border-radius:10px; font-weight:bold; transition:opacity 0.3s; opacity:0.85;';
            document.body.appendChild(el);
        }
        if (state === 'syncing') { el.innerText = '☁️ Syncing…'; el.style.background = '#f1c40f'; el.style.color = '#7d6608'; el.style.opacity = '0.85'; }
        else if (state === 'synced') { el.innerText = '☁️ Synced'; el.style.background = '#27ae60'; el.style.color = '#fff'; setTimeout(() => { el.style.opacity = '0'; }, 1500); }
        else if (state === 'error') { el.innerText = '⚠️ Sync pending — will retry'; el.style.background = '#e67e22'; el.style.color = '#fff'; el.style.opacity = '0.85'; }
        else if (state === 'conflict') { el.innerText = '⚠️ Sync conflict — see prompt'; el.style.background = '#c0392b'; el.style.color = '#fff'; el.style.opacity = '0.95'; }
    }

    // BUG FIX: the signature tile is a <div>, not a real <button>, because it
    // wraps a <select>. A <select> only opens its native dropdown when the click

    // nothing. This makes the whole tile clickable, same as Boss Mode and Void.
    function openSignatureSelect(evt) {

        // stopPropagation on the select's own onclick already prevents double-firing.
        let select = document.getElementById('signatorySelect');

        select.focus();
        select.dispatchEvent(new MouseEvent('mousedown'));

    // --- DYNAMIC PRICING ENGINE STATE ---
    let _defaultPricingConfig = {

    // ============================================================
    // A1: CLIENT REGISTRY
    // Each client gets a permanent, never-reused ID (C1, C2, C3...) the first

    // created by the auto-increment (which starts at C1), and automatically

    // consume a real C-number regardless of how many real clients exist.
    // ============================================================
    const WALKIN_LABEL = 'Walk-in Customer';
    const TESTING_LABEL = 'Testing';
    const TESTING_CLIENT = { id: 'C0', name: 'Testing', phone: '', gstin: 'URD', location: 'Test', createdAt: '2000-01-01T00:00:00.000Z', _isTestingSlot: true };

    function getClients() {
        try { return JSON.parse(localStorage.getItem('kenClients') || '[]'); } catch(e) { return []; }
    }
    function saveClients(clients) {
        try { localStorage.setItem('kenClients', JSON.stringify(clients)); } catch(e) {}
        queueCloudSync('clients');
    }
    function getNextClientCounter() {
        try { return parseInt(localStorage.getItem('kenClientCounter') || '0'); } catch(e) { return 0; }
    }
    function setNextClientCounter(n) {
        try { localStorage.setItem('kenClientCounter', String(n)); } catch(e) {}
    }

    // Ensure C0 always exists in the registry — called on startup.
    // Idempotent: does nothing if C0 is already there.
    function seedTestingClient() {
        let clients = getClients();
        if (!clients.find(c => c.id === 'C0')) {
            clients.unshift(TESTING_CLIENT);
            saveClients(clients);
        }
    }

    function resetClientRegistry() {
        let clients = getClients();
        let pwd = prompt(
            `⚠️ RESET CLIENT REGISTRY\n\n` +
            `This will permanently delete all ${clients.length} client record(s) and restart ID numbering from C1.\n\n` +
            `C0 (Testing) will be preserved.\n\n` +
            `Any documents already saved keep their data, but their Client ID will no longer match anyone in the directory.\n\n` +
            `This cannot be undone. Enter the master password to continue:`
        );
        if (pwd !== MASTER_PASSWORD) { if (pwd !== null) alert('Incorrect password. Reset cancelled.'); return; }

        // Keep C0, wipe everything else
        saveClients([TESTING_CLIENT]);
        setNextClientCounter(0);
        closeClientList();
        renderClientList();
        showToast('Client registry reset — C0 (Testing) preserved, numbering restarts at C1', 'error');
    }

    function registerOrUpdateClient(name, phone, gstin, location) {
        if (!name || !name.trim()) return null;
        let norm = name.trim().toLowerCase();
        // Walk-in Customer: never registered
        if (norm === WALKIN_LABEL.toLowerCase()) return null;
        // Testing: always returns C0, never increments the counter
        if (norm === TESTING_LABEL.toLowerCase()) return TESTING_CLIENT;

        let clients = getClients();
        let existing = findClientByName(name);
        if (existing) {
            let changed = false;
            if (!existing.phone && phone) { existing.phone = phone; changed = true; }
            if (!existing.gstin && gstin) { existing.gstin = gstin; changed = true; }
            if (!existing.location && location) { existing.location = location; changed = true; }
            if (changed) saveClients(clients);
            return existing;
        }
        let counter = getNextClientCounter() + 1;
        setNextClientCounter(counter);
        let newClient = {
            id: 'C' + counter,
            name: name.trim(),
            phone: phone || '',
            gstin: gstin || '',

        };
        clients.push(newClient);
        saveClients(clients);
        return newClient;
    }
